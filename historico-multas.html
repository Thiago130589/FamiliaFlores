<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Multas</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script> 
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title">Histórico de Multas</h1>
        
        <a href="index.html" class="btn-secondary-text btn-rounded" style="margin-bottom: 20px;">
            &#8592; Voltar para o Dashboard
        </a>
        <hr class="divider">

        <h2 style="font-size: 1.2rem; margin-bottom: 15px;">Multas Recebidas: <span id="user-title"></span></h2>
        
        <div id="status-message" class="info-message" style="display: block;">Carregando histórico...</div>
        
        <ul id="multa-list" class="transaction-list">
            </ul>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : null;
        
        // REMOVEMOS A DUPLA DECLARAÇÃO DE 'formatarMoeda' AQUI.
        // Assumimos que 'formatarMoeda' está acessível globalmente via js/script.js

        function getUsuarioLogado() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                return JSON.parse(storedValue);
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        async function fetchAndRenderMultas() {
            const userInfo = getUsuarioLogado();
            const messageEl = document.getElementById('status-message');
            const listEl = document.getElementById('multa-list');
            
            listEl.innerHTML = '';
            messageEl.textContent = 'Carregando histórico...';
            messageEl.classList.remove('error-message');
            messageEl.classList.add('info-message');
            messageEl.style.display = 'block';

            if (!userInfo || !firestore || typeof formatarMoeda !== 'function') {
                messageEl.textContent = 'Erro de inicialização (funções). Tente recarregar a página.';
                messageEl.classList.remove('info-message');
                messageEl.classList.add('error-message');
                return;
            }

            const nomeUsuario = userInfo.nome;
            document.getElementById('user-title').textContent = nomeUsuario;

            try {
                // Busca multas onde o campo 'usuario' é igual ao nome do usuário logado
                const multasRef = firestore.collection('multas');
                const snapshot = await multasRef.where('usuario', '==', nomeUsuario).orderBy('dataCriacao', 'desc').get();
                
                if (snapshot.empty) {
                    messageEl.textContent = `Nenhuma multa encontrada para ${nomeUsuario}.`;
                    messageEl.style.display = 'block';
                    return;
                }

                messageEl.style.display = 'none';

                snapshot.docs.forEach(doc => {
                    const multa = doc.data();
                    const dataObj = multa.dataCriacao ? multa.dataCriacao.toDate() : new Date(); // Converte Timestamp para Data
                    
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR');
                    const horaFormatada = dataObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                    const listItem = document.createElement('li');
                    listItem.classList.add('transaction-item', 'negative');
                    listItem.innerHTML = `
                        <div class="transaction-details">
                            <span class="transaction-description">Motivo: ${multa.motivo || 'Multa Padrão'}</span>
                            <span class="transaction-date">
                                Data: ${dataFormatada} | Hora: ${horaFormatada}
                            </span>
                        </div>
                        <span class="transaction-amount">${formatarMoeda(multa.valor || 0)}</span>
                    `;
                    listEl.appendChild(listItem);
                });

            } catch (error) {
                console.error("Erro ao carregar multas:", error);
                messageEl.textContent = 'Erro ao buscar o histórico de multas. Verifique o console.';
                messageEl.classList.remove('info-message');
                messageEl.classList.add('error-message');
                messageEl.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAndRenderMultas);
    </script>
</body>
</html>
