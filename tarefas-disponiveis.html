<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--success-color);">Tarefas Disponíveis</h1>
        <p class="info-message" style="text-align: center;">Pegue uma tarefa para começar a ganhar pontos (e dinheiro!).</p>
        <hr class="divider">
        
        <div id="tarefas-lista" class="historico-lista">
            <p class="empty-message">Carregando tarefas...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const TAREFAS_DISPONIVEIS_COLLECTION = 'tarefasDisponiveis';
        const TAREFAS_ATRIBUIDAS_COLLECTION = 'tarefasAtribuidas';

        /**
         * 1. Verifica Acesso e Redireciona se não estiver logado.
         */
        function checkAccess() {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                window.location.href = 'login.html';
                return false;
            }
            return userInfo.nome;
        }

        /**
         * 2. Renderiza a lista de tarefas disponíveis no Firestore.
         */
        async function renderTarefasDisponiveis() {
            const userName = checkAccess();
            if (!userName) return;

            const listaEl = document.getElementById('tarefas-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';
            
            try {
                // Filtra por tarefas com status 'Disponível'
                const query = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION)
                    .where('status', '==', 'Disponível')
                    .orderBy('valor', 'desc'); // Tarefas mais valiosas primeiro

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    // Botão de ação principal
                    const buttonHtml = `
                        <button class="btn-rounded btn-primary wide-button" 
                                onclick="pegarTarefa('${taskId}', '${t.nome}')">
                            Pegar Tarefa
                        </button>
                    `;
                    
                    // Estrutura do Card
                    html += `
                        <div class="tarefa-card admin-card" style="border-left-color: var(--success-color);">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome}</div>
                            </div>
                            
                            <div class="tarefa-status-line tarefa-info-status-success" style="margin-bottom: 10px;">
                                <span>Status:</span>
                                <span class="status-available">Disponível</span>
                            </div>

                            <div class="tarefa-details-admin">
                                <div class="tarefa-info-admin">Valor: <span class="positive-text" style="font-weight: bold;">${formatarMoeda(valor)}</span></div>
                                <div class="tarefa-info-admin">Descrição: ${t.descricao || 'N/A'}</div>
                            </div>
                            <div style="margin-top: 15px;">
                                ${buttonHtml}
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks ? html : '<p class="empty-message">Nenhuma tarefa disponível no momento. Verifique mais tarde.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas disponíveis:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas.</p>';
            }
        }

        /**
         * 3. Função para Pegar a Tarefa (Transação: move de Disponíveis para Atribuídas).
         * Garante que dois usuários não peguem a mesma tarefa.
         */
        async function pegarTarefa(taskId, taskName) {
            const userName = getUsuarioLogado().nome;

            if (!confirm(`Tem certeza que deseja pegar a tarefa "${taskName}"? Ela passará para sua lista "Minhas Tarefas".`)) {
                return;
            }

            try {
                const availableRef = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION).doc(taskId);
                const assignedRef = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION).doc(); // Novo ID para o registro de atribuição

                await firestore.runTransaction(async (transaction) => {
                    const taskDoc = await transaction.get(availableRef);

                    if (!taskDoc.exists) {
                        throw new Error("Tarefa não encontrada (pode ter sido pega por outro usuário).");
                    }
                    
                    const taskData = taskDoc.data();
                    
                    // 1. Deleta da lista de tarefas disponíveis
                    transaction.delete(availableRef);
                    
                    // 2. Registra na lista de tarefas atribuídas
                    const assignedData = {
                        ...taskData,
                        status: 'EmAndamento', // Novo status
                        atribuidaPara: userName,
                        dataAtribuicao: new Date().toISOString().split('T')[0] // Data de hoje
                    };
                    transaction.set(assignedRef, assignedData);
                });

                alert(`Tarefa "${taskName}" foi atribuída a você! Acesse "Minhas Tarefas" para começar.`);
                renderTarefasDisponiveis(); // Recarrega a lista
                
            } catch (error) {
                console.error("Erro na transação de pegar tarefa:", error);
                // Exibe uma mensagem de erro mais amigável
                alert(`Erro ao pegar a tarefa: ${error.message || 'Ocorreu um erro desconhecido. Tente novamente.'}`);
            }
        }

        window.addEventListener('DOMContentLoaded', renderTarefasDisponiveis);
    </script>
</body>
</html>
