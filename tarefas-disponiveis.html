<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--success-color);">Tarefas Disponíveis</h1>
        <p class="info-message" style="text-align: center;">Pegue uma tarefa para começar a ganhar pontos (e dinheiro).</p>
        <hr class="divider">
        
        <div id="tarefas-alerts"></div>

        <div id="tarefas-lista" class="historico-lista">
            <p class="empty-message">Carregando tarefas...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        const firestore = db;
        const TAREFAS_DISPONIVEIS_COLLECTION = 'tarefasDisponiveis';
        const TAREFAS_ATRIBUIDAS_COLLECTION = 'tarefasAtribuidas';

        function checkAccess() {
            const userInfo = getUsuarioLogado();
            if (!userInfo || !userInfo.nome) {
                // getUsuarioLogado já lida com o redirecionamento
                return false;
            }
            return userInfo.nome;
        }

        async function renderTarefasDisponiveis() {
            const userName = checkAccess();
            if (!userName) return;

            const listaEl = document.getElementById('tarefas-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';
            
            try {
                // Consulta que exige o índice: status (Crescente), dataCriacao (Decrescente)
                const query = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION)
                    .where('status', '==', 'Disponível')
                    .orderBy('dataCriacao', 'desc'); 
                    // Se você tivesse ordenado por 'valor', o índice teria que ser: 
                    // status (Asc), valor (Desc/Asc), dataCriacao (Desc/Asc)

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);
                    
                    const dataPrazo = t.dataPrazo || 'N/A';
                    const horarioPrazo = t.horarioPrazo || 'N/A';
                    
                    const buttonHtml = `
                        <button class="btn-rounded btn-primary wide-button" 
                                onclick="markAsEmAndamento('${taskId}', '${t.nome}')">
                            Pegar Tarefa (Status "Em Andamento")
                        </button>
                    `;
                    
                    html += `
                        <div class="tarefa-card admin-card" style="border-left-color: var(--success-color);">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome}</div>
                            </div>
                            
                            <div class="tarefa-status-line tarefa-info-status-success" style="margin-bottom: 10px;">
                                <span>Status:</span>
                                <span class="status-available">Disponível</span> 
                            </div>

                            <div class="tarefa-details-admin">
                                <div class="tarefa-info-admin">Valor: <span class="positive-text" style="font-weight: bold;">${formatarMoeda(valor)}</span></div>
                                <div class="tarefa-info-admin">Criada em: ${t.dataCriacao || 'N/A'}</div>
                                <div class="tarefa-info-admin">Prazo Limite: ${dataPrazo} ${horarioPrazo}</div>
                            </div>
                            <div style="margin-top: 15px;">
                                ${buttonHtml}
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks 
                    ? html 
                    : '<p class="empty-message">Nenhuma tarefa disponível no momento. Verifique mais tarde.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas:", error);
                // MENSAGEM DE ERRO MELHORADA
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas. Verifique os índices do Firestore no console.</p>';
                // Alerta para o usuário
                exibirAlertaGlobal('tarefas-alerts', 'Erro ao carregar tarefas. Verifique os índices do Firestore.', 'danger');
            }
        }

        // Move a tarefa de Disponível para EmAndamento
        async function markAsEmAndamento(taskId, taskName) {
            const userName = checkAccess();
            if (!userName) return;

            if (!confirm(`Deseja realmente pegar a tarefa "${taskName}"? Ela será movida para sua lista "Em Andamento".`)) {
                return;
            }
            
            // As referências para as coleções
            const availableRef = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION).doc(taskId);
            const assignedRef = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION).doc(); 

            try {
                // Usa uma transação para garantir que a tarefa não seja duplicada e movida com segurança
                await firestore.runTransaction(async (transaction) => {
                    const taskDoc = await transaction.get(availableRef);
                    
                    if (!taskDoc.exists) {
                        throw new Error("Tarefa não encontrada ou já foi pega.");
                    }

                    const taskData = taskDoc.data();
                    
                    // 1. Exclui da lista de disponíveis
                    transaction.delete(availableRef);

                    // 2. Cria na lista de atribuídas
                    const assignedData = {
                        ...taskData,
                        status: 'EmAndamento', // Novo status
                        atribuidaPara: userName, // Atribui ao usuário logado
                        dataAtribuicao: new Date().toISOString().split('T')[0]
                    };
                    
                    transaction.set(assignedRef, assignedData);
                });

                exibirAlertaGlobal('tarefas-alerts', `Tarefa "${taskName}" atribuída a você! Acesse "Minhas Tarefas" para começar.`, 'success');
                renderTarefasDisponiveis(); // Recarrega a lista
                
            } catch (error) {
                console.error("Erro ao atribuir tarefa:", error);
                exibirAlertaGlobal('tarefas-alerts', `Erro ao atribuir a tarefa: ${error.message || 'Tente novamente.'}`, 'danger');
            }
        }

        window.addEventListener('DOMContentLoaded', renderTarefasDisponiveis);
    </script>
</body>
</html>
