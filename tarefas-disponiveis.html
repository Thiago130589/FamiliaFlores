<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--primary-color);">Tarefas Disponíveis</h1>
        <hr class="divider">

        <p class="info-message">Pegue uma tarefa para começar a ganhar pontos (e dinheiro).</p>

        <div id="tarefas-lista" class="historico-lista" style="margin-top: 20px;">
            <p class="empty-message">Carregando tarefas...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        // Variável de coleção (deve ser a mesma usada no gerenciar-tarefas.html)
        const TAREFAS_DISPONIVEIS_COLLECTION = 'tarefasDisponiveis'; 
        
        // **IMPORTANTE**: Garanta que formatarMoeda e getUsuarioLogado estejam definidos em js/script.js
        // Se a função formatarMoeda não estiver em script.js, use a implementação abaixo:
        function formatarMoeda(valor) {
             return parseFloat(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function loadTarefasDisponiveis() {
            const listaEl = document.getElementById('tarefas-lista');
            
            try {
                // Realiza a consulta para buscar tarefas com status 'Disponível'
                const query = db.collection(TAREFAS_DISPONIVEIS_COLLECTION)
                    .where('status', '==', 'Disponível')
                    .orderBy('dataCriacao', 'desc');

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    html += `
                        <div class="tarefa-card user-card" data-id="${taskId}">
                            <div class="tarefa-header-user">
                                <div class="tarefa-nome-user">${t.nome}</div>
                                <div class="tarefa-valor-user positive-text">${formatarMoeda(valor)}</div>
                            </div>
                            <div class="tarefa-details-user">
                                <div class="tarefa-info-user">Criada por: ${t.criadaPor || 'Admin'}</div>
                                <div class="tarefa-info-user">Prazo: ${t.dataPrazo} às ${t.horarioPrazo}</div>
                                <div class="tarefa-info-user">Descrição: ${t.descricao}</div>
                            </div>
                            <button class="btn-rounded btn-primary wide-button" 
                                    onclick="pegarTarefa('${taskId}')">
                                PEGAR ESTA TAREFA (Status: EmAndamento)
                            </button>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks 
                    ? html 
                    : '<p class="empty-message">Nenhuma tarefa disponível no momento. Verifique mais tarde.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas disponíveis:", error);
                // Exibe uma mensagem de erro na tela
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas. Verifique a inicialização do Firebase no console.</p>';
            }
        }
        
        // Esta função deve ser implementada para simular a atribuição/movimentação da tarefa.
        async function pegarTarefa(taskId) {
            // Implementação futura:
            // 1. Obter nome do usuário logado (usando getUsuarioLogado)
            // 2. Usar uma Transação para obter, excluir da coleção 'tarefasDisponiveis' 
            //    e adicionar na coleção 'tarefasAtribuidas' com status 'EmAndamento' e 'atribuidaPara'.
            
            alert(`Ação de "Pegar Tarefa" para o ID ${taskId} será implementada em breve. O status dela mudará para 'EmAndamento' e será movida para sua lista.`);
            
            // Depois de implementar a transação de movimentação, chame:
            // loadTarefasDisponiveis(); 
        }

        // Carrega as tarefas ao carregar a página
        window.addEventListener('DOMContentLoaded', loadTarefasDisponiveis);
    </script>
</body>
</html>
