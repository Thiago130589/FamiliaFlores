<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box" style="max-width: 900px; min-width: 400px; align-items: center;">
        <h1 style="color: #1976d2; font-size: 2.2rem;">Tarefas Disponíveis</h1>
        <hr style="width: 100%; margin: 24px 0; border: none; border-top: 1px solid #eee;">
        <div id="tarefas-lista" style="width: 100%; min-height: 120px;">
            <p style="color: #888; text-align: center;">Carregando tarefas...</p>
        </div>

        <a href="index.html" class="btn-rounded" style="width: 200px; margin: 32px auto 0 auto; text-align: center;">Voltar ao perfil</a>
    </div>

    <script>
    // Obtém o nome do usuário logado do localStorage (o campo 'nome' do Firestore)
    const USUARIO_LOGADO = localStorage.getItem('user_nome'); 
    
    if (!USUARIO_LOGADO) {
        document.getElementById('tarefas-lista').innerHTML = '<p style="color: #d32f2f; text-align: center;">ERRO: Usuário não identificado. Faça login novamente.</p>';
    }

    /**
     * Move a tarefa de 'tarefasDisponiveis' para 'tarefasAtribuidas' (Minhas Tarefas).
     * @param {string} tarefaId - ID do documento da tarefa no Firestore.
     */
    async function pegarTarefa(tarefaId) {
        if (!USUARIO_LOGADO) {
            alert("Erro: Você precisa estar logado para pegar uma tarefa.");
            return;
        }

        if (!confirm(`Deseja realmente pegar esta tarefa e adicioná-la às suas tarefas?`)) {
            return;
        }

        try {
            // 1. Obtém os dados da tarefa disponível
            const tarefaDoc = await db.collection('tarefasDisponiveis').doc(tarefaId).get();
            if (!tarefaDoc.exists) {
                alert("Tarefa não encontrada.");
                renderTarefasDisponiveis();
                return;
            }

            const dadosTarefa = tarefaDoc.data();
            
            // 2. Prepara a nova tarefa para a coleção 'tarefasAtribuidas'
            const tarefaAtribuida = {
                ...dadosTarefa,
                status: 'atribuida', 
                atribuidaPara: USUARIO_LOGADO, // Atribui ao usuário logado
                dataAtribuicao: new Date().toISOString()
            };

            // 3. Usa uma transação para garantir que a cópia e a exclusão sejam atômicas
            await db.runTransaction(async (transaction) => {
                // Copia (Adiciona) a tarefa à coleção 'tarefasAtribuidas'
                await transaction.set(db.collection('tarefasAtribuidas').doc(), tarefaAtribuida);
                
                // Exclui a tarefa da coleção 'tarefasDisponiveis'
                await transaction.delete(db.collection('tarefasDisponiveis').doc(tarefaId));
            });
            
            alert(`Tarefa "${dadosTarefa.nome}" pega com sucesso e adicionada às suas tarefas!`);
            renderTarefasDisponiveis(); // Atualiza a lista
        } catch (error) {
            console.error("Erro ao pegar e mover a tarefa no Firestore:", error);
            alert(`Erro ao pegar a tarefa. Detalhes: ${error.message}`);
        }
    }


    /**
     * Função para exibir a lista de tarefas disponíveis lidas do FIRESTORE.
     */
    async function renderTarefasDisponiveis() {
        const lista = document.getElementById('tarefas-lista');
        // Sai se o DB não estiver pronto ou o usuário não estiver logado
        if (!db || !USUARIO_LOGADO) { return; } 

        lista.innerHTML = '<p style="color: #888; text-align: center;">Carregando tarefas...</p>';

        try {
            // LER as tarefas da coleção 'tarefasDisponiveis'
            const snapshot = await db.collection('tarefasDisponiveis').get();
            const tarefas = [];
            
            snapshot.forEach(doc => {
                tarefas.push({ id: doc.id, ...doc.data() });
            });

            if (!tarefas.length) {
                lista.innerHTML = '<p style="color: #888; text-align: center;">Não há tarefas disponíveis no momento.</p>';
                return;
            }
            
            // RENDERIZAR a lista com o botão "Pegar Tarefa"
            lista.innerHTML = tarefas.map((t) => `
                <div style="display: flex; align-items: center; justify-content: space-between; background: #f3f3f3; border-radius: 12px; margin: 10px 0; padding: 14px 18px;">
                    <span style="color: #1976d2; font-size: 1.1rem; font-weight: 500;">${t.nome}</span>
                    <button class="btn-rounded btn-pegar-tarefa" data-id="${t.id}" style="width: 140px; font-size: 1rem; margin-left: 18px; background: #4CAF50; color: #fff;">Pegar Tarefa</button>
                </div>
            `).join('');
            
            // Adiciona eventos aos botões
            document.querySelectorAll('.btn-pegar-tarefa').forEach(btn => {
                btn.onclick = function() {
                    pegarTarefa(this.getAttribute('data-id'));
                };
            });

        } catch (error) {
            console.error("Erro ao carregar tarefas disponíveis:", error);
            lista.innerHTML = '<p style="color: #d32f2f; text-align: center;">Erro ao carregar tarefas disponíveis.</p>';
        }
    }
    
    // Inicia a renderização ao carregar a página
    window.onload = renderTarefasDisponiveis;
    </script>
</body>
</html>
