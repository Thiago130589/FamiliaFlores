<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--primary-color);">Tarefas Disponíveis</h1>
        <hr class="divider">

        <p class="info-message">Pegue uma tarefa para começar a ganhar pontos (e dinheiro).</p>
        
        <div id="tarefas-alerts"></div> <div id="tarefas-lista" class="historico-lista" style="margin-top: 20px;">
            <p class="empty-message">Carregando tarefas...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        // COLEÇÕES E FIREBASE (db vem de firebase-init.js)
        const firestore = db;
        const TAREFAS_DISPONIVEIS_COLLECTION = 'tarefasDisponiveis'; 
        const TAREFAS_ATRIBUIDAS_COLLECTION = 'tarefasAtribuidas'; 

        // Esta função usa formatarMoeda e getUsuarioLogado de js/script.js
        async function loadTarefasDisponiveis() {
            const listaEl = document.getElementById('tarefas-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';
            
            try {
                // Realiza a consulta para buscar tarefas com status 'Disponível'
                // ATENÇÃO: Requer índice composto em 'tarefasDisponiveis' (status CRES, dataCriacao DECR)
                const query = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION)
                    .where('status', '==', 'Disponível')
                    .orderBy('dataCriacao', 'desc');

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    html += `
                        <div class="tarefa-card user-card" data-id="${taskId}">
                            <div class="tarefa-header-user">
                                <div class="tarefa-nome-user">${t.nome}</div>
                                <div class="tarefa-valor-user positive-text">${formatarMoeda(valor)}</div>
                            </div>
                            <div class="tarefa-details-user">
                                <div class="tarefa-info-user">Criada por: ${t.criadaPor || 'Admin'}</div>
                                <div class="tarefa-info-user">Prazo: ${t.dataPrazo} às ${t.horarioPrazo}</div>
                                <div class="tarefa-info-user">Descrição: ${t.descricao}</div>
                            </div>
                            <button class="btn-rounded btn-primary wide-button" 
                                    onclick="pegarTarefa('${taskId}')">
                                PEGAR ESTA TAREFA (Status: EmAndamento)
                            </button>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks 
                    ? html 
                    : '<p class="empty-message">Nenhuma tarefa disponível no momento. Verifique mais tarde.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas disponíveis:", error);
                // Usa a função global
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas. Verifique os índices do Firestore.</p>'; 
            }
        }
        
        // FUNÇÃO DE MOVIMENTAÇÃO DE TAREFA (Implementação Completa)
        async function pegarTarefa(taskId) {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                exibirAlertaGlobal('tarefas-alerts', "Você deve estar logado para pegar uma tarefa.", 'danger');
                return;
            }

            if (!confirm(`Tem certeza que deseja pegar esta tarefa? Ela será adicionada à sua lista como "EmAndamento".`)) {
                return;
            }
            
            const availableRef = firestore.collection(TAREFAS_DISPONIVEIS_COLLECTION).doc(taskId);

            try {
                // Usa uma Transação para garantir que a tarefa seja movida atomicamente
                await firestore.runTransaction(async (transaction) => {
                    const taskDoc = await transaction.get(availableRef);
                    
                    if (!taskDoc.exists) {
                        throw new Error("Tarefa não encontrada ou já foi pega por outro membro.");
                    }
                    
                    const taskData = taskDoc.data();
                    
                    // 1. Exclui da lista de disponíveis
                    transaction.delete(availableRef);

                    // 2. Cria na lista de atribuídas com os dados do usuário e novo status
                    const assignedRef = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION).doc();
                    
                    const assignedData = {
                        ...taskData,
                        status: 'EmAndamento', 
                        atribuidaPara: userInfo.nome,
                        dataAtribuicao: new Date().toISOString().split('T')[0] 
                    };
                    
                    transaction.set(assignedRef, assignedData);
                });

                exibirAlertaGlobal('tarefas-alerts', `Parabéns! Tarefa pega com sucesso e adicionada à sua lista de "Em Andamento".`, 'success');
                
                // Recarrega a lista para remover a tarefa que foi pega
                loadTarefasDisponiveis(); 

            } catch (error) {
                console.error("Erro ao pegar tarefa:", error);
                exibirAlertaGlobal('tarefas-alerts', `Erro ao pegar a tarefa: ${error.message || 'Tente novamente.'}`, 'danger');
            }
        }

        // Carrega as tarefas ao carregar a página
        window.addEventListener('DOMContentLoaded', loadTarefasDisponiveis);
    </script>
</body>
</html>
