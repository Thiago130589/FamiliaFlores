<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Disponíveis</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title-blue">Tarefas Disponíveis</h1>
        <hr class="divider">

        <div id="tarefas-list" style="width: 100%;">
            <p id="loading-message">Carregando tarefas...</p>
        </div>

        <button onclick="voltarAoPerfil()" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">Voltar ao perfil</button>
    </div>

    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }

        // Função utilitária para obter o objeto completo do usuário
        function getUsuarioObjeto() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                return JSON.parse(storedValue);
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }
        
        // Função para carregar tarefas com status 'disponivel'
        async function loadTarefasDisponiveis() {
            const lista = document.getElementById('tarefas-list');
            lista.innerHTML = '<p class="empty-message">Carregando tarefas...</p>';
            
            const user = getUsuarioObjeto();
            if (!user || !user.nome) {
                lista.innerHTML = '<p class="error-message">ERRO: Usuário não identificado. Faça login novamente.</p>';
                return;
            }

            try {
                // Busca todas as tarefas da coleção 'tarefasDisponiveis'
                const snapshot = await firestore.collection('tarefasDisponiveis')
                    .orderBy('criadaEm', 'asc') // Ordenar do mais antigo para o mais novo
                    .get();

                // Limpa a lista antes de preencher
                lista.innerHTML = ''; 

                if (snapshot.empty) {
                    lista.innerHTML = '<p class="empty-message">Não há tarefas disponíveis no momento.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const tarefa = doc.data();
                    const elemento = document.createElement('div');
                    elemento.className = 'tarefa-card';
                    
                    const dataFormatada = new Date(tarefa.data).toLocaleDateString('pt-BR');

                    elemento.innerHTML = `
                        <div class="tarefa-details">
                            <span class="tarefa-nome">${tarefa.nome} (${dataFormatada})</span>
                            <span class="tarefa-info">
                                Valor: R$ ${parseFloat(tarefa.valor || 0).toFixed(2).replace('.', ',')} | ${tarefa.inicio} - ${tarefa.fim}
                            </span>
                        </div>
                        <button onclick="pegarTarefa('${doc.id}')" class="btn-rounded btn-green">Pegar Tarefa</button>
                    `;
                    lista.appendChild(elemento);
                });

            } catch (error) {
                console.error("Erro ao carregar tarefas disponíveis:", error);
                lista.innerHTML = `<p class="error-message">Erro ao carregar tarefas. Verifique o Console (F12).</p>`;
            }
        }

        // Função para mover a tarefa para 'tarefasAtribuidas' (transação)
        async function pegarTarefa(taskId) {
            const user = getUsuarioObjeto();
            if (!user || !user.nome) {
                alert('Usuário não identificado. Faça login novamente.');
                return;
            }

            if (!confirm(`Tem certeza que deseja pegar a tarefa?`)) {
                return;
            }

            try {
                const taskRef = firestore.collection('tarefasDisponiveis').doc(taskId);
                const assignedRef = firestore.collection('tarefasAtribuidas').doc(); // Novo Doc ID
                
                const batch = firestore.batch();

                const taskDoc = await taskRef.get();
                
                if (!taskDoc.exists) {
                    alert('A tarefa foi recentemente pega por outro membro.');
                    loadTarefasDisponiveis(); 
                    return;
                }

                const tarefaData = taskDoc.data();
                
                // 1. Prepara a nova tarefa para a coleção 'tarefasAtribuidas'
                const novaTarefaAtribuida = {
                    ...tarefaData, // Copia todos os campos da tarefa disponível
                    status: 'atribuida', // Novo status
                    dataAtribuicao: new Date().toISOString(),
                    atribuidaPara: user.nome // Apenas o nome do usuário
                };

                // Remove o campo 'status' antigo se ele existir na cópia (se houver)
                delete novaTarefaAtribuida.status; 
                
                // Adiciona a tarefa na coleção 'tarefasAtribuidas'
                batch.set(assignedRef, novaTarefaAtribuida);

                // 2. Deleta a tarefa da coleção 'tarefasDisponiveis'
                batch.delete(taskRef);
                
                // 3. Executa o lote de operações
                await batch.commit();
                
                alert(`Tarefa "${tarefaData.nome}" atribuída a você! Vá para "Minhas Tarefas" para ver.`);
                loadTarefasDisponiveis(); // Recarrega a lista
            } catch (e) {
                console.error("Erro ao pegar a tarefa:", e);
                alert('Erro ao atribuir a tarefa. Tente novamente.');
            }
        }

        window.addEventListener('DOMContentLoaded', loadTarefasDisponiveis);
    </script>
</body>
</html>
