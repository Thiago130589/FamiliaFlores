<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas Concluídas</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--primary-color);">Minhas Tarefas (Histórico)</h1>
        <p class="info-message" id="page-subtitle" style="text-align: center;">Tarefas que você concluiu ou que estão em espera de pagamento.</p>
        <hr class="divider">
        
        <div id="historico-lista" class="historico-lista">
            <p class="empty-message">Carregando histórico...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const TAREFAS_ATRIBUIDAS_COLLECTION = 'tarefasAtribuidas';

        // 1. Verifica Acesso
        function checkAccess() {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                window.location.href = 'login.html';
                return false;
            }
            return userInfo.nome;
        }

        // 2. Renderiza a lista de tarefas marcadas como concluídas pelo usuário
        async function renderHistoricoTarefas() {
            const userName = checkAccess();
            if (!userName) return;

            const listaEl = document.getElementById('historico-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';
            
            try {
                // Filtra por tarefas atribuídas a este usuário E que estão em status de conclusão/pagamento
                const query = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION)
                    .where('atribuidaPara', '==', userName)
                    .where('status', 'in', ['PendenteAprovacao', 'PendentePagamento'])
                    .orderBy('dataConclusao', 'desc');

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    let statusText, statusClass, buttonHtml = '';

                    if (t.status === 'PendenteAprovacao') {
                        statusText = 'Aguardando Aprovação Admin';
                        statusClass = 'tarefa-info-status-warning';
                    } else if (t.status === 'PendentePagamento') {
                        statusText = 'Pronta para Pagamento Admin';
                        statusClass = 'tarefa-info-status-info';
                    }
                    
                    // Estrutura do Card
                    html += `
                        <div class="tarefa-card admin-card" style="border-left-color: ${t.status === 'PendenteAprovacao' ? 'var(--warning-color)' : 'var(--info-color)'};">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome}</div>
                            </div>
                            
                            <div class="tarefa-status-line ${statusClass}" style="margin-bottom: 10px;">
                                <span>Status:</span>
                                <span style="font-weight: bold;">${statusText}</span>
                            </div>

                            <div class="tarefa-details-admin">
                                <div class="tarefa-info-admin">Valor: <span class="positive-text" style="font-weight: bold;">${formatarMoeda(valor)}</span></div>
                                <div class="tarefa-info-admin">Marcada como Concluída em: ${t.dataConclusao || 'N/A'}</div>
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks ? html : '<p class="empty-message">Você ainda não marcou tarefas como concluídas.</p>';

            } catch (error) {
                console.error("Erro ao carregar histórico de tarefas:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar o histórico.</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', renderHistoricoTarefas);
    </script>
</body>
</html>
