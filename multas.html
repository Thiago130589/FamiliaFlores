<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Multas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="center-box" style="max-width: 900px; min-width: 400px; align-items: center; position: relative;">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; color: #1976d2; font-size: 2.2rem;">Multas</h1>
            <div id="multas-clock" style="font-size: 1.1rem; color: #d32f2f; font-weight: bold;"></div>
        </div>
        <hr style="width: 100%; margin: 24px 0; border: none; border-top: 1px solid #eee;">
        <div id="multas-lista" style="width: 100%; min-height: 120px;"></div>
        <button id="btn-adicionar-multa" class="btn-rounded" style="width: 220px; max-width: 90vw; font-size: 1.1rem; margin: 32px auto 0 auto; display: block;">Adicionar multa</button>
        <!-- Popup de criação de multa -->
        <div id="popup-multa" style="display:none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.35); z-index: 1000; align-items: center; justify-content: center;">
            <div style="background: #fff; border-radius: 18px; padding: 32px 24px; min-width: 320px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 18px; align-items: stretch;">
                <h2 style="color: #d32f2f; margin: 0 0 12px 0; text-align: center;">Adicionar Multa</h2>
                <label>Nome do membro:</label>
                <select id="multa-membro" class="input-rounded"></select>
                <label>Motivo:</label>
                <input id="multa-motivo" class="input-rounded" type="text" placeholder="Motivo da multa">
                <label>Valor:</label>
                <input id="multa-valor" class="input-rounded" type="number" min="0" step="0.01" placeholder="Valor da multa">
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn-rounded" id="btn-finalizar-multa" style="width: 120px;">Finalizar</button>
                    <button class="btn-rounded" id="btn-cancelar-multa" style="width: 120px; background: #eee; color: #1976d2;">Cancelar</button>
                </div>
                <div id="multa-erro" style="color: #d32f2f; min-height: 20px; text-align: center;"></div>
            </div>
        </div>
        <!-- Popup de confirmação de remoção -->
        <div id="popup-remover-multa" style="display:none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.35); z-index: 2000; align-items: center; justify-content: center;">
            <div style="background: #fff; border-radius: 18px; padding: 32px 24px; min-width: 320px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 18px; align-items: stretch;">
                <div id="remover-multa-msg" style="color: #d32f2f; text-align: center; margin-bottom: 18px;"></div>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button class="btn-rounded" id="btn-confirmar-remover-multa" style="width: 120px; background: #d32f2f; color: #fff;">Remover</button>
                    <button class="btn-rounded" id="btn-cancelar-remover-multa" style="width: 120px; background: #eee; color: #1976d2;">Cancelar</button>
                </div>
            </div>
        </div>
        <a href="index.html" class="btn-rounded" style="width: 200px; margin: 32px auto 0 auto; text-align: center; display: block;">Voltar ao perfil</a>
    </div>
    <script>
    // Relógio horário de Brasília
    function startBrasiliaClockMultas() {
        function updateClock() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const brasilia = new Date(utc - (3 * 60 * 60 * 1000));
            const h = String(brasilia.getHours()).padStart(2, '0');
            const m = String(brasilia.getMinutes()).padStart(2, '0');
            const s = String(brasilia.getSeconds()).padStart(2, '0');
            document.getElementById('multas-clock').textContent = `${h}:${m}:${s} (Brasília)`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    }
    startBrasiliaClockMultas();

    // Renderizar lista de multas
    function renderMultas() {
        const lista = document.getElementById('multas-lista');
        let membros = JSON.parse(localStorage.getItem('usuarios') || '[]');
        let temMulta = false;
        let html = '';
        membros.forEach(m => {
            let carteira = JSON.parse(localStorage.getItem('carteira_' + m.nome) || '[]');
            let multas = carteira.map((item, idx) => ({...item, idx})).filter(item => item.valor < 0);
            if (multas.length) {
                temMulta = true;
                html += `<div style=\"margin-bottom: 18px;\"><b style=\"color:#1976d2;\">${m.nome}</b><ul style=\"margin: 8px 0 0 0; padding-left: 18px; color: #d32f2f;\">`;
                multas.forEach((multa, i) => {
                    const valor = (-multa.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    const data = new Date(multa.data).toLocaleDateString('pt-BR');
                    html += `<li>Motivo: <b>${multa.motivo}</b> | Valor: <b style=\"color:#d32f2f;\">${valor}</b> | Data: ${data} <button class=\"btn-rounded btn-remover-multa\" data-membro=\"${m.nome}\" data-idx=\"${multa.idx}\" style=\"margin-left: 12px; background: #d32f2f; color: #fff; font-size: 0.95rem; padding: 2px 10px;\">Remover</button></li>`;
                });
                html += `</ul></div>`;
            }
        });
        if (!temMulta) {
            html = `<div style=\"color: #888; text-align: center; margin: 24px 0;\">Nenhuma multa registrada.</div>`;
        }
        lista.innerHTML = html;
        // Eventos de remover multa
        document.querySelectorAll('.btn-remover-multa').forEach(btn => {
            btn.onclick = function() {
                const membro = this.getAttribute('data-membro');
                const idx = parseInt(this.getAttribute('data-idx'));
                abrirPopupRemoverMulta(membro, idx);
            };
        });
    }
    // Adicionar multa
    document.getElementById('btn-adicionar-multa').onclick = () => {
        let membros = JSON.parse(localStorage.getItem('usuarios') || '[]');
        const select = document.getElementById('multa-membro');
        select.innerHTML = membros.map(m => `<option value="${m.nome}">${m.nome}</option>`).join('');
        document.getElementById('multa-motivo').value = '';
        document.getElementById('multa-valor').value = '';
        document.getElementById('multa-erro').textContent = '';
        document.getElementById('popup-multa').style.display = 'flex';
    };
    document.getElementById('btn-cancelar-multa').onclick = () => {
        document.getElementById('popup-multa').style.display = 'none';
    };
    document.getElementById('btn-finalizar-multa').onclick = () => {
        const membro = document.getElementById('multa-membro').value;
        const motivo = document.getElementById('multa-motivo').value.trim();
        const valor = document.getElementById('multa-valor').value;
        if (!membro || !motivo || !valor) {
            document.getElementById('multa-erro').textContent = 'Preencha todos os campos.';
            return;
        }
        let carteira = JSON.parse(localStorage.getItem('carteira_' + membro) || '[]');
        carteira.push({ motivo, valor: -Math.abs(parseFloat(valor)), data: new Date().toISOString() });
        localStorage.setItem('carteira_' + membro, JSON.stringify(carteira));
        document.getElementById('popup-multa').style.display = 'none';
        renderMultas();
    };
    // Remover multa
    function abrirPopupRemoverMulta(membro, idx) {
        document.getElementById('remover-multa-msg').innerHTML = `Deseja remover esta multa de <b>${membro}</b>?`;
        document.getElementById('popup-remover-multa').style.display = 'flex';
        document.getElementById('btn-confirmar-remover-multa').onclick = () => {
            let carteira = JSON.parse(localStorage.getItem('carteira_' + membro) || '[]');
            carteira = carteira.filter((item, i) => i !== idx);
            localStorage.setItem('carteira_' + membro, JSON.stringify(carteira));
            document.getElementById('popup-remover-multa').style.display = 'none';
            renderMultas();
        };
        document.getElementById('btn-cancelar-remover-multa').onclick = () => {
            document.getElementById('popup-remover-multa').style.display = 'none';
        };
    }
    renderMultas();
    </script>
</body>
</html>
