<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title">Cadastro de Usuário</h1>
        <p style="text-align: center; margin-bottom: 20px;">Crie sua conta para começar.</p>
        <hr class="divider">

        <div class="form-group">
            <label for="reg-username">Nome de Usuário (Apelido)</label>
            <input type="text" id="reg-username" class="input-rounded" placeholder="Seu nome, sem espaços" required>
        </div>

        <div class="form-group">
            <label for="reg-password">Senha</label>
            <input type="password" id="reg-password" class="input-rounded" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
            <label for="reg-confirm-password">Confirmar Senha</label>
            <input type="password" id="reg-confirm-password" class="input-rounded" placeholder="Repita a senha" required>
        </div>

        <button onclick="registerUser()" class="btn-rounded btn-primary wide-button" style="margin-top: 20px;">
            Cadastrar
        </button>

        <a href="login.html" class="btn-secondary-text wide-button" style="text-align: center; display: block; margin-top: 15px;">Já tem conta? Faça login.</a>

        <p id="register-message" class="error-message hidden-start" role="alert" style="margin-top: 15px; text-align: center;"></p>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        async function registerUser() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const confirmPassword = document.getElementById('reg-confirm-password').value.trim();
            const messageEl = document.getElementById('register-message');

            messageEl.classList.add('hidden-start');
            messageEl.textContent = '';
            messageEl.classList.remove('error-message', 'positive-text');

            if (!username || !password || !confirmPassword) {
                messageEl.textContent = 'Por favor, preencha todos os campos.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }

            if (password !== confirmPassword) {
                messageEl.textContent = 'As senhas não coincidem.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }

            if (password.length < 6) {
                messageEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }
            
            // Não permite espaços no nome de usuário
            if (username.includes(' ')) {
                messageEl.textContent = 'O nome de usuário não pode conter espaços.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }


            try {
                // 1. Verifica se o usuário já existe
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(username).get();

                if (userDoc.exists) {
                    messageEl.textContent = 'Nome de usuário já está em uso.';
                    messageEl.classList.add('error-message');
                    messageEl.classList.remove('hidden-start');
                    return;
                }

                // 2. Cria o novo usuário
                // ATENÇÃO: A senha está sendo salva em texto puro. Em um ambiente de produção, use hashing (ex: Firebase Authentication)
                await firestore.collection(USERS_COLLECTION).doc(username).set({
                    nome: username,
                    senha: password, // Senha não segura!
                    saldo: 0, 
                    isAdmin: false, 
                    dataCadastro: new Date().toISOString()
                });

                // 3. Sucesso e redirecionamento
                messageEl.textContent = 'Cadastro realizado com sucesso! Redirecionando para o login...';
                messageEl.classList.add('positive-text'); // Usa a classe positiva para sucesso
                messageEl.classList.remove('hidden-start');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error("Erro no cadastro:", error);
                messageEl.textContent = 'Erro ao tentar cadastrar. Tente novamente.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
            }
        }
    </script>
</body>
</html>
