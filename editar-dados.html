<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Dados do Perfil</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
    <script src="js/script.js"></script> 
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title">Editar Dados Pessoais</h1>
        <h2 id="user-title" class="main-title-green"></h2>
        <hr class="divider">
        
        <form id="edit-form">
            <label class="input-label" for="new-nome">Nome de Usuário (ID):</label>
            <input type="text" id="new-nome" class="input-rounded" disabled title="O nome de usuário primário não pode ser alterado.">
            
            <label class="input-label" for="new-displayname">Nome de Exibição Completo:</label>
            <input type="text" id="new-displayname" class="input-rounded" placeholder="Ex: Maria Flores" required>

            <label class="input-label" for="new-idade">Idade:</label>
            <input type="number" id="new-idade" class="input-rounded" min="1" max="150" required>

            <label class="input-label" for="new-senha">Nova Senha (Opcional):</label>
            <input type="password" id="new-senha" class="input-rounded" placeholder="Deixe em branco para não alterar a senha">
            
            <label class="input-label" for="confirm-senha">Confirmar Nova Senha:</label>
            <input type="password" id="confirm-senha" class="input-rounded">
            
            <div id="status-message" class="error-message" style="margin-top: 20px; min-height: 20px;"></div>

            <button type="submit" class="btn-rounded btn-primary wide-button" style="margin-top: 20px;">Salvar Alterações</button>
        </form>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button">Voltar ao Perfil</a>
    </div>

    <script>
        // Agora, se o script.js for carregado, 'getUsuarioLogado' já deve estar global
        // Se esta página for acessada via dashboard, usamos a lógica do usuário logado, não via URL.
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';
        
        let usuarioSendoEditado = ''; // Será o ID do usuário logado

        async function loadUserData() {
            // Usa o getUsuarioLogado() do script.js
            const user = getUsuarioLogado(); 
            if (!user) return; // Redirecionado para login

            // O usuário a ser editado é o próprio usuário logado
            usuarioSendoEditado = user.nome;

            // Altera o link de volta se o usuário for um administrador gerenciando outro perfil (lógica avançada)
            const adminData = getUsuarioLogado(); 
            const isEditingSelf = (adminData.nome === usuarioSendoEditado);
            if (!isEditingSelf && (adminData.role === 'Admin' || adminData.role === 'Administrador')) {
                 document.querySelector('a.btn-rounded').href = 'gerenciar-perfis.html';
                 document.getElementById('user-title').textContent = `Editando: ${usuarioSendoEditado}`;
            } else {
                 document.getElementById('user-title').textContent = 'Seus Dados';
            }


            try {
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(usuarioSendoEditado).get();
                if (!userDoc.exists) {
                    document.getElementById('status-message').className = 'error-message';
                    document.getElementById('status-message').textContent = 'Erro: Perfil não encontrado no banco de dados.';
                    return;
                }

                const userData = userDoc.data();
                
                // Preenche os campos
                document.getElementById('new-nome').value = usuarioSendoEditado;
                document.getElementById('new-displayname').value = userData.displayName || '';
                document.getElementById('new-idade').value = userData.idade || '';
                
                document.getElementById('status-message').textContent = 'Dados carregados. Edite e salve.';

            } catch (error) {
                console.error("Erro ao carregar dados do usuário:", error);
                document.getElementById('status-message').className = 'error-message';
                document.getElementById('status-message').textContent = 'Erro ao carregar dados. Verifique a conexão.';
            }
        }

        async function saveChanges(event) {
            event.preventDefault();
            const statusEl = document.getElementById('status-message');
            statusEl.className = 'info-message';
            statusEl.textContent = 'Verificando e salvando...';
            
            const user = getUsuarioLogado();
            if (!user) return; 

            const newDisplayName = document.getElementById('new-displayname').value.trim();
            const newIdade = parseInt(document.getElementById('new-idade').value);
            const newSenha = document.getElementById('new-senha').value;
            const confirmSenha = document.getElementById('confirm-senha').value;

            // 1. Validação de Senha
            if (newSenha && newSenha !== confirmSenha) {
                statusEl.className = 'error-message';
                statusEl.textContent = 'As senhas não coincidem.';
                return;
            }

            // 2. Monta o objeto de atualização
            const updates = {};
            updates.displayName = newDisplayName;
            updates.idade = newIdade;

            if (newSenha) {
                updates.senha = newSenha; 
            }

            if (Object.keys(updates).length === 0) {
                statusEl.className = 'error-message';
                statusEl.textContent = 'Nenhuma alteração detectada.';
                return;
            }

            // 3. Salva no Firestore
            try {
                const userRef = firestore.collection(USERS_COLLECTION).doc(user.nome);
                await userRef.update(updates);

                statusEl.className = 'success-message';
                statusEl.textContent = 'Dados do perfil atualizados com sucesso!';
                
                document.getElementById('new-senha').value = '';
                document.getElementById('confirm-senha').value = '';

                // Atualiza o localStorage com os novos dados
                const updatedData = { ...user, ...updates };
                // Garante que a senha não vá para o localStorage
                delete updatedData.senha; 
                localStorage.setItem('usuarioLogado', JSON.stringify(updatedData));


            } catch (error) {
                console.error("Erro ao salvar alterações:", error);
                statusEl.className = 'error-message';
                statusEl.textContent = 'Erro ao salvar alterações. Tente novamente.';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            document.getElementById('edit-form').addEventListener('submit', saveChanges);
        });
    </script>
</body>
</html>
