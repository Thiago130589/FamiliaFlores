<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title">Editar Perfil</h1>
        <p style="text-align: center; margin-bottom: 20px;">Altere sua senha de acesso.</p>
        <hr class="divider">
        
        <div id="user-info-display" class="modal-info-visible" style="margin-bottom: 20px;">
            Carregando usuário...
        </div>

        <div class="form-group">
            <label for="new-password">Nova Senha</label>
            <input type="password" id="new-password" class="input-rounded" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
            <label for="confirm-password">Confirmar Nova Senha</label>
            <input type="password" id="confirm-password" class="input-rounded" placeholder="Repita a nova senha" required>
        </div>

        <button onclick="updatePassword()" class="btn-rounded btn-primary wide-button" style="margin-top: 20px;">
            Salvar Nova Senha
        </button>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 15px;">Voltar ao Dashboard</a>

        <p id="message-area" class="error-message hidden-start" role="alert" style="margin-top: 15px; text-align: center;"></p>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        let usuarioNome = '';

        // Carrega as informações do usuário logado (apenas para exibição)
        function loadProfile() {
            const userInfo = getUsuarioLogado();
            const infoDisplay = document.getElementById('user-info-display');
            
            if (!userInfo || !userInfo.nome) {
                window.location.href = 'login.html';
                return;
            }
            
            usuarioNome = userInfo.nome;
            infoDisplay.textContent = `Usuário logado: ${usuarioNome}`;
            
            // Define o foco no primeiro campo de senha
            document.getElementById('new-password').focus();
        }

        // Função para atualizar a senha no Firestore
        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const messageEl = document.getElementById('message-area');

            messageEl.classList.add('hidden-start');
            messageEl.textContent = '';
            messageEl.classList.remove('error-message', 'positive-text');
            
            if (!usuarioNome) return;

            if (!newPassword || !confirmPassword) {
                messageEl.textContent = 'Preencha os dois campos de senha.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }

            if (newPassword !== confirmPassword) {
                messageEl.textContent = 'As senhas não coincidem.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }
            
            if (newPassword.length < 6) {
                messageEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
                return;
            }

            // Confirmação antes de salvar no banco
            if (!confirm("Tem certeza que deseja alterar sua senha?")) {
                return;
            }

            try {
                // Atualiza a senha no documento do Firestore
                await firestore.collection('users').doc(usuarioNome).update({
                    senha: newPassword // Senha não segura!
                });

                messageEl.textContent = 'Senha alterada com sucesso!';
                messageEl.classList.add('positive-text');
                messageEl.classList.remove('hidden-start');
                
                // Limpa os campos após o sucesso
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';

                // Redireciona após um pequeno atraso
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error("Erro ao atualizar a senha:", error);
                messageEl.textContent = 'Erro ao salvar a nova senha. Tente novamente.';
                messageEl.classList.add('error-message');
                messageEl.classList.remove('hidden-start');
            }
        }

        window.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
