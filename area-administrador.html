<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Administrador</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script> 
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title">Área do Administrador</h1>
        <a href="index.html" class="btn-secondary-text btn-rounded" style="margin-bottom: 20px;">
            &#8592; Voltar para o Dashboard
        </a>
        <hr class="divider">

        <div id="admin-content" style="display: none;">
            
            <p style="text-align: center; color: #666; font-size: 1.1rem; margin-bottom: 25px;">Selecione uma opção de gerenciamento:</p>

            <div class="admin-links-grid-full">
                <a href="gerenciar-tarefas.html" class="btn-rounded btn-primary">Gerenciar Tarefas</a>
                <a href="gerenciar-perfis.html" class="btn-rounded btn-primary">Gerenciar Perfis</a>
                <a href="multas.html" class="btn-rounded btn-danger">Aplicar Multas</a>
                <a href="historico-pagamentos.html" class="btn-rounded btn-success">Pagamentos Pendentes</a>
                <a href="tornar-administrador.html" class="btn-rounded btn-secondary">Gerenciar Admins</a>
            </div>
        </div>

        <div id="acesso-negado" style="display: none; text-align: center; margin-top: 50px;">
            <h2 class="error-color">Acesso Negado</h2>
            <p>Seu perfil não possui permissão para acessar esta área.</p>
            <button class="btn-rounded btn-primary" onclick="window.location.href='index.html'" style="margin-top: 20px;">
                Voltar
            </button>
        </div>
    </div>

    <script>
        // Função utilitária para pegar o usuário logado e redirecionar se não existir
        function getUsuarioLogado() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                return JSON.parse(storedValue);
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo) return; // Se não estiver logado, já foi redirecionado

            // Verifica o status de administrador
            if (userInfo.isAdmin === true) {
                // Se for admin, mostra o conteúdo
                document.getElementById('admin-content').style.display = 'block';
            } else {
                // Se não for admin, mostra o acesso negado
                document.getElementById('acesso-negado').style.display = 'block';
            }
        });
    </script>
</body>
</html>
