<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Tarefas | Admin</title>
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="firebase-init.js"></script>
    <script src="script.js"></script>
    
    <style>
        /* Estilos da barra de botões mantidos */
        .task-view-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-view-switch {
            flex: 1;
            padding: 12px 10px;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            background-color: transparent;
            color: var(--primary-color);
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .btn-view-switch.active {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
        }
        .filter-section {
            padding: 15px;
            background-color: #f7f7f7;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }
        .hidden {
            display: none;
        }
        
        /* Novas Classes de Cores para o status/borda */
        .color-disponivel {
            color: var(--success-color); /* Verde */
            border-left-color: var(--success-color) !important;
        }
        .color-pendente {
            color: var(--warning-color); /* Amarelo */
            border-left-color: var(--warning-color) !important;
        }
        .color-vencido {
            color: var(--danger-color); /* Vermelho */
            border-left-color: var(--danger-color) !important;
        }
        .color-concluida {
            color: #4a4a4a; /* Preto/Cinza Escuro */
            border-left-color: #4a4a4a !important;
        }
    </style>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title"><i class="fas fa-tasks"></i> Gestão de Tarefas</h1>
        <p class="info-message" style="text-align: center;">Central de aprovação e histórico de tarefas dos membros.</p>
        <hr class="divider">
        
        <div id="tarefas-alerts"></div>

        <div class="task-view-switcher">
            <button id="btn-pendentes" class="btn-view-switch active" 
                    onclick="switchView('pendentes')">
                <i class="fas fa-exclamation-triangle"></i> Tarefas Pendentes
            </button>
            <button id="btn-historico" class="btn-view-switch" 
                    onclick="switchView('historico')">
                <i class="fas fa-history"></i> Histórico de Tarefas
            </button>
        </div>
        
        <hr class="divider">

        <div id="filter-section" class="filter-section hidden">
            <label for="filtro-usuario">Filtrar Histórico por Usuário:</label>
            <select id="filtro-usuario" class="input-rounded" onchange="renderTarefas(false, this.value)">
                <option value="todos-historico">TODOS OS USUÁRIOS (Histórico)</option>
                <option value="loading" disabled>Carregando usuários...</option>
            </select>
        </div>

        <h2 id="tarefas-titulo">Tarefas Pendentes de Aprovação</h2>
        
        <div id="tarefas-lista" class="historico-lista">
            <p class="empty-message">Nenhuma tarefa pendente de aprovação.</p>
        </div>

        <a href="painel-admin.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </div>

    <script>
        // firestore já está definido como 'db' em firebase-init.js
        const firestore = db;
        // Definimos as coleções para garantir a consistência
        const TAREFAS_ATRIBUIDAS_COLLECTION = 'tarefasAtribuidas';
        const HISTORICO_PAGAMENTOS_COLLECTION = 'historicoPagamentos'; 
        const USERS_COLLECTION = 'users';

        // Variável de estado para a visão atual
        let currentView = 'pendentes'; 

        /**
         * Verifica o acesso de administrador e retorna o objeto do admin.
         */
        function checkAdminAccessAndLoad() {
            // Assume que 'getUsuarioLogado' e 'exibirAlertaGlobal' estão em 'script.js'
            const userInfo = getUsuarioLogado();
            if (!userInfo || userInfo.isAdmin !== true) {
                 // Se não for admin, redireciona para a home
                 window.location.href = 'index.html'; 
                 return null;
            }
            return userInfo;
        }

        // --- População e Filtro de Usuários ---

        async function loadUserDropdown() {
            const selectEl = document.getElementById('filtro-usuario');
            selectEl.innerHTML = '<option value="todos-historico">TODOS OS USUÁRIOS (Histórico)</option>';

            try {
                const usersSnapshot = await firestore.collection(USERS_COLLECTION).orderBy('nome').get();
                
                usersSnapshot.forEach(doc => {
                    const userData = doc.data();
                    const userUID = doc.id; 
                    
                    if (userData.isAdmin !== true) { 
                        const option = document.createElement('option');
                        option.value = userUID; // O valor é o UID do usuário
                        option.textContent = `${userData.nome} (${userUID})`;
                        selectEl.appendChild(option);
                    }
                });
            } catch (error) {
                console.error("Erro ao carregar usuários:", error);
                exibirAlertaGlobal('tarefas-alerts', 'Erro ao carregar lista de usuários para filtro.', 'danger');
            }
        }
        
        /**
         * Alterna a visão entre Pendentes e Histórico e renderiza.
         */
        function switchView(view) {
            currentView = view;
            
            const btnPendentes = document.getElementById('btn-pendentes');
            const btnHistorico = document.getElementById('btn-historico');
            const filterSection = document.getElementById('filter-section');
            
            if (view === 'pendentes') {
                btnPendentes.classList.add('active');
                btnHistorico.classList.remove('active');
                filterSection.classList.add('hidden');
                renderTarefas(true); // renderiza pendentes
            } else {
                btnPendentes.classList.remove('active');
                btnHistorico.classList.add('active');
                filterSection.classList.remove('hidden');
                // Pega o valor do filtro atual para renderizar o histórico
                const filtroUsuario = document.getElementById('filtro-usuario').value; 
                renderTarefas(false, filtroUsuario); // renderiza histórico (filtrado ou todos)
            }
        }
        
        /**
         * Determina a classe de cor da borda/status com base nas regras do Admin.
         */
        function getTaskColorClass(taskData) {
            // Verifica se o prazo está vencido (prioridade alta)
            if (taskData.dataPrazo) {
                const prazoCompleto = `${taskData.dataPrazo} ${taskData.horarioPrazo || '23:59'}`;
                const prazoDate = new Date(prazoCompleto.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1'));
                const now = new Date();
                
                // Prazo vencido se a tarefa não estiver Paga ou Reprovada
                if (prazoDate < now && taskData.status !== 'Paga' && taskData.status !== 'Reprovada') {
                    return 'color-vencido'; // Vermelho
                }
            }
            
            // Verifica status específicos
            switch(taskData.status) {
                case 'Pendente':
                    return 'color-pendente'; // Amarelo
                case 'Disponível':
                case 'Criada':
                case 'EmAndamento': // Em andamento ainda é 'ativa' ou 'disponível' para fins de cor
                    return 'color-disponivel'; // Verde
                case 'Paga':
                case 'Reprovada':
                case 'Concluída': // 'Concluída' (aprovada/aguardando pagamento) ou status final
                    return 'color-concluida'; // Preto/Cinza Escuro
                default:
                    return 'color-concluida';
            }
        }


        // --- Renderização de Tarefas ---
        // isPendingView: true para Pendentes, false para Histórico
        // filtroUID: UID do usuário para histórico, ou 'todos-historico'
        async function renderTarefas(isPendingView = true, filtroUID = 'todos-historico') {
            const adminUser = checkAdminAccessAndLoad();
            if (!adminUser) return;

            const listaEl = document.getElementById('tarefas-lista');
            const tituloEl = document.getElementById('tarefas-titulo');
            
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';
            let query;

            // 1. Visão Padrão: Todas as Pendentes de Aprovação (Para o Admin agir)
            if (isPendingView) {
                tituloEl.textContent = 'Tarefas Pendentes de Aprovação';
                query = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION)
                    .where('status', '==', 'Pendente') 
                    .orderBy('dataConclusao', 'asc');
            } 
            // 2. Visão Histórico: TODAS as tarefas, opcionalmente filtradas por UID
            else {
                let tituloNome = 'Todos os Usuários';
                if (filtroUID !== 'todos-historico') {
                    const selectEl = document.getElementById('filtro-usuario');
                    tituloNome = selectEl.options[selectEl.selectedIndex].textContent.split('(')[0].trim();
                    
                    // Filtra pelo UID
                    query = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION)
                        .where('usuarioUID', '==', filtroUID)
                        .orderBy('dataCriacao', 'desc');
                } else {
                    // Busca todas as tarefas no sistema
                    tituloEl.textContent = `Histórico Completo do Sistema`;
                    query = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION)
                        .orderBy('dataCriacao', 'desc');
                }
                
                tituloEl.textContent = `Histórico de Tarefas de: ${tituloNome}`;
            }

            try {
                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                // Mapeamento de UID para Nome do Usuário (necessário para todas as visões que não filtram por um único UID)
                const userMap = {}; 
                if (isPendingView || filtroUID === 'todos-historico') {
                    const usersSnapshot = await firestore.collection(USERS_COLLECTION).get();
                    usersSnapshot.forEach(doc => {
                        userMap[doc.id] = doc.data().nome;
                    });
                }
                
                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);
                    
                    // Obtém o nome do usuário para a exibição
                    const nomeAtribuido = (isPendingView || filtroUID === 'todos-historico')
                                            ? userMap[t.usuarioUID] || t.atribuidaPara || 'Desconhecido'
                                            : t.atribuidaPara;
                    
                    // Determina a classe de cor da borda/texto
                    const colorClass = getTaskColorClass(t);
                    
                    // Renderização e lógica de status para Admin
                    const { statusText, actionButtons } = getTaskAdminUI(taskId, t, isPendingView);

                    html += `
                        <div class="tarefa-card admin-card ${colorClass}">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome}</div>
                                <div class="tarefa-valor ${valor > 0 ? 'positive-text' : 'negative-text'}">${formatarMoeda(valor)}</div>
                            </div>
                            
                            <div class="tarefa-status-line" style="margin-bottom: 5px;">
                                <span>Status:</span>
                                <span class="${colorClass}">${statusText}</span> 
                            </div>
                            
                            <div class="tarefa-details-admin">
                                <div class="tarefa-info-admin">Atribuído a: <b>${nomeAtribuido}</b></div>
                                <div class="tarefa-info-admin">Concluída em: ${t.dataConclusao || 'N/A'}</div>
                                <div class="tarefa-info-admin">Prazo Limite: ${t.dataPrazo || 'N/A'} ${t.horarioPrazo || ''}</div>
                                ${t.motivoReprovacao ? `<div class="tarefa-info-admin color-vencido">Motivo Reprovação: ${t.motivoReprovacao}</div>` : ''}
                                <p class="tarefa-descricao-admin">${t.descricao}</p>
                            </div>
                            
                            <div style="margin-top: 15px;">
                                ${actionButtons}
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks 
                    ? html 
                    : '<p class="empty-message">Nenhuma tarefa encontrada neste filtro.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas:", error);
                exibirAlertaGlobal('tarefas-alerts', 'Erro ao carregar tarefas. Verifique as regras e índices do Firestore.', 'danger');
            }
        }
        
        /**
         * Retorna a descrição do status e botões de ação com base no status da tarefa.
         */
        function getTaskAdminUI(taskId, taskData, isPendingView) {
            let statusText = taskData.status;
            let actionButtons = '';
            
            // Só mostra botões de ação se estiver na visão PENDENTE
            const showActionButtons = (isPendingView && taskData.status === 'Pendente');

            switch(taskData.status) {
                case 'Pendente':
                    statusText = 'PENDENTE DE APROVAÇÃO';
                    if (showActionButtons) {
                        actionButtons = `
                            <button class="btn-rounded btn-success wide-button" 
                                    onclick="aprovarTarefa('${taskId}', '${taskData.usuarioUID}', '${taskData.atribuidaPara}', ${taskData.valor})">
                                <i class="fas fa-thumbs-up"></i> APROVAR E PAGAR
                            </button>
                            <button class="btn-rounded btn-danger wide-button" 
                                    onclick="rejeitarTarefa('${taskId}', '${taskData.usuarioUID}', '${taskData.atribuidaPara}', ${taskData.valor})">
                                <i class="fas fa-thumbs-down"></i> REJEITAR (Aplicar Multa/Penalidade)
                            </button>
                        `;
                    }
                    break;
                case 'EmAndamento':
                    statusText = 'EM ANDAMENTO';
                    break;
                case 'Paga': // Tarefa finalizada e creditada
                    statusText = 'PAGA E CONCLUÍDA';
                    break;
                case 'Reprovada':
                    statusText = `REPROVADA (Multa: ${taskData.valorMultaAplicada ? formatarMoeda(taskData.valorMultaAplicada) : 'N/A'})`;
                    break;
                case 'Disponível':
                case 'Criada':
                    statusText = 'DISPONÍVEL PARA INÍCIO';
                    break;
                default:
                    statusText = taskData.status;
            }
            return { statusText, actionButtons };
        }


        // --- Funções de Ação do Admin (Mantidas) ---

        // 1. Aprovar Tarefa: Paga o valor e registra no histórico.
        async function aprovarTarefa(taskId, userUID, userName, valor) {
            if (!confirm(`Aprovar a tarefa e pagar ${formatarMoeda(valor)} para ${userName}?`)) return;
            
            try {
                // Inicia uma transação para garantir que o saldo e o status sejam atualizados atomicamente
                await firestore.runTransaction(async (transaction) => {
                    const taskRef = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION).doc(taskId);
                    const userRef = firestore.collection(USERS_COLLECTION).doc(userUID); 

                    const taskDoc = await transaction.get(taskRef);
                    const userDoc = await transaction.get(userRef);

                    if (!taskDoc.exists || taskDoc.data().status !== 'Pendente') {
                        throw new Error("Tarefa inválida ou já processada.");
                    }
                    if (!userDoc.exists) {
                        throw new Error("Usuário não encontrado.");
                    }

                    const userData = userDoc.data();
                    const novoSaldo = (userData.saldo || 0) + valor;

                    // 1. Atualiza o status da tarefa para Paga
                    transaction.update(taskRef, {
                        status: 'Paga',
                        dataPagamento: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 2. Atualiza o saldo do usuário
                    transaction.update(userRef, {
                        saldo: novoSaldo
                    });

                    // 3. Registra a transação no Histórico de Pagamentos (PARA FUTURAS CONSULTAS)
                    const pagamento = {
                        tipo: 'Crédito',
                        origem: 'Recompensa por Tarefa',
                        descricao: taskDoc.data().nome,
                        valor: valor,
                        usuarioUID: userRef.id,
                        usuarioNome: userName,
                        dataRegistro: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    transaction.set(firestore.collection(HISTORICO_PAGAMENTOS_COLLECTION).doc(), pagamento);
                });

                exibirAlertaGlobal('tarefas-alerts', `Tarefa aprovada. ${formatarMoeda(valor)} creditado(s) na conta de ${userName}.`, 'success');
                renderTarefas(true); // Renderiza a visão atual (Pendentes)
            } catch (error) {
                console.error("Erro na aprovação da tarefa:", error);
                exibirAlertaGlobal('tarefas-alerts', `ERRO: Não foi possível aprovar e pagar. Detalhe: ${error.message}`, 'danger');
            }
        }

        // 2. Rejeitar Tarefa: Aplica multa/penalidade e registra no histórico.
        async function rejeitarTarefa(taskId, userUID, userName, valor) {
            const motivo = prompt(`Digite o motivo da reprovação da tarefa "${taskId}" (Ex: Limpeza incompleta). O valor original era ${formatarMoeda(valor)}. \n\nO valor da multa será igual ao valor da tarefa.`);
            
            if (motivo === null || motivo.trim() === '') {
                exibirAlertaGlobal('tarefas-alerts', 'Ação cancelada. É necessário um motivo para rejeitar.', 'warning');
                return;
            }

            const valorMulta = valor; 
            
            if (!confirm(`Confirmar REPROVAÇÃO e aplicar penalidade de ${formatarMoeda(valorMulta)} para ${userName}?`)) return;

            try {
                // Inicia uma transação para garantir atomicidade
                await firestore.runTransaction(async (transaction) => {
                    const taskRef = firestore.collection(TAREFAS_ATRIBUIDAS_COLLECTION).doc(taskId);
                    const userRef = firestore.collection(USERS_COLLECTION).doc(userUID); 

                    const taskDoc = await transaction.get(taskRef);
                    const userDoc = await transaction.get(userRef);

                    if (!taskDoc.exists || taskDoc.data().status !== 'Pendente') {
                        throw new Error("Tarefa inválida ou já processada.");
                    }
                    if (!userDoc.exists) {
                        throw new Error("Usuário não encontrado.");
                    }
                    
                    const userData = userDoc.data();
                    const novoSaldo = (userData.saldo || 0) - valorMulta; // Aplica a multa (débito)

                    // 1. Atualiza o status da tarefa para Reprovada
                    transaction.update(taskRef, {
                        status: 'Reprovada',
                        motivoReprovacao: motivo,
                        valorMultaAplicada: valorMulta,
                        dataReprovacao: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 2. Atualiza o saldo do usuário (débito)
                    transaction.update(userRef, {
                        saldo: novoSaldo
                    });

                    // 3. Registra a transação no Histórico de Pagamentos (Multas)
                    const multa = {
                        tipo: 'Débito',
                        origem: 'Multa por Tarefa Reprovada',
                        descricao: `Reprovação: ${taskDoc.data().nome} - Motivo: ${motivo}`,
                        valor: -valorMulta, // Valor negativo para indicar débito
                        usuarioUID: userRef.id,
                        usuarioNome: userName,
                        dataRegistro: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    transaction.set(firestore.collection(HISTORICO_PAGAMENTOS_COLLECTION).doc(), multa);
                });

                exibirAlertaGlobal('tarefas-alerts', `Tarefa reprovada. Multa de ${formatarMoeda(valorMulta)} aplicada a ${userName}. Motivo: ${motivo}`, 'danger');
                renderTarefas(true); // Renderiza a visão atual (Pendentes)
            } catch (error) {
                console.error("Erro na reprovação da tarefa:", error);
                exibirAlertaGlobal('tarefas-alerts', `ERRO: Não foi possível rejeitar a tarefa e aplicar a multa. Detalhe: ${error.message}`, 'danger');
            }
        }


        // --- Inicialização ---

        document.addEventListener('DOMContentLoaded', () => {
            // Verifica o acesso do Admin e carrega o dropdown
            if (checkAdminAccessAndLoad()) {
                // Carrega o dropdown primeiro, mas não renderiza até que ele esteja pronto
                loadUserDropdown().then(() => {
                    // Após carregar os usuários, renderiza a visão padrão (Pendentes)
                    switchView('pendentes'); 
                });
            }
        });
    </script>
</body>
</html>
