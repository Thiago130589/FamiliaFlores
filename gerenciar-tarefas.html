<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 style="color: #1976d2;">Gerenciar Tarefas</h1>
        <div id="clock" class="admin-clock">00:00:00 (Brasília)</div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

        <div id="tarefas-list" style="width: 100%;">
            <p id="loading-message">Carregando tarefas...</p>
        </div>

        <button onclick="showCriarTarefa()" class="btn-rounded" style="margin-top: 20px;">Criar tarefa</button>
        <button onclick="voltarAoPerfil()" class="btn-rounded" style="margin-top: 10px;">Voltar ao perfil</button>
    </div>

    <div id="criar-tarefa-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Criar Nova Tarefa</h2>
            <input type="text" id="nova-tarefa-nome" placeholder="Nome da Tarefa" class="input-rounded">
            <input type="time" id="nova-tarefa-inicio" value="09:00" class="input-rounded">
            <input type="time" id="nova-tarefa-fim" value="10:00" class="input-rounded">
            <input type="number" id="nova-tarefa-valor" placeholder="Valor" class="input-rounded" step="0.01" min="0">
            <button onclick="salvarNovaTarefa()" class="btn-rounded">Salvar</button>
            <button onclick="hideCriarTarefa()" class="btn-rounded btn-red">Cancelar</button>
        </div>
    </div>

    <div id="options-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="options-content">
            <button onclick="hideOptionsModal()" class="btn-rounded btn-red" style="margin-top: 15px;">Fechar</button>
        </div>
    </div>

    <script>
        // A variável db é global devido ao firebase-init.js. 
        // Aqui, declaramos localmente para garantir o acesso no escopo.
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        // --------------------------------------------------------
        // FUNÇÕES GERAIS E NAVEGAÇÃO
        // --------------------------------------------------------
        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }

        function startBrasiliaClock() {
            function updateClock() {
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const brasilia = new Date(utc - (3 * 60 * 60 * 1000));
                const h = String(brasilia.getHours()).padStart(2, '0');
                const m = String(brasilia.getMinutes()).padStart(2, '0');
                const s = String(brasilia.getSeconds()).padStart(2, '0');
                document.getElementById('clock').textContent = `${h}:${m}:${s} (Brasília)`;
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        function showCriarTarefa() {
            document.getElementById('criar-tarefa-modal').style.display = 'flex';
        }

        function hideCriarTarefa() {
            document.getElementById('criar-tarefa-modal').style.display = 'none';
        }
        
        function showOptionsModal() {
            document.getElementById('options-modal').style.display = 'flex';
        }

        function hideOptionsModal() {
            document.getElementById('options-modal').style.display = 'none';
        }


        // --------------------------------------------------------
        // CRIAÇÃO DE TAREFA
        // --------------------------------------------------------
        async function salvarNovaTarefa() {
            const nome = document.getElementById('nova-tarefa-nome').value.trim();
            const inicio = document.getElementById('nova-tarefa-inicio').value;
            const fim = document.getElementById('nova-tarefa-fim').value;
            const valor = document.getElementById('nova-tarefa-valor').value;

            if (!nome || !inicio || !fim || !valor) {
                alert('Preencha todos os campos da tarefa.');
                return;
            }

            try {
                const novaTarefa = {
                    nome: nome,
                    data: new Date().toISOString().split('T')[0], // Data de hoje
                    inicio: inicio,
                    fim: fim,
                    valor: parseFloat(valor),
                    status: 'disponivel',
                    criadaEm: new Date().toISOString()
                };

                await firestore.collection('tarefasDisponiveis').add(novaTarefa);
                alert('Tarefa criada e disponibilizada com sucesso!');
                hideCriarTarefa();
                // Limpa os campos após salvar
                document.getElementById('nova-tarefa-nome').value = '';
                document.getElementById('nova-tarefa-inicio').value = '09:00';
                document.getElementById('nova-tarefa-fim').value = '10:00';
                document.getElementById('nova-tarefa-valor').value = '';

                loadTarefas(); // Recarrega a lista para mostrar a nova tarefa
            } catch (e) {
                console.error("Erro ao salvar a tarefa:", e);
                alert('Erro ao salvar a tarefa. Verifique o Console (F12).');
            }
        }
        
        // --------------------------------------------------------
        // EXCLUSÃO DE TAREFA
        // --------------------------------------------------------
        async function deleteTarefa(id, collection) {
            if (!confirm(`Tem certeza que deseja EXCLUIR a tarefa?`)) {
                return;
            }
            try {
                await firestore.collection(collection).doc(id).delete();
                alert('Tarefa excluída com sucesso!');
                loadTarefas(); // Recarrega a lista
                hideOptionsModal();
            } catch (e) {
                console.error(`Erro ao excluir tarefa da coleção ${collection}:`, e);
                alert('Erro ao excluir a tarefa. Verifique o Console (F12).');
            }
        }


        // --------------------------------------------------------
        // OPÇÕES DA TAREFA
        // --------------------------------------------------------
        function showOptionsDisponivel(id, nome) {
            const content = document.getElementById('options-content');
            content.innerHTML = `
                <h2>Opções: ${nome} (Disponível)</h2>
                <button onclick="deleteTarefa('${id}', 'tarefasDisponiveis')" class="btn-rounded btn-red">Excluir Tarefa</button>
                <button onclick="alert('Funcionalidade ainda não implementada.')" class="btn-rounded btn-yellow">Editar Tarefa</button>
                <button onclick="hideOptionsModal()" class="btn-rounded btn-default" style="margin-top: 15px;">Fechar</button>
            `;
            showOptionsModal();
        }
        
        function showOptionsAtribuida(id, nome) {
            const content = document.getElementById('options-content');
            content.innerHTML = `
                <h2>Opções: ${nome} (Em Andamento)</h2>
                <button onclick="alert('Funcionalidade de Revisão ainda não implementada.')" class="btn-rounded btn-green">Revisar Conclusão/Pagar</button>
                <button onclick="deleteTarefa('${id}', 'tarefasAtribuidas')" class="btn-rounded btn-red">Excluir/Reverter Atribuição</button>
                <button onclick="hideOptionsModal()" class="btn-rounded btn-default" style="margin-top: 15px;">Fechar</button>
            `;
            showOptionsModal();
        }

        // --------------------------------------------------------
        // CARREGAR E EXIBIR TAREFAS
        // --------------------------------------------------------
        async function loadTarefas() {
            const lista = document.getElementById('tarefas-list');
            lista.innerHTML = ''; // Limpa a lista
            
            // Exibe a mensagem de carregamento enquanto busca
            lista.innerHTML = '<p id="loading-message">Carregando tarefas...</p>';
            
            try {
                // 1. Carregar Tarefas Disponíveis (status: 'disponivel')
                const dispSnapshot = await firestore.collection('tarefasDisponiveis').get();
                
                // 2. Carregar Tarefas Atribuídas/Em Andamento
                const atribSnapshot = await firestore.collection('tarefasAtribuidas').where('status', 'in', ['atribuida', 'PendentePagamento']).get();

                // Limpa a mensagem de carregamento (ou substitui se for vazia)
                lista.innerHTML = '';

                let hasTasks = false;

                // Processa Tarefas Disponíveis
                dispSnapshot.forEach(doc => {
                    hasTasks = true;
                    const tarefa = doc.data();
                    displayTarefa(doc.id, tarefa, 'tarefasDisponiveis');
                });
                
                // Processa Tarefas Atribuídas
                atribSnapshot.forEach(doc => {
                    hasTasks = true;
                    const tarefa = doc.data();
                    displayTarefa(doc.id, tarefa, 'tarefasAtribuidas');
                });

                if (!hasTasks) {
                    lista.innerHTML = '<p>Não há tarefas para gerenciar no momento.</p>';
                }

            } catch (error) {
                console.error("Erro ao carregar tarefas:", error);
                lista.innerHTML = `<p style="color: red;">Erro ao carregar tarefas: ${error.message}</p>`;
            }
        }
        
        function displayTarefa(id, tarefa, collection) {
            const lista = document.getElementById('tarefas-list');
            const elemento = document.createElement('div');
            elemento.className = 'tarefa-card';
            
            let statusText = '';
            let detailsHtml = '';
            let optionsHtml = '';
            let assignedTo = '';

            // Se for tarefa ATRIBUÍDA, ela vem da coleção 'tarefasAtribuidas'
            if (collection === 'tarefasAtribuidas') {
                statusText = tarefa.status === 'PendentePagamento' 
                    ? `<span style="color: orange; font-weight: bold;">Pendente Pagamento</span>` 
                    : `<span style="color: #1976d2;">Em Andamento</span>`;
                
                // Trata o campo atribuidaPara (agora a coleção é o nome da tarefa, e não o status)
                assignedTo = typeof tarefa.atribuidaPara === 'string' 
                            ? tarefa.atribuidaPara 
                            : tarefa.atribuidaPara && tarefa.atribuidaPara.nome 
                                ? tarefa.atribuidaPara.nome
                                : 'Usuário Desconhecido';

                detailsHtml = `
                    <div class="tarefa-status-info">
                        ${statusText} | Com: <span style="font-weight: bold;">${assignedTo}</span>
                    </div>
                `;

                optionsHtml = `<button onclick="showOptionsAtribuida('${id}', '${tarefa.nome}')" class="btn-blue">Opções</button>`;

            } else { // coleção: 'tarefasDisponiveis'
                statusText = '<span style="color: green; font-weight: bold;">Disponível</span>';
                detailsHtml = `<div class="tarefa-status-info">${statusText}</div>`;
                optionsHtml = `<button onclick="showOptionsDisponivel('${id}', '${tarefa.nome}')" class="btn-blue">Opções</button>`;
            }

            elemento.innerHTML = `
                <div class="tarefa-header-admin">
                    <span class="tarefa-nome-admin">${tarefa.nome}</span>
                    ${optionsHtml}
                </div>
                <div class="tarefa-details-admin">
                    <span class="tarefa-info-admin">Data: ${tarefa.data} | Horário: ${tarefa.inicio} - ${tarefa.fim} | Valor: R$ ${tarefa.valor.toFixed(2)}</span>
                    ${detailsHtml}
                </div>
            `;
            lista.appendChild(elemento);
        }


        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            startBrasiliaClock();
            loadTarefas();
        });
    </script>
</body>
</html>
