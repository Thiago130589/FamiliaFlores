<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Tarefas</title>
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box" style="max-width: 900px; min-width: 400px; align-items: center; position: relative;">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; color: #1976d2; font-size: 2.2rem;">Gerenciar Tarefas</h1>
            <div id="gerenciar-clock" style="font-size: 1.1rem; color: #d32f2f; font-weight: bold;"></div>
        </div>
        <hr style="width: 100%; margin: 24px 0; border: none; border-top: 1px solid #eee;">
        <div id="gerenciar-tarefas-lista" style="width: 100%; min-height: 120px;">
            <p style="color: #888; text-align: center;">Carregando tarefas...</p>
        </div>

        <button class="btn-rounded" id="btn-criar-tarefa" style="width: 220px; max-width: 90vw; font-size: 1.1rem; margin: 32px auto 0 auto; display: block;">Criar tarefa</button>
        <div id="popup-tarefa" style="display:none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.35); z-index: 1000; align-items: center; justify-content: center;">
            <div style="background: #fff; border-radius: 18px; padding: 32px 24px; min-width: 320px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 18px; align-items: stretch;">
                <h2 style="color: #1976d2; margin: 0 0 12px 0; text-align: center;">Criar Nova Tarefa</h2>
                <input id="tarefa-nome" class="input-rounded" type="text" placeholder="Nome da Tarefa">
                <input id="tarefa-inicio" class="input-rounded" type="time" placeholder="Horário de início">
                <input id="tarefa-fim" class="input-rounded" type="time" placeholder="Horário final">
                <input id="tarefa-valor" class="input-rounded" type="number" min="0" step="0.01" placeholder="Valor">
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn-rounded" id="btn-salvar-tarefa" style="width: 120px;">Salvar</button>
                    <button class="btn-rounded" id="btn-cancelar-tarefa" style="width: 120px; background: #eee; color: #1976d2;">Cancelar</button>
                </div>
                <div id="tarefa-erro" style="color: #d32f2f; min-height: 20px; text-align: center;"></div>
            </div>
        </div>
        <a href="index.html" class="btn-rounded" style="width: 200px; margin: 32px auto 0 auto; text-align: center;">Voltar ao perfil</a>
    </div>

    <script>
    let popupOpcoesTarefa = null;
    let tarefasDisponiveisCache = [];

    /**
     * BUSCA MEMBROS NO FIRESTORE
     * @returns {Promise<Array<{nome: string, id: string}>>} Lista de membros.
     */
    async function carregarMembrosFirestore() {
        if (typeof db === 'undefined') { return []; }
        try {
            const snapshot = await db.collection('users').get();
            let membros = [];
            snapshot.forEach(doc => {
                const userData = doc.data();
                if (userData.nome) { 
                    // Certificamos que estamos pegando o nome e o ID corretamente
                    membros.push({ 
                        nome: userData.nome, 
                        id: doc.id 
                    });
                }
            });
            return membros;
        } catch (error) {
            console.error("Erro ao carregar membros do Firestore:", error);
            return [];
        }
    }


    /**
     * Função para exibir lista de tarefas lidas do FIRESTORE.
     */
    async function renderGerenciarTarefas() {
        const lista = document.getElementById('gerenciar-tarefas-lista');
        if (typeof db === 'undefined') {
             lista.innerHTML = '<p style="color: #d32f2f; text-align: center;">Erro: Conexão com o Banco de Dados não estabelecida.</p>';
             return;
        }

        try {
            // 1. LER as tarefas da coleção 'tarefasDisponiveis' do FIRESTORE
            const snapshot = await db.collection('tarefasDisponiveis').get();
            
            tarefasDisponiveisCache = []; 
            snapshot.forEach(doc => {
                tarefasDisponiveisCache.push({ id: doc.id, ...doc.data() });
            });

            if (!tarefasDisponiveisCache.length) {
                lista.innerHTML = '<p style="color: #888; text-align: center;">Nenhuma tarefa cadastrada no momento.</p>';
                return;
            }
            
            // 2. RENDERIZAR a lista com o botão "Opções"
            lista.innerHTML = tarefasDisponiveisCache.map((t) => `
                <div style="display: flex; align-items: center; justify-content: space-between; background: #f3f3f3; border-radius: 12px; margin: 10px 0; padding: 14px 18px;">
                    <span style="color: #1976d2; font-size: 1.1rem; font-weight: 500;">${t.nome}</span>
                    <button class="btn-rounded btn-opcoes-tarefa" data-id="${t.id}" style="width: 110px; max-width: 90vw; font-size: 1rem; margin-left: 18px;">Opções</button>
                </div>
            `).join('');
            
            // 3. Adiciona eventos aos botões de opções
            document.querySelectorAll('.btn-opcoes-tarefa').forEach(btn => {
                btn.onclick = function() {
                    abrirPopupOpcoesTarefa(this.getAttribute('data-id'));
                };
            });

        } catch (error) {
            console.error("Erro ao carregar tarefas do Firestore:", error);
            lista.innerHTML = '<p style="color: #d32f2f; text-align: center;">Erro ao carregar tarefas.</p>';
        }
    }

    /**
     * Lógica de Direcionamento/Exclusão
     */
    async function abrirPopupOpcoesTarefa(tarefaId) {
        const tarefa = tarefasDisponiveisCache.find(t => t.id === tarefaId);
        if (!tarefa) return; 

        // Cria o popup apenas na primeira vez
        if (!popupOpcoesTarefa) {
            popupOpcoesTarefa = document.createElement('div');
            popupOpcoesTarefa.id = 'popup-opcoes-tarefa';
            popupOpcoesTarefa.style.cssText = 'position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.35); z-index: 2000; display: flex; align-items: center; justify-content: center;';
            document.body.appendChild(popupOpcoesTarefa);
        }
        
        // Conteúdo do popup de opções
        // Adicionamos um container para a lista de membros que será carregada
        popupOpcoesTarefa.innerHTML = `
            <div id="popup-opcoes-content" style="background: #fff; border-radius: 18px; padding: 32px 24px; min-width: 320px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 18px; align-items: stretch;">
                <h2 style="color: #1976d2; margin: 0 0 12px 0; text-align: center;">Opções da Tarefa: ${tarefa.nome}</h2>
                
                <div id="direcionar-container">
                    <h3 style="margin: 0 0 10px 0; color: #333; font-size: 1.1rem;">Direcionar para:</h3>
                    <select id="membros-select" class="input-rounded" style="width: 100%;">
                        <option value="">Carregando membros...</option>
                    </select>
                    <button id="btn-confirmar-direcionamento" class="btn-rounded" style="width: 100%; margin-top: 10px; background: #4CAF50; color: #fff; opacity: 0.5;" disabled>Confirmar Direcionamento</button>
                </div>

                <button id="btn-excluir-tarefa" class="btn-rounded" style="width: 100%; font-size: 1.1rem; background: #d32f2f; color: #fff;">Excluir Tarefa</button>
                <button id="btn-fechar-popup-opcoes" class="btn-rounded" style="width: 100%; font-size: 1.1rem; background: #eee; color: #1976d2;">Fechar</button>
                <div id="direcionamento-mensagem" style="color: #d32f2f; text-align: center;"></div>
            </div>
        `;

        popupOpcoesTarefa.style.display = 'flex';
        
        const membrosSelect = document.getElementById('membros-select');
        const btnConfirmar = document.getElementById('btn-confirmar-direcionamento');
        const msgDiv = document.getElementById('direcionamento-mensagem');

        document.getElementById('btn-fechar-popup-opcoes').onclick = () => { popupOpcoesTarefa.style.display = 'none'; };

        // 🌟 Lógica de CARREGAMENTO e EXIBIÇÃO dos Membros (Corrigido)
        const membros = await carregarMembrosFirestore();
        membrosSelect.innerHTML = ''; // Limpa o "Carregando membros..."

        if (membros.length === 0) {
            membrosSelect.innerHTML = '<option value="" disabled>Nenhum membro cadastrado</option>';
            btnConfirmar.disabled = true;
            btnConfirmar.style.opacity = 0.5;
        } else {
            membrosSelect.innerHTML = '<option value="" selected disabled>Selecione um membro</option>';
            membros.forEach(membro => {
                membrosSelect.innerHTML += `<option value="${membro.nome}">${membro.nome}</option>`;
            });
            btnConfirmar.disabled = false;
            btnConfirmar.style.opacity = 1;
        }

        // 🌟 Lógica de DIRECIONAMENTO
        btnConfirmar.onclick = async () => {
            const membroSelecionado = membrosSelect.value;
            if (!membroSelecionado) {
                msgDiv.textContent = 'Selecione um membro para direcionar.';
                return;
            }

            if (!confirm(`Confirmar direcionamento da tarefa "${tarefa.nome}" para ${membroSelecionado}?`)) {
                return;
            }

            try {
                // Prepara a tarefa para a nova coleção
                const tarefaAtribuida = {
                    ...tarefa,
                    status: 'atribuida', 
                    atribuidaPara: membroSelecionado, 
                    dataAtribuicao: new Date().toISOString()
                };

                await db.runTransaction(async (transaction) => {
                    // Adiciona na coleção de tarefas atribuídas
                    await transaction.set(db.collection('tarefasAtribuidas').doc(), tarefaAtribuida);
                    // Remove da coleção de tarefas disponíveis
                    await transaction.delete(db.collection('tarefasDisponiveis').doc(tarefaId));
                });
                
                alert(`Tarefa "${tarefa.nome}" direcionada para ${membroSelecionado} com sucesso!`);
                popupOpcoesTarefa.style.display = 'none';
                renderGerenciarTarefas();
            } catch (error) {
                console.error("Erro ao direcionar a tarefa:", error);
                msgDiv.textContent = `Erro ao direcionar a tarefa: ${error.message}`;
            }
        };

        // Lógica de Exclusão (Mantida)
        document.getElementById('btn-excluir-tarefa').onclick = async () => {
             if (confirm(`Tem certeza que deseja excluir a tarefa "${tarefa.nome}"?`)) {
                 try {
                     await db.collection('tarefasDisponiveis').doc(tarefaId).delete();
                     popupOpcoesTarefa.style.display = 'none';
                     renderGerenciarTarefas();
                     alert(`Tarefa "${tarefa.nome}" excluída.`);
                 } catch (error) {
                     console.error("Erro ao excluir tarefa do Firestore:", error);
                     alert(`Erro ao excluir tarefa. Detalhes: ${error.message}`);
                     popupOpcoesTarefa.style.display = 'none';
                 }
             }
        };
    }
    
    // Configuração do Popup de Criação de Tarefa (Mantida)
    const popupTarefa = document.getElementById('popup-tarefa');
    const btnSalvarTarefa = document.getElementById('btn-salvar-tarefa');
    const tarefaErro = document.getElementById('tarefa-erro');
    
    document.getElementById('btn-criar-tarefa').onclick = () => {
        // Limpa os campos antes de abrir
        document.getElementById('tarefa-nome').value = '';
        document.getElementById('tarefa-inicio').value = '';
        document.getElementById('tarefa-fim').value = '';
        document.getElementById('tarefa-valor').value = '';
        tarefaErro.textContent = '';
        popupTarefa.style.display = 'flex';
    };
    
    document.getElementById('btn-cancelar-tarefa').onclick = () => {
        popupTarefa.style.display = 'none';
    };
    
    // Salvar nova tarefa (FIRESTORE) (Mantida)
    btnSalvarTarefa.onclick = async () => {
        const nome = document.getElementById('tarefa-nome').value.trim();
        const inicio = document.getElementById('tarefa-inicio').value;
        const fim = document.getElementById('tarefa-fim').value;
        const valor = document.getElementById('tarefa-valor').value;
        
        if (!nome || !inicio || !fim || !valor) {
            tarefaErro.textContent = 'Preencha todos os campos.';
            return;
        }
        
        const novaTarefa = { 
            nome, 
            inicio, 
            fim, 
            valor: parseFloat(valor).toFixed(2), 
            criadaEm: new Date().toISOString()
        };

        try {
            await db.collection('tarefasDisponiveis').add(novaTarefa);
            
            popupTarefa.style.display = 'none';
            tarefaErro.textContent = '';
            alert(`Tarefa "${nome}" criada com sucesso!`);
            renderGerenciarTarefas(); // Atualiza a lista após salvar
        } catch (error) {
            console.error("Erro ao salvar tarefa no Firestore:", error);
            tarefaErro.textContent = `Erro ao salvar tarefa: ${error.message}`;
        }
    };
    
    
    // Relógio horário de Brasília (Mantido)
    function startBrasiliaClockGerenciar() {
        function updateClock() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const brasilia = new Date(utc - (3 * 60 * 60 * 1000));
            const h = String(brasilia.getHours()).padStart(2, '0');
            const m = String(brasilia.getMinutes()).padStart(2, '0');
            const s = String(brasilia.getSeconds()).padStart(2, '0');
            document.getElementById('gerenciar-clock').textContent = `${h}:${m}:${s} (Brasília)`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    }

    // Inicialização principal (Mantida)
    window.addEventListener('DOMContentLoaded', () => {
        startBrasiliaClockGerenciar();
        
        // Chama a renderização imediatamente e repete a cada 5 segundos
        renderGerenciarTarefas(); 
        setInterval(renderGerenciarTarefas, 5000); 
    });
    </script>
</body>
</html>
