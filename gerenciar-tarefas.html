<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gerenciar Tarefas</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script> </head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--danger-color);">Painel Administrativo</h1>
        <hr class="divider">

        <div id="admin-alerts" style="margin-bottom: 20px;"></div>

        <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
            <button class="btn-rounded btn-admin-tab" onclick="showSection('aprovacao')">Aprovação/Pagamento (P)</button>
            <button class="btn-rounded btn-admin-tab" onclick="showSection('abertas')">Tarefas Abertas (A)</button>
            <button class="btn-rounded btn-admin-tab" onclick="showSection('criar')">Criar Tarefa</button>
        </div>
        
        <hr class="divider">

        <div id="aprovacao-section" class="admin-section" style="display: none;">
            <h2>Tarefas Pendentes de Aprovação/Pagamento</h2>
            <p class="info-message">Tarefas concluídas pelos usuários, aguardando sua ação.</p>
            <div id="tarefas-pendentes-aprovacao-lista" class="historico-lista">
                <p class="empty-message">Carregando...</p>
            </div>
        </div>

        <div id="abertas-section" class="admin-section" style="display: none;">
            <h2>Tarefas Abertas e Em Andamento</h2>
            <div style="margin-bottom: 15px;">
                <button class="btn-rounded btn-secondary-text" onclick="filterTarefasAbertas('a')">Ver Abertas ('a')</button>
                <button class="btn-rounded btn-secondary-text" onclick="filterTarefasAbertas('m')">Ver Em Andamento ('m')</button>
                <button class="btn-rounded btn-secondary-text" onclick="filterTarefasAbertas('all')">Ver Todas</button>
            </div>
            <div id="tarefas-abertas-lista" class="historico-lista">
                <p class="empty-message">Carregando...</p>
            </div>
        </div>

        <div id="criar-section" class="admin-section" style="display: none;">
            <h2>Criar Nova Tarefa</h2>
            <form id="form-criar-tarefa" class="admin-form">
                <input type="text" id="nova-tarefa-nome" placeholder="Nome da Tarefa" required>
                <input type="number" id="nova-tarefa-valor" placeholder="Valor (R$)" step="0.01" required>
                <input type="date" id="nova-tarefa-data" placeholder="Data Limite (YYYY-MM-DD)" required>
                <input type="time" id="nova-tarefa-inicio" placeholder="Horário Início" required>
                <input type="time" id="nova-tarefa-fim" placeholder="Horário Fim" required>
                <button type="submit" class="btn-rounded btn-success">Adicionar Tarefa (Status 'a')</button>
            </form>
        </div>
        
        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const TAREFAS_COLLECTION = 'tarefasAtribuidas';
        let currentFilter = 'p'; // Inicializa com pendentes

        // 1. Controle de Acesso e Inicialização
        function checkAdminAccess() {
            const userInfo = getUsuarioLogado();
            if (!userInfo || !userInfo.isAdmin) {
                // Redireciona se não for admin
                window.location.href = 'index.html'; 
                return false;
            }
            return userInfo.nome;
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (!checkAdminAccess()) return;
            showSection('aprovacao'); // Começa na seção de aprovação
            loadUsersForAssignment(); // Carrega lista de usuários
        });
        
        function showSection(sectionId) {
            document.querySelectorAll('.admin-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(`${sectionId}-section`).style.display = 'block';

            if (sectionId === 'aprovacao') {
                loadTarefasPendentes();
            } else if (sectionId === 'abertas') {
                filterTarefasAbertas('all');
            }
        }
        
        // Armazena usuários para a atribuição
        let userList = []; 
        async function loadUsersForAssignment() {
            try {
                const snapshot = await firestore.collection('users').get();
                userList = snapshot.docs.map(doc => doc.data().nome).filter(n => n); // Pega apenas os nomes
            } catch(e) {
                console.error("Erro ao carregar usuários:", e);
                document.getElementById('admin-alerts').innerHTML = '<p class="error-message">Não foi possível carregar a lista de usuários.</p>';
            }
        }


        // 2. FUNÇÕES DA SEÇÃO DE CRIAÇÃO ('a' e 'm')
        
        document.getElementById('form-criar-tarefa').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nova-tarefa-nome').value;
            const valor = parseFloat(document.getElementById('nova-tarefa-valor').value);
            const data = document.getElementById('nova-tarefa-data').value;
            const inicio = document.getElementById('nova-tarefa-inicio').value;
            const fim = document.getElementById('nova-tarefa-fim').value;
            const userName = checkAdminAccess();

            if (isNaN(valor) || valor <= 0) {
                alert("Por favor, insira um valor válido.");
                return;
            }

            try {
                await firestore.collection(TAREFAS_COLLECTION).add({
                    nome: nome,
                    valor: valor,
                    data: data,
                    inicio: inicio,
                    fim: fim,
                    status: 'a', // CORREÇÃO: Status inicial 'a' (Aberta)
                    criadaPor: userName,
                    dataCriacao: new Date().toISOString().split('T')[0]
                });

                alert("Tarefa criada com sucesso! Status 'a'.");
                this.reset();
                showSection('abertas'); 

            } catch (error) {
                console.error("Erro ao criar tarefa:", error);
                alert("Erro ao criar tarefa. Tente novamente.");
            }
        });


        // 3. FUNÇÕES DA SEÇÃO APROVAÇÃO/PAGAMENTO (Status 'p' -> 'c')

        async function loadTarefasPendentes() {
            const listaEl = document.getElementById('tarefas-pendentes-aprovacao-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas pendentes...</p>';
            
            try {
                // CORREÇÃO: Busca tarefas com status 'p' (Pendentes de aprovação/pagamento)
                const query = firestore.collection(TAREFAS_COLLECTION)
                    .where('status', '==', 'p') 
                    .orderBy('dataConclusao', 'asc');

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    html += `
                        <div class="tarefa-card admin-card" style="border-left-color: var(--danger-color);">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome}</div>
                            </div>
                            
                            <div class="tarefa-status-line tarefa-info-status-danger">
                                <span>Status:</span>
                                <span class="status-pending">Pendente de Pagamento</span>
                            </div>

                            <div class="tarefa-details-admin">
                                <div class="tarefa-info-admin">Usuário: <span style="font-weight: bold; color: #1976d2;">${t.atribuidaPara}</span></div>
                                <div class="tarefa-info-admin">Valor: <span class="positive-text" style="font-weight: bold;">${formatarMoeda(valor)}</span></div>
                                <div class="tarefa-info-admin">Concluída em: ${t.dataConclusao || 'N/A'}</div>
                            </div>
                            <div style="margin-top: 15px; display: flex; gap: 10px;">
                                <button class="btn-rounded btn-success" 
                                        onclick="pagarTarefaAdmin('${taskId}', '${t.atribuidaPara}', ${valor})">
                                    PAGAR e Finalizar
                                </button>
                                <button class="btn-rounded btn-danger-outline" 
                                        onclick="rejeitarTarefa('${taskId}', '${t.atribuidaPara}')">
                                    Rejeitar
                                </button>
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks ? html : '<p class="empty-message">Nenhuma tarefa pendente de aprovação/pagamento.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas pendentes:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas pendentes.</p>';
            }
        }
        
        async function pagarTarefaAdmin(tarefaId, usuarioNome, valor) {
            if (!confirm(`Confirmar pagamento de ${formatarMoeda(valor)} para ${usuarioNome}? A tarefa será FINALIZADA (status 'c').`)) {
                return;
            }
            // A lógica de pagamento já está no tarefas-pendentes.html, vamos reutilizá-la aqui.
            try {
                const tarefaRef = firestore.collection(TAREFAS_COLLECTION).doc(tarefaId);
                const userRef = firestore.collection('users').doc(usuarioNome); 
                
                await firestore.runTransaction(async (transaction) => {
                    const docTarefa = await transaction.get(tarefaRef);
                    const docUser = await transaction.get(userRef);

                    if (!docTarefa.exists) throw new Error("Tarefa não encontrada ou já foi processada!");
                    if (!docUser.exists) throw new Error(`Usuário ${usuarioNome} não encontrado para atualizar o saldo.`);
                    
                    const tarefaData = docTarefa.data();
                    const userData = docUser.data();
                    
                    // Atualiza o saldo
                    const novoSaldo = (userData.saldo || 0) + valor;
                    transaction.update(userRef, { saldo: novoSaldo });
                    
                    // Prepara a tarefa para a coleção de concluídas
                    const tarefaConcluidaData = {
                        ...tarefaData,
                        status: 'c', // CORREÇÃO: Status final 'c' (Concluída/Paga)
                        dataPagamento: new Date().toISOString().split('T')[0] 
                    };

                    // Cria a tarefa na coleção de concluídas
                    transaction.set(firestore.collection('tarefasConcluidas').doc(), tarefaConcluidaData);
                    
                    // Deleta a tarefa da lista de atribuidas
                    transaction.delete(tarefaRef);
                });

                alert(`Pagamento e finalização da tarefa para ${usuarioNome} concluído com sucesso!`);
                loadTarefasPendentes(); 
            } catch (error) {
                console.error("Erro na transação de pagamento:", error);
                alert(`Erro ao processar o pagamento: ${error.message || 'Tente novamente.'}`);
            }
        }

        async function rejeitarTarefa(taskId, usuarioNome) {
            if (!confirm(`Tem certeza que deseja REJEITAR esta tarefa de ${usuarioNome}? O status será revertido para 'm'.`)) {
                return;
            }

            try {
                const taskRef = firestore.collection(TAREFAS_COLLECTION).doc(taskId);
                
                await taskRef.update({
                    status: 'm', // CORREÇÃO: Reverte para 'm' (Minhas/Em andamento) para o usuário corrigir
                    dataConclusao: firebase.firestore.FieldValue.delete() // Remove a data de conclusão
                });

                alert(`Tarefa rejeitada e devolvida para ${usuarioNome} (status 'm').`);
                loadTarefasPendentes(); 
            } catch (error) {
                console.error("Erro ao rejeitar tarefa:", error);
                alert("Erro ao rejeitar tarefa. Tente novamente.");
            }
        }


        // 4. FUNÇÕES DA SEÇÃO ABERTAS E EM ANDAMENTO (Status 'a' -> 'm')

        async function filterTarefasAbertas(statusFilter) {
            currentFilter = statusFilter;
            const listaEl = document.getElementById('tarefas-abertas-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando tarefas...</p>';

            try {
                let query = firestore.collection(TAREFAS_COLLECTION).orderBy('dataCriacao', 'desc');

                if (statusFilter === 'a') {
                    // CORREÇÃO: Filtra por 'a' (Aberta/Disponível)
                    query = query.where('status', '==', 'a');
                } else if (statusFilter === 'm') {
                    // CORREÇÃO: Filtra por 'm' (Minhas/Em Andamento)
                    query = query.where('status', '==', 'm');
                } else if (statusFilter === 'all') {
                    // Filtro 'all' é mais complexo e pode precisar de índice composto ou ser evitado.
                    // Para simplificar, vamos filtrar apenas o que é ATRIBUÍVEL.
                    query = query.where('status', 'in', ['a', 'm']); // Traz abertas e em andamento
                }

                const snapshot = await query.get();
                let html = '';
                let foundTasks = false;

                snapshot.forEach(doc => {
                    foundTasks = true;
                    const taskId = doc.id;
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);

                    // Dropdown de usuários para atribuição
                    let userOptions = userList.map(user => 
                        `<option value="${user}" ${t.atribuidaPara === user ? 'selected' : ''}>${user}</option>`
                    ).join('');

                    // Ação de Atribuir (só aparece se o status for 'a')
                    let atribuirHtml = '';
                    if (t.status === 'a') {
                        atribuirHtml = `
                            <select id="user-select-${taskId}" style="padding: 8px; border-radius: 4px; margin-right: 10px;">
                                <option value="">Atribuir a...</option>
                                ${userOptions}
                            </select>
                            <button class="btn-rounded btn-info" onclick="atribuirTarefa('${taskId}')">
                                Atribuir
                            </button>
                        `;
                    } else if (t.status === 'm') {
                         atribuirHtml = `<span style="font-weight: bold; color: var(--info-color);">Atribuída a: ${t.atribuidaPara}</span>`;
                    }
                    
                    const statusText = t.status === 'a' ? 'Aberta' : 'Em Andamento';
                    const statusColor = t.status === 'a' ? '#4CAF50' : '#2196F3';

                    html += `
                        <div class="tarefa-card admin-card" style="border-left-color: ${statusColor};">
                            <div class="tarefa-header-admin">
                                <div class="tarefa-nome-admin">${t.nome} (${statusText})</div>
                            </div>
                            
                            <div class="tarefa-details-admin" style="margin-bottom: 10px;">
                                <div class="tarefa-info-admin">Valor: ${formatarMoeda(valor)}</div>
                                <div class="tarefa-info-admin">Criada em: ${t.dataCriacao || 'N/A'}</div>
                            </div>
                            <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                                <div>${atribuirHtml}</div>
                                <button class="btn-rounded btn-danger-outline" onclick="deleteTarefa('${taskId}')">Excluir</button>
                            </div>
                        </div>
                    `;
                });

                listaEl.innerHTML = foundTasks ? html : '<p class="empty-message">Nenhuma tarefa encontrada para este filtro.</p>';

            } catch (error) {
                console.error("Erro ao carregar tarefas abertas:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar tarefas.</p>';
            }
        }
        
        async function atribuirTarefa(taskId) {
            const selectEl = document.getElementById(`user-select-${taskId}`);
            const selectedUser = selectEl ? selectEl.value : null;

            if (!selectedUser) {
                alert("Por favor, selecione um usuário para atribuir a tarefa.");
                return;
            }

            if (!confirm(`Confirmar atribuição da tarefa a ${selectedUser}? O status será alterado para 'm'.`)) {
                return;
            }

            try {
                const taskRef = firestore.collection(TAREFAS_COLLECTION).doc(taskId);
                
                await taskRef.update({
                    status: 'm', // CORREÇÃO: Status 'm' (Minhas/Em andamento)
                    atribuidaPara: selectedUser,
                    dataAtribuicao: new Date().toISOString().split('T')[0]
                });

                alert(`Tarefa atribuída com sucesso a ${selectedUser}!`);
                filterTarefasAbertas(currentFilter); 

            } catch (error) {
                console.error("Erro ao atribuir tarefa:", error);
                alert("Erro ao atribuir tarefa. Tente novamente.");
            }
        }

        async function deleteTarefa(taskId) {
            if (!confirm("Tem certeza que deseja EXCLUIR permanentemente esta tarefa?")) {
                return;
            }

            try {
                await firestore.collection(TAREFAS_COLLECTION).doc(taskId).delete();
                alert("Tarefa excluída com sucesso.");
                filterTarefasAbertas(currentFilter); 
            } catch (error) {
                console.error("Erro ao excluir tarefa:", error);
                alert("Erro ao excluir tarefa.");
            }
        }
    </script>
</body>
</html>
