<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 style="color: #1976d2;">Gerenciar Tarefas</h1>
        <div id="clock" class="admin-clock">00:00:00 (Brasília)</div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

        <div id="tarefas-list" style="width: 100%;">
            <p id="loading-message">Carregando tarefas...</p>
        </div>

        <button onclick="showCriarTarefa()" class="btn-rounded" style="margin-top: 20px;">Criar tarefa</button>
        <button onclick="voltarAoPerfil()" class="btn-rounded" style="margin-top: 10px;">Voltar ao perfil</button>
    </div>

    <div id="criar-tarefa-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Criar Nova Tarefa</h2>
            <input type="text" id="nova-tarefa-nome" placeholder="Nome da Tarefa" class="input-rounded">
            <input type="time" id="nova-tarefa-inicio" value="09:00" class="input-rounded">
            <input type="time" id="nova-tarefa-fim" value="10:00" class="input-rounded">
            <input type="number" id="nova-tarefa-valor" placeholder="Valor" class="input-rounded" step="0.01" min="0">
            <button onclick="salvarNovaTarefa()" class="btn-rounded">Salvar</button>
            <button onclick="hideCriarTarefa()" class="btn-rounded btn-red">Cancelar</button>
        </div>
    </div>

    <script>
        const db = firebase.firestore();

        // --------------------------------------------------------
        // FUNÇÕES GERAIS E NAVEGAÇÃO
        // --------------------------------------------------------
        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }

        function startBrasiliaClock() {
            function updateClock() {
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const brasilia = new Date(utc - (3 * 60 * 60 * 1000));
                const h = String(brasilia.getHours()).padStart(2, '0');
                const m = String(brasilia.getMinutes()).padStart(2, '0');
                const s = String(brasilia.getSeconds()).padStart(2, '0');
                document.getElementById('clock').textContent = `${h}:${m}:${s} (Brasília)`;
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        function showCriarTarefa() {
            document.getElementById('criar-tarefa-modal').style.display = 'flex';
        }

        function hideCriarTarefa() {
            document.getElementById('criar-tarefa-modal').style.display = 'none';
        }

        // --------------------------------------------------------
        // CRIAÇÃO DE TAREFA
        // --------------------------------------------------------
        async function salvarNovaTarefa() {
            const nome = document.getElementById('nova-tarefa-nome').value.trim();
            const inicio = document.getElementById('nova-tarefa-inicio').value;
            const fim = document.getElementById('nova-tarefa-fim').value;
            const valor = document.getElementById('nova-tarefa-valor').value;

            if (!nome || !inicio || !fim || !valor) {
                alert('Preencha todos os campos da tarefa.');
                return;
            }

            try {
                const novaTarefa = {
                    nome: nome,
                    data: new Date().toISOString().split('T')[0], // Data de hoje
                    inicio: inicio,
                    fim: fim,
                    valor: parseFloat(valor),
                    status: 'disponivel',
                    criadaEm: new Date().toISOString()
                };

                await db.collection('tarefasDisponiveis').add(novaTarefa);
                alert('Tarefa criada e disponibilizada com sucesso!');
                hideCriarTarefa();
                loadTarefas(); // Recarrega a lista para mostrar a nova tarefa
            } catch (e) {
                console.error("Erro ao salvar a tarefa:", e);
                alert('Erro ao salvar a tarefa. Verifique o Console (F12).');
            }
        }

        // --------------------------------------------------------
        // CARREGAR E EXIBIR TAREFAS
        // --------------------------------------------------------
        async function loadTarefas() {
            const lista = document.getElementById('tarefas-list');
            lista.innerHTML = '';
            
            const loadingMsg = document.getElementById('loading-message');
            if (loadingMsg) loadingMsg.style.display = 'none';

            try {
                // 1. Carregar Tarefas Disponíveis (status: 'disponivel')
                const dispSnapshot = await db.collection('tarefasDisponiveis').get();
                dispSnapshot.forEach(doc => {
                    const tarefa = doc.data();
                    displayTarefa(doc.id, tarefa, 'disponivel');
                });
                
                // 2. Carregar Tarefas Atribuídas/Em Andamento (status: 'atribuida')
                const atribSnapshot = await db.collection('tarefasAtribuidas').where('status', 'in', ['atribuida', 'PendentePagamento']).get();
                atribSnapshot.forEach(doc => {
                    const tarefa = doc.data();
                    displayTarefa(doc.id, tarefa, 'atribuida');
                });

                if (dispSnapshot.empty && atribSnapshot.empty) {
                    lista.innerHTML = '<p>Não há tarefas para gerenciar no momento.</p>';
                }

            } catch (error) {
                console.error("Erro ao carregar tarefas:", error);
                lista.innerHTML = `<p style="color: red;">Erro ao carregar tarefas: ${error.message}</p>`;
            }
        }
        
        function displayTarefa(id, tarefa, collection) {
            const lista = document.getElementById('tarefas-list');
            const elemento = document.createElement('div');
            elemento.className = 'tarefa-card';
            
            let statusText = '';
            let detailsHtml = '';
            let optionsHtml = '';
            let assignedTo = '';

            // Se for tarefa ATRIBUÍDA, precisamos tratar o campo 'atribuidaPara'
            if (collection === 'atribuida') {
                statusText = tarefa.status === 'PendentePagamento' 
                    ? `<span style="color: orange; font-weight: bold;">Pendente Pagamento</span>` 
                    : `<span style="color: #1976d2;">Em andamento</span>`;
                
                // *** CORREÇÃO: Trata o campo atribuidaPara para evitar o JSON gigante ***
                if (typeof tarefa.atribuidaPara === 'object' && tarefa.atribuidaPara !== null) {
                    // Se for o objeto completo (legado), tenta pegar o nome
                    assignedTo = tarefa.atribuidaPara.nome || JSON.stringify(tarefa.atribuidaPara);
                } else if (typeof tarefa.atribuidaPara === 'string') {
                    // Se for apenas a string com o nome (novo formato)
                    assignedTo = tarefa.atribuidaPara;
                } else {
                    assignedTo = 'Usuário Desconhecido';
                }

                detailsHtml = `
                    <div class="tarefa-status-info">
                        ${statusText} | Com: <span style="font-weight: bold;">${assignedTo}</span>
                    </div>
                `;

                optionsHtml = `<button onclick="showOptionsAtribuida('${id}', '${tarefa.nome}')" class="btn-blue">Opções</button>`;

            } else { // status: 'disponivel'
                statusText = '<span style="color: green;">Disponível</span>';
                detailsHtml = `<div class="tarefa-status-info">${statusText}</div>`;
                optionsHtml = `<button onclick="showOptionsDisponivel('${id}', '${tarefa.nome}')" class="btn-blue">Opções</button>`;
            }

            elemento.innerHTML = `
                <div class="tarefa-header-admin">
                    <span class="tarefa-nome-admin">${tarefa.nome}</span>
                    ${optionsHtml}
                </div>
                <div class="tarefa-details-admin">
                    <span class="tarefa-info-admin">Data: ${tarefa.data} | Horário: ${tarefa.inicio} - ${tarefa.fim}</span>
                    ${detailsHtml}
                </div>
            `;
            lista.appendChild(elemento);
        }

        // Simulação de funções de opções (para evitar quebrar o código)
        function showOptionsDisponivel(id, nome) {
            alert(`Opções para Tarefa Disponível: ${nome} (ID: ${id})`);
            // Aqui você pode adicionar lógica de editar/excluir
        }
        
        function showOptionsAtribuida(id, nome) {
            alert(`Opções para Tarefa Atribuída: ${nome} (ID: ${id})`);
            // Aqui você pode adicionar lógica de reassinar/excluir
        }


        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            startBrasiliaClock();
            loadTarefas();
        });
    </script>
</body>
</html>
