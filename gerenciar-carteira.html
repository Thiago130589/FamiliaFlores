<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Carteira</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--warning-color);">Gerenciar Carteira e Multas</h1>
        <p class="info-message" style="text-align: center;">Ajuste o saldo dos usuários e gerencie multas.</p>
        <hr class="divider">

        <h2 style="font-size: 1.4em; margin-bottom: 15px; color: var(--primary-dark);">Saldos Atuais</h2>
        <div id="usuarios-saldos-lista" class="historico-lista">
            <p class="empty-message">Carregando usuários...</p>
        </div>

        <a href="historico-multas.html" class="btn-rounded btn-danger wide-button" style="margin-top: 20px;">
            Ver e Remover Histórico de Multas
        </a>
        
        <a href="admin.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 15px;">
            Voltar ao Dashboard
        </a>
    </div>

    <div id="modal-ajustar-saldo" class="modal-overlay hidden-start">
        <div class="modal-content">
            <h2 class="modal-title">Ajustar Saldo de <span id="modal-saldo-user-nome"></span></h2>
            <div id="modal-saldo-info" class="modal-info-visible"></div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="saldo-adjustment-value">Valor de Ajuste (Positivo ou Negativo)</label>
                <input type="number" step="0.01" id="saldo-adjustment-value" class="input-rounded" placeholder="Ex: 5.00 (Adiciona) ou -2.50 (Retira)" required>
            </div>
            
            <button onclick="confirmAdjustSaldo()" class="btn-rounded btn-primary wide-button modal-button-margin">
                Confirmar Ajuste
            </button>
            <button onclick="closeModal('modal-ajustar-saldo')" class="btn-rounded btn-secondary-text wide-button modal-close-button">
                Cancelar
            </button>
        </div>
    </div>
    
    <div id="modal-aplicar-multa" class="modal-overlay hidden-start">
        <div class="modal-content">
            <h2 class="modal-title" style="color: var(--danger-color);">Aplicar Multa a <span id="modal-multa-user-nome"></span></h2>

            <div class="form-group" style="margin-top: 20px;">
                <label for="multa-value">Valor da Multa</label>
                <input type="number" step="0.01" id="multa-value" class="input-rounded" placeholder="Ex: 5.00" required>
            </div>

            <div class="form-group">
                <label for="multa-reason">Motivo da Multa</label>
                <input type="text" id="multa-reason" class="input-rounded" placeholder="Ex: Atraso na Tarefa" required>
            </div>

            <button onclick="confirmApplyMulta()" class="btn-rounded btn-danger wide-button modal-button-margin">
                Aplicar Multa
            </button>
            <button onclick="closeModal('modal-aplicar-multa')" class="btn-rounded btn-secondary-text wide-button modal-close-button">
                Cancelar
            </button>
        </div>
    </div>


    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        let currentEditingUser = null; // Armazena o nome do usuário sendo editado

        // --- Funções de Utilitário ---
        function checkAdminAccess() {
            const userInfo = getUsuarioLogado();
            if (!userInfo || !userInfo.isAdmin) {
                alert("Acesso negado. Apenas administradores.");
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        function openModal(modalId, userName, currentSaldo) {
            currentEditingUser = userName;
            document.getElementById(modalId).classList.remove('hidden-start');
            
            if (modalId === 'modal-ajustar-saldo') {
                document.getElementById('modal-saldo-user-nome').textContent = userName;
                document.getElementById('modal-saldo-info').textContent = `Saldo Atual: ${formatarMoeda(currentSaldo)}`;
            } else if (modalId === 'modal-aplicar-multa') {
                document.getElementById('modal-multa-user-nome').textContent = userName;
                document.getElementById('multa-value').value = ''; 
                document.getElementById('multa-reason').value = ''; 
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden-start');
            currentEditingUser = null; 
        }

        // --- Funções de Renderização ---
        async function renderUsuariosSaldos() {
            if (!checkAdminAccess()) return;
            
            const listaEl = document.getElementById('usuarios-saldos-lista');
            listaEl.innerHTML = '<p class="empty-message">Buscando usuários...</p>';

            try {
                const usersSnapshot = await firestore.collection('users').orderBy('saldo', 'desc').get();
                let html = '<ul class="transaction-list">';
                let foundUsers = false;

                usersSnapshot.forEach(doc => {
                    const userName = doc.id;
                    const userData = doc.data();
                    const saldo = userData.saldo || 0;
                    
                    foundUsers = true;
                    
                    const saldoClass = saldo >= 0 ? 'positive-text' : 'negative-text';
                    const formattedSaldo = formatarMoeda(saldo);

                    html += `
                        <li class="transaction-item admin-card" style="border-left-color: ${saldo >= 0 ? 'var(--success-color)' : 'var(--danger-color)'};">
                            <div class="transaction-details">
                                <span class="transaction-description">${userName}</span>
                                <span class="transaction-amount ${saldoClass}" style="font-weight: bold;">${formattedSaldo}</span>
                            </div>
                            <div class="admin-action-grid" style="grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0;">
                                <button class="btn-rounded btn-warning task-action-button" onclick="openModal('modal-ajustar-saldo', '${userName}', ${saldo})">
                                    Ajustar Saldo
                                </button>
                                <button class="btn-rounded btn-danger task-action-button" onclick="openModal('modal-aplicar-multa', '${userName}', 0)">
                                    Aplicar Multa
                                </button>
                            </div>
                        </li>
                    `;
                });
                
                html += '</ul>';

                if (foundUsers) {
                    listaEl.innerHTML = html;
                } else {
                    listaEl.innerHTML = '<p class="empty-message">Nenhum usuário encontrado.</p>';
                }

            } catch (error) {
                console.error("Erro ao carregar saldos:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar a lista de saldos.</p>';
            }
        }

        // --- Funções de Ação (Ajuste e Multa) ---

        /**
         * Ajusta o saldo diretamente (transação).
         */
        async function confirmAdjustSaldo() {
            const valorAjusteStr = document.getElementById('saldo-adjustment-value').value;
            const valorAjuste = parseFloat(valorAjusteStr);
            
            if (isNaN(valorAjuste) || valorAjuste === 0 || !currentEditingUser) {
                alert("Valor inválido ou usuário não selecionado.");
                return;
            }

            if (!confirm(`Confirmar ajuste de ${formatarMoeda(valorAjuste)} para o saldo de ${currentEditingUser}?`)) {
                return;
            }

            closeModal('modal-ajustar-saldo'); 

            try {
                const userRef = firestore.collection('users').doc(currentEditingUser);

                await firestore.runTransaction(async (transaction) => {
                    const docUser = await transaction.get(userRef);

                    if (!docUser.exists) {
                        throw new Error(`Usuário ${currentEditingUser} não encontrado.`);
                    }
                    
                    const userData = docUser.data();
                    const novoSaldo = (userData.saldo || 0) + valorAjuste;
                    
                    transaction.update(userRef, { saldo: novoSaldo });
                });

                alert(`Saldo de ${currentEditingUser} ajustado em ${formatarMoeda(valorAjuste)} com sucesso!`);
                renderUsuariosSaldos(); // Recarrega a lista
                
            } catch (error) {
                console.error("Erro na transação de ajuste de saldo:", error);
                alert(`Erro ao ajustar o saldo: ${error.message || 'Tente novamente.'}`);
            }
        }

        /**
         * Aplica uma multa (diminui o saldo e registra na coleção 'multas').
         */
        async function confirmApplyMulta() {
            const valorMultaStr = document.getElementById('multa-value').value;
            const motivoMulta = document.getElementById('multa-reason').value.trim();
            const valorMulta = parseFloat(valorMultaStr);
            
            if (isNaN(valorMulta) || valorMulta <= 0 || !currentEditingUser || !motivoMulta) {
                alert("Verifique o valor da multa e o motivo.");
                return;
            }

            if (!confirm(`Confirmar multa de ${formatarMoeda(valorMulta)} para ${currentEditingUser} pelo motivo: "${motivoMulta}"?`)) {
                return;
            }
            
            closeModal('modal-aplicar-multa'); 

            try {
                const userRef = firestore.collection('users').doc(currentEditingUser);
                const multaRef = firestore.collection('multas').doc(); // Cria novo ID

                await firestore.runTransaction(async (transaction) => {
                    const docUser = await transaction.get(userRef);

                    if (!docUser.exists) {
                        throw new Error(`Usuário ${currentEditingUser} não encontrado.`);
                    }
                    
                    const userData = docUser.data();
                    // O valor é subtraído
                    const novoSaldo = (userData.saldo || 0) - valorMulta; 
                    
                    // 1. Atualiza o saldo (subtrai)
                    transaction.update(userRef, { saldo: novoSaldo });
                    
                    // 2. Registra a multa na coleção 'multas'
                    transaction.set(multaRef, {
                        usuario: currentEditingUser,
                        valor: valorMulta,
                        motivo: motivoMulta,
                        dataMulta: new Date().toISOString().split('T')[0], // Data de hoje
                        aplicadaPor: getUsuarioLogado().nome || 'Admin'
                    });
                });

                alert(`Multa de ${formatarMoeda(valorMulta)} aplicada a ${currentEditingUser} com sucesso!`);
                renderUsuariosSaldos(); // Recarrega a lista
                
            } catch (error) {
                console.error("Erro na transação de multa:", error);
                alert(`Erro ao aplicar a multa: ${error.message || 'Tente novamente.'}`);
            }
        }


        window.addEventListener('DOMContentLoaded', renderUsuariosSaldos);
    </script>
</body>
</html>
