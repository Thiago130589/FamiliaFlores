<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script> 
</head>
<body>
    <div class="center-box" id="login-container">
        <h1 class="main-title">Login</h1>
        
        <div class="form-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" placeholder="Seu nome (ex: Thiago)" required>
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        
        <div id="auth-message" class="error-message" style="display: none; margin-top: 15px;"></div>

        <button class="btn-rounded btn-primary wide-button" onclick="handleLogin()">Entrar</button>
        
        <p style="text-align: center; margin-top: 15px;">
            Não tem uma conta? <a href="cadastrar-usuario.html" style="color: #1976d2; text-decoration: none;">Cadastre-se</a>
        </p>
    </div>

    <script>
    // Usa a variável global 'db' definida em firebase-init.js
    const firestore = typeof db !== 'undefined' ? db : null;

    async function handleLogin() {
        // Verifica a inicialização do Firebase para evitar o erro de conexão
        if (!firestore) {
            const msg = 'Erro fatal: Firebase não inicializado. Verifique a ordem dos scripts no console.';
            document.getElementById('auth-message').textContent = msg;
            document.getElementById('auth-message').style.display = 'block';
            console.error(msg);
            return;
        }

        const nome = document.getElementById('username').value.trim();
        const senha = document.getElementById('password').value.trim();
        const messageEl = document.getElementById('auth-message');
        
        messageEl.style.display = 'block';
        messageEl.classList.remove('error-message');
        messageEl.classList.add('info-message');
        messageEl.textContent = 'Verificando credenciais...';

        if (!nome || !senha) {
            messageEl.classList.remove('info-message');
            messageEl.classList.add('error-message');
            messageEl.textContent = 'Preencha o nome de usuário e a senha.';
            return;
        }

        try {
            // 1. Busca os dados do usuário no Firestore (Document ID = nome)
            const userDoc = await firestore.collection('users').doc(nome).get();
            
            if (!userDoc.exists) {
                messageEl.classList.remove('info-message');
                messageEl.classList.add('error-message');
                messageEl.textContent = 'Usuário não encontrado.';
                return;
            }

            const userData = userDoc.data();
            
            // 2. VERIFICAÇÃO MANUAL DA SENHA
            if (userData.password !== senha) { 
                messageEl.classList.remove('info-message');
                messageEl.classList.add('error-message');
                messageEl.textContent = 'Senha incorreta.';
                return;
            }

            // 3. SUCESSO: SALVA O PERFIL COMPLETO (COM isAdmin) NO LOCAL STORAGE
            const userProfile = {
                nome: nome,
                // O campo crucial para exibir os links de administrador no Dashboard
                isAdmin: userData.isAdmin === true, 
            };

            localStorage.setItem('usuarioLogado', JSON.stringify(userProfile));
            
            messageEl.classList.remove('error-message');
            messageEl.classList.add('info-message');
            messageEl.textContent = 'Login realizado com sucesso! Redirecionando...';

            // Redireciona para o Dashboard
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);

        } catch (error) {
            console.error("Erro no processo de login:", error);
            messageEl.classList.remove('info-message');
            messageEl.classList.add('error-message');
            messageEl.textContent = 'Erro de conexão ou sistema. Tente novamente.'; 
        }
    }
    
    // Adicionar evento de Enter para o formulário
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });

    </script>
</body>
</html>
