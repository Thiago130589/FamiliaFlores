<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box small-box">
        <h1 class="main-title">Login</h1>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Nome de Usu·rio</label>
                <input type="text" id="username" placeholder="Seu nome" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            
            <p id="error-message" class="error-message" style="display: none; margin-top: 15px;">
                Erro de conex„o ou sistema. Tente novamente.
            </p>

            <button type="submit" class="btn-rounded btn-primary wide-button">Entrar</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            N„o tem uma conta? <a href="cadastrar-usuario.html" class="link-cadastro">Cadastre-se</a>
        </p>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : null;
        const auth = typeof auth !== 'undefined' ? auth : null;
        
        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                errorMessage.textContent = 'Preencha todos os campos.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (!firestore) {
                // Se a inicializaÁ„o falhou (Firebase n„o carregou), exibe erro.
                errorMessage.textContent = 'Erro de inicializaÁ„o. Verifique a configuraÁ„o do Firebase.';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                // 1. Tenta buscar o documento do usu·rio pelo nome (Firestore)
                const userDocRef = firestore.collection('users').doc(username);
                const userDoc = await userDocRef.get();

                if (!userDoc.exists) {
                    errorMessage.textContent = 'Usu·rio n„o encontrado.';
                    errorMessage.style.display = 'block';
                    return;
                }

                const userData = userDoc.data();
                
                // 2. Compara a senha (ASSUMIMOS QUE A SENHA N√O EST¡ CRIPTOGRAFADA)
                if (userData.password !== password) {
                    errorMessage.textContent = 'Senha incorreta.';
                    errorMessage.style.display = 'block';
                    return;
                }

                // 3. Login bem-sucedido: Salva dados essenciais no localStorage
                const userSession = {
                    nome: userData.nome,
                    isAdmin: userData.isAdmin === true,
                    // Poderia incluir mais campos ˙teis aqui
                };

                localStorage.setItem('usuarioLogado', JSON.stringify(userSession));
                
                // Redireciona para o Dashboard
                window.location.href = 'index.html';

            } catch (error) {
                // 4. Trata erros de conex„o ou outros erros do Firebase
                console.error("Erro durante o login:", error);
                errorMessage.textContent = 'Erro de conex„o ou sistema. Verifique suas regras de seguranÁa no Firebase.';
                errorMessage.style.display = 'block';
            }
        });

        // Verifica se o usu·rio j· est· logado ao carregar a p·gina
        if (localStorage.getItem('usuarioLogado')) {
            window.location.href = 'index.html'; // Redireciona se j· houver sess„o
        }
    </script>
</body>
</html>
