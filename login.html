<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Família Flores</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box small-box">
        <h1 class="main-title-primary">Login</h1>
        <hr class="divider">
        
        <div class="input-group-vertical">
            <label class="input-label" for="username">Nome de Usuário:</label>
            <input type="text" id="username" class="input-rounded" placeholder="Seu nome (ID do Firestore)" required>
        </div>

        <div class="input-group-vertical">
            <label class="input-label" for="password">Senha:</label>
            <input type="password" id="password" class="input-rounded" placeholder="Sua senha" required>
        </div>
        
        <button id="login-button" class="btn-rounded btn-primary wide-button" style="margin-top: 20px;">Entrar</button>

        <button id="register-button" class="btn-rounded btn-secondary wide-button" style="margin-top: 10px;">Cadastrar Novo Usuário</button>

        <p id="error-message" class="error-message" style="margin-top: 10px; display: none;">Mensagem de Erro</p>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        document.getElementById('login-button').addEventListener('click', attemptLogin);
        document.getElementById('register-button').addEventListener('click', redirectToRegister); // NOVO EVENTO

        function redirectToRegister() {
            // Assume que a página de cadastro é 'cadastrar-perfil.html' ou 'editar-perfil.html' (que pode ser adaptada)
            // Usaremos 'editar-perfil.html' por agora, com a intenção de adaptá-la para cadastro se necessário.
            // Para simplificar o fluxo, vamos criar um novo arquivo chamado 'cadastrar-usuario.html'
            window.location.href = 'cadastrar-usuario.html'; 
        }

        async function attemptLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessageEl = document.getElementById('error-message');
            
            errorMessageEl.style.display = 'none';

            if (!username || !password) {
                errorMessageEl.textContent = 'Por favor, preencha nome e senha.';
                errorMessageEl.style.display = 'block';
                return;
            }

            try {
                // Tenta buscar o usuário usando o nome de usuário (que é o ID do documento)
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(username).get();

                if (!userDoc.exists) {
                    errorMessageEl.textContent = 'Usuário não encontrado.';
                    errorMessageEl.style.display = 'block';
                    return;
                }

                const userData = userDoc.data();
                
                // Verifica a senha 
                if (userData.senha !== password) {
                    errorMessageEl.textContent = 'Senha incorreta.';
                    errorMessageEl.style.display = 'block';
                    return;
                }
                
                // Sucesso: Salva os dados do usuário no localStorage
                const userProfile = {
                    nome: username,
                    isAdmin: userData.isAdmin || false,
                };
                
                localStorage.setItem('usuarioLogado', JSON.stringify(userProfile));

                // Redireciona para o dashboard
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Erro no login:", error);
                errorMessageEl.textContent = 'Ocorreu um erro na conexão. Tente novamente.';
                errorMessageEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
