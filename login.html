<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Usuário</title>
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-init.js"></script>
    <script src="script.js"></script>
    <script src="login.js" defer></script> 
</head>
<body class="body-login">
    <div class="center-box center-box-login">
        <div class="login-header">
            <h1 class="main-title main-title-success">Task Master</h1>
            <p class="center-text">Acesse sua conta de tarefas e recompensas.</p>
        </div>
        
        <hr class="divider">

        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Nome de Usuário (Apelido)</label>
                <input type="text" id="login-username" class="input-rounded" placeholder="Seu nome, sem espaços" required>
            </div>

            <div class="form-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" class="input-rounded" placeholder="Sua senha" required>
            </div>
            
            <button type="submit" class="btn-rounded btn-primary btn-rounded-large wide-button">
                Entrar
            </button>
        </form>

        <a href="cadastrar-usuario.html" class="login-link">Não tem conta? Cadastre-se aqui.</a>
        
        <p id="login-message" class="error-message hidden-start" role="alert"></p>
    </div>
</body>
</html>
