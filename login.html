<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title">Acesso ao Sistema</h1>
        
        <div class="form-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" class="input-rounded" placeholder="Seu nome" required>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" class="input-rounded" placeholder="Sua senha" required>
        </div>

        <button onclick="loginUser()" class="btn-rounded btn-primary wide-button">Entrar</button>
        
        <a href="cadastrar-usuario.html" class="btn-secondary-text wide-button" style="text-align: center; display: block; margin-top: 15px;">Primeiro acesso? Cadastre-se.</a>

        <p id="error-message" class="error-message hidden-start" role="alert" style="margin-top: 15px; text-align: center;"></p>
    </div>

    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        // O login do sistema usa o Firestore, NÃO o Firebase Auth (conforme a lógica original)
        async function loginUser() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('error-message');

            errorMessage.classList.add('hidden-start');
            errorMessage.textContent = '';

            if (!usernameInput || !passwordInput) {
                errorMessage.textContent = 'Por favor, preencha todos os campos.';
                errorMessage.classList.remove('hidden-start');
                return;
            }

            try {
                // CORREÇÃO APLICADA AQUI: Converte o username para minúsculo antes de buscar.
                const userIdToFetch = usernameInput.toLowerCase(); 
                
                // Tenta encontrar o usuário no Firestore (id do documento é o nome de usuário)
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(userIdToFetch).get();

                if (!userDoc.exists) {
                    errorMessage.textContent = 'Usuário não encontrado. Verifique o nome.';
                    errorMessage.classList.remove('hidden-start');
                    return;
                }

                const userData = userDoc.data();
                
                // Simulação de verificação de senha
                if (!userData.senha || userData.senha !== passwordInput) {
                    errorMessage.textContent = 'Senha incorreta.';
                    errorMessage.classList.remove('hidden-start');
                    return;
                }

                // Login bem-sucedido
                // Verifica se é admin ou se o nome é 'thiago' (como na sua lógica)
                const isUserAdmin = (userData.isAdmin === true) || (userIdToFetch === 'thiago');

                const usuarioLogado = {
                    // Mantenha o nome original digitado (usernameInput) ou o minúsculo (userIdToFetch)
                    // Usaremos o minúsculo para consistência com o ID do documento
                    nome: userIdToFetch,
                    isAdmin: isUserAdmin,
                };

                // Salva o objeto do usuário no localStorage
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));

                // Redireciona para o dashboard
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Erro no login:", error);
                errorMessage.textContent = 'Erro ao tentar conectar. Tente novamente.';
                errorMessage.classList.remove('hidden-start');
            }
        }
    </script>
</body>
</html>
