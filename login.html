<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title">Acesso ao Sistema</h1>
        
        <div class="form-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" class="input-rounded" placeholder="Seu nome" required>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" class="input-rounded" placeholder="Sua senha" required>
        </div>

        <button onclick="loginUser()" class="btn-rounded btn-primary wide-button">Entrar</button>
        
        <a href="cadastrar-usuario.html" class="btn-secondary-text wide-button center-text button-spacing-top">Primeiro acesso? Cadastre-se.</a>

        <p id="error-message" class="error-message hidden-start button-spacing-top center-text" role="alert"></p>
    </div>

    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        async function loginUser() {
            // Remove espaços e pega os valores
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('error-message');

            errorMessage.classList.add('hidden-start');
            errorMessage.textContent = '';

            if (!usernameInput || !passwordInput) {
                errorMessage.textContent = 'Por favor, preencha todos os campos.';
                errorMessage.classList.remove('hidden-start');
                return;
            }

            try {
                // CORREÇÃO CRÍTICA: Converte para minúsculo para garantir que o ID do documento seja encontrado
                const userIdToFetch = usernameInput.toLowerCase(); 
                
                // 1. Busca o documento do usuário usando o ID minúsculo (ex: 'thiago')
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(userIdToFetch).get();

                if (!userDoc.exists) {
                    errorMessage.textContent = 'Usuário não encontrado. Verifique o nome.';
                    errorMessage.classList.remove('hidden-start');
                    return;
                }

                const userData = userDoc.data();
                
                // 2. Verifica a senha (campo no Firestore é 'password' ou 'senha'?)
                // Baseado na sua imagem, o campo é 'password' (embora o código use 'senha').
                // Vamos ajustar para ser compatível com o que está na sua imagem (password).
                const storedPassword = userData.password || userData.senha; 

                // Verifica se a senha existe OU se a senha não bate.
                if (!storedPassword || storedPassword !== passwordInput) {
                    errorMessage.textContent = 'Senha incorreta.';
                    errorMessage.classList.remove('hidden-start');
                    return;
                }

                // 3. Login bem-sucedido
                // Verifica se é admin ou se o ID (minúsculo) é 'thiago'
                const isUserAdmin = (userData.isAdmin === true) || (userIdToFetch === 'thiago');

                const usuarioLogado = {
                    nome: userIdToFetch,
                    isAdmin: isUserAdmin,
                };

                // 4. Salva o objeto do usuário no localStorage
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));

                // 5. Redireciona para o dashboard
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Erro no login:", error);
                errorMessage.textContent = 'Erro ao tentar conectar. Tente novamente.';
                errorMessage.classList.remove('hidden-start');
            }
        }
    </script>
</body>
</html>
