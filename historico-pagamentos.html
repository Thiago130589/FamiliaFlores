<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pagamentos</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title-green">Histórico de Pagamentos Realizados</h1>
        <h2 id="user-title" class="main-title-primary"></h2>
        <hr class="divider">
        
        <div class="input-group-horizontal">
            <div class="input-group-vertical">
                <label class="input-label" for="data-inicio">De:</label>
                <input type="date" id="data-inicio" class="input-rounded">
            </div>
            <div class="input-group-vertical">
                <label class="input-label" for="data-fim">Até:</label>
                <input type="date" id="data-fim" class="input-rounded">
            </div>
        </div>

        <button id="btn-buscar-pagamentos" class="btn-rounded btn-green wide-button" style="margin-top: 20px;">Buscar Pagamentos Realizados</button>

        <div id="status-message" class="info-message" style="margin-top: 20px; min-height: 20px;">Aguardando seleção de datas.</div>
        
        <h3 id="resultado-titulo" style="margin-top: 30px; display: none;"></h3>
        
        <ul id="lista-resultados" class="list-rounded">
        </ul>
        
        <a href="gerenciar-perfis.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">Voltar ao Gerenciamento</a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';
        
        let usuarioSendoAnalisado = '';

        // Funções de Utilitário
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function getUsuarioLogado() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                const obj = JSON.parse(storedValue);
                if (!obj.isAdmin && obj.nome.toLowerCase() !== 'thiago') {
                    alert("Acesso negado. Apenas administradores podem ver históricos.");
                    window.location.href = 'index.html';
                    return null;
                }
                return obj;
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        // Função principal para buscar e renderizar os pagamentos
        async function fetchAndRenderPagamentos() {
            const statusEl = document.getElementById('status-message');
            const listaEl = document.getElementById('lista-resultados');
            const tituloEl = document.getElementById('resultado-titulo');
            listaEl.innerHTML = '';
            tituloEl.style.display = 'none';
            statusEl.className = 'info-message';
            statusEl.textContent = 'Buscando pagamentos realizados...';

            const dataInicioStr = document.getElementById('data-inicio').value;
            const dataFimStr = document.getElementById('data-fim').value;

            if (!dataInicioStr || !dataFimStr) {
                statusEl.className = 'error-message';
                statusEl.textContent = 'Por favor, selecione as datas de início e fim.';
                return;
            }

            const dataInicio = new Date(dataInicioStr);
            const dataFim = new Date(dataFimStr);
            dataFim.setDate(dataFim.getDate() + 1); 

            try {
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(usuarioSendoAnalisado).get();
                if (!userDoc.exists) {
                    statusEl.className = 'error-message';
                    // CORREÇÃO: Uso de template literal
                    statusEl.textContent = `Erro: Perfil de '${usuarioSendoAnalisado}' não encontrado.`;
                    return;
                }

                const userData = userDoc.data();
                // Estrutura esperada: [{ data: 'YYYY-MM-DD', valor: 5.00, nome: 'Pagamento de Multa X' }]
                const pagamentos = userData.pagamentosRealizados || []; 

                const pagamentosFiltrados = pagamentos.filter(pagamento => {
                    const pagamentoDate = new Date(pagamento.data + 'T00:00:00');
                    return pagamentoDate >= dataInicio && pagamentoDate < dataFim;
                });

                if (pagamentosFiltrados.length === 0) {
                    statusEl.className = 'info-message';
                    // CORREÇÃO: Uso de template literal
                    statusEl.textContent = `Nenhum pagamento realizado encontrado para ${usuarioSendoAnalisado} no período selecionado.`;
                } else {
                    let totalValorPago = 0;
                    pagamentosFiltrados.forEach(pagamento => {
                        const li = document.createElement('li');
                        li.className = 'list-item list-item-green';
                        // CORREÇÃO: Uso de template literal e dados corretos
                        li.innerHTML = `
                            <strong>Nome:</strong> ${pagamento.nome || 'Pagamento Desconhecido'}<br>
                            <strong>Data do Pagamento:</strong> ${pagamento.data}<br>
                            <strong>Valor Pago:</strong> ${formatCurrency(pagamento.valor)}
                        `;
                        listaEl.appendChild(li);
                        totalValorPago += pagamento.valor;
                    });
                    
                    // CORREÇÃO: Uso de template literal e exibição do total
                    tituloEl.textContent = `Pagamentos Realizados (${pagamentosFiltrados.length} ocorrências) (Total: ${formatCurrency(totalValorPago)})`;
                    tituloEl.style.display = 'block';
                    statusEl.className = 'success-message';
                    // CORREÇÃO: Uso de template literal
                    statusEl.textContent = `${pagamentosFiltrados.length} pagamento(s) realizado(s) encontrado(s) no período.`;
                }

            } catch (error) {
                console.error("Erro ao buscar pagamentos:", error);
                statusEl.className = 'error-message';
                statusEl.textContent = 'Erro ao buscar pagamentos. Verifique o console.';
            }
        }


        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            if (!getUsuarioLogado()) return; 

            usuarioSendoAnalisado = getQueryParam('user');
            if (!usuarioSendoAnalisado) {
                document.getElementById('status-message').className = 'error-message';
                document.getElementById('status-message').textContent = 'Erro: Usuário não especificado.';
                return;
            }

            // CORREÇÃO: Uso de template literal
            document.getElementById('user-title').textContent = `Usuário: ${usuarioSendoAnalisado}`;
            
            document.getElementById('btn-buscar-pagamentos').onclick = fetchAndRenderPagamentos;

            // Define datas padrão (Ex: Últimos 30 dias)
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setDate(today.getDate() - 30);

            const formatDate = (date) => date.toISOString().split('T')[0];

            document.getElementById('data-inicio').value = formatDate(lastMonth);
            document.getElementById('data-fim').value = formatDate(today);
        });
    </script>
</body>
</html>
