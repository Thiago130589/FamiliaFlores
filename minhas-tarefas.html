<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 class="main-title-blue">Minhas Tarefas</h1>
        <hr class="divider">

        <div id="minhas-tarefas-list" style="width: 100%;">
            <p class="empty-message">Carregando tarefas...</p>
        </div>

        <button onclick="voltarAoPerfil()" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">Voltar ao perfil</button>
    </div>

    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }
        
        // Função utilitária para obter o nome do usuário de forma segura
        function getNomeUsuario() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                // Se não estiver logado, redireciona
                window.location.href = 'login.html'; 
                return null;
            }
            try {
                const obj = JSON.parse(storedValue);
                // Retorna o nome, garantindo que seja string e sem espaços extras
                return String(obj.nome).trim(); 
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        // Função para formatar a data (melhor do que apenas .toLocaleDateString)
        function formatarDataTarefa(timestamp) {
            // Verifica se é um timestamp válido (como o Firestore salva)
            if (timestamp && timestamp.seconds) {
                return new Date(timestamp.seconds * 1000).toLocaleDateString('pt-BR');
            }
            // Tenta tratar como string (seu padrão)
            if (typeof timestamp === 'string' && timestamp.length >= 10) {
                 // Converte 'AAAA-MM-DD' para 'DD/MM/AAAA'
                const parts = timestamp.substring(0, 10).split('-');
                if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            }
            return 'Data N/A';
        }


        // Função para carregar tarefas atribuídas ao usuário logado
        async function loadMinhasTarefas() {
            const lista = document.getElementById('minhas-tarefas-list');
            lista.innerHTML = '<p class="empty-message">Carregando tarefas...</p>'; // Garante o loader
            
            const userName = getNomeUsuario();
            
            if (!userName) {
                lista.innerHTML = '<p class="error-message">ERRO: Usuário não identificado. Faça login novamente.</p>';
                return;
            }

            try {
                // Filtra tarefas pelo nome do usuário E status 'atribuida' ou 'PendentePagamento'
                const snapshot = await firestore.collection('tarefasAtribuidas')
                    .where('atribuidaPara', '==', userName) // Filtra pelo nome do usuário logado (string)
                    .where('status', 'in', ['atribuida', 'PendentePagamento'])
                    // Ordena por data de criação (ou outro campo relevante)
                    .orderBy('dataAtribuicao', 'desc') 
                    .get();

                lista.innerHTML = ''; // Limpa o loader

                if (snapshot.empty) {
                    lista.innerHTML = '<p class="empty-message">Você não tem tarefas em andamento ou pendentes de pagamento.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const tarefa = doc.data();
                    
                    const elemento = document.createElement('div');
                    // Usando o card de tarefa padrão que você deve ter no css/style.css
                    elemento.className = 'tarefa-card'; 
                    
                    const isPendentePagamento = tarefa.status === 'PendentePagamento';
                    
                    const statusText = isPendentePagamento 
                        ? `<span class="status-pending">Pendente Pagamento</span>` 
                        : `<span class="status-inprogress">Em Andamento</span>`;
                            
                    const buttonHtml = isPendentePagamento 
                        ? `<button class="btn-disabled">Aguardando Pagamento</button>` 
                        : `<button onclick="concluirTarefa('${doc.id}', '${tarefa.nome}')" class="btn-rounded btn-green">Concluir Tarefa</button>`;

                    // Usando a função de formatação
                    const dataFormatada = formatarDataTarefa(tarefa.data); 

                    elemento.innerHTML = `
                        <div class="tarefa-details">
                            <span class="tarefa-nome">${tarefa.nome} (${dataFormatada})</span>
                            <span class="tarefa-status">${statusText}</span>
                            <span class="tarefa-info">R$ ${parseFloat(tarefa.valor || 0).toFixed(2).replace('.', ',')} | ${tarefa.inicio} - ${tarefa.fim}</span>
                        </div>
                        ${buttonHtml}
                    `;
                    lista.appendChild(elemento);
                });

            } catch (error) {
                console.error("Erro ao carregar minhas tarefas:", error);
                lista.innerHTML = `<p class="error-message">Erro ao carregar tarefas. Verifique o Console (F12).</p>`;
            }
        }

        // Função para mover a tarefa para o status 'PendentePagamento'
        async function concluirTarefa(taskId, nomeTarefa) {
            if (!confirm(`Você concluiu a tarefa "${nomeTarefa}"? Ela será enviada para aprovação e pagamento do Administrador.`)) {
                return;
            }

            try {
                const taskRef = firestore.collection('tarefasAtribuidas').doc(taskId);
                
                // Manda a tarefa para a fila de pagamento do Admin
                await taskRef.update({ 
                    status: 'PendentePagamento', 
                    // Salva a data de conclusão no padrão 'AAAA-MM-DD'
                    dataConclusao: new Date().toISOString().split('T')[0] 
                });

                alert(`Tarefa "${nomeTarefa}" enviada para aprovação de pagamento!`);
                loadMinhasTarefas(); // Recarrega a lista
            } catch (e) {
                console.error("Erro ao concluir a tarefa:", e);
                alert('Erro ao enviar a tarefa para aprovação. Tente novamente.');
            }
        }


        window.addEventListener('DOMContentLoaded', loadMinhasTarefas);
    </script>
</body>
</html>
