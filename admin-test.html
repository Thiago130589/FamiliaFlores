<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Tarefas - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>

    <div id="admin-content">
        
        <h1>Gerenciar Tarefas</h1>

        <button>Criar Tarefas</button><br><br>
        <button>Excluir Tarefas</button><br><br>
        <button>Tarefas Pendentes</button><br><br>
        <button>Tarefas Concluídas</button><br><br>
        <button>Voltar ao Painel Administrador</button>
        
    </div>

    <script>
        // A função checkAdminAccess do passo anterior foi mantida.
        function checkAdminAccess() {
            // Supondo que 'getUsuarioLogado' existe em 'js/script.js' ou 'firebase-init.js'
            const userInfo = typeof getUsuarioLogado === 'function' ? getUsuarioLogado() : { nome: null, isAdmin: false };
            
            // Se não for admin ou não estiver logado, redireciona.
            if (!userInfo || !userInfo.isAdmin) {
                // Redireciona para a página principal
                window.location.href = 'index.html'; 
                return false;
            }
            // Não há mais código aqui para mostrar a div, já que não temos CSS/JS para esconder. 
            // A div #admin-content será visível por padrão.
            return userInfo.nome;
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Apenas executa a checagem no carregamento.
            checkAdminAccess();
        });
    </script>
</body>
</html>
