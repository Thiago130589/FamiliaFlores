<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Master</title>
    
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="firebase-init.js"></script> 
    <script src="script.js"></script> <script src="index.js" defer></script> 
</head>
<body class="body-dashboard">
    <main class="dashboard-container">
        
        <section class="user-profile-card">
            
            <button onclick="logout()" class="btn-logout-card">Sair</button>
            
            <div class="user-photo-container">
                <img id="user-photo" src="assets/default-avatar.png" alt="Foto de Perfil" class="user-photo">
            </div>

            <div class="user-details">
                <h2 id="user-name">Carregando...</h2> 
                
                <span id="user-perfil-badge" class="profile-badge"></span>
                
                <p id="user-username">@carregando</p> 
            </div>
            
            <hr class="divider-thin">

            <div class="user-balance">
                <p>Seu Saldo Atual</p>
                <h3 id="user-saldo">R$ 0,00</h3>
            </div>
        </section>
        
        <section class="action-grid-card">
            <h2 class="section-title">Ações Rápidas</h2>
            
            <a href="minhas-tarefas.html" class="action-item">
                <i class="icon icon-tasks"></i>
                <span>Ver Tarefas</span>
            </a>
            
            <a href="historico-tarefas.html" class="action-item">
                <i class="icon icon-history"></i>
                <span>Histórico</span>
            </a>
            
            <a href="trocar-premios.html" class="action-item">
                <i class="icon icon-prizes"></i>
                <span>Trocar Prêmios</span>
            </a>
            
            <a href="minha-carteira.html" class="action-item">
                <i class="icon icon-wallet"></i>
                <span>Minha Carteira</span>
            </a>
        </section>

        <section id="admin-section" class="admin-panel hidden">
            <h2 class="section-title admin-title">Funções Administrativas</h2>
            <div class="action-grid admin-grid">
                
                <a href="gerenciar-tarefas.html" class="action-item admin-item">
                    <i class="icon icon-manage-tasks"></i>
                    <span>Gerenciar Tarefas</span>
                </a>
                
                <a href="gerenciar-perfis.html" class="action-item admin-item">
                    <i class="icon icon-manage-users"></i>
                    <span>Gerenciar Usuários</span>
                </a>

                <a href="painel-admin.html" class="action-item admin-item">
                    <i class="icon icon-settings"></i>
                    <span>Painel Geral</span>
                </a>
            </div>
        </section>
        
    </main>
</body>
</html>
