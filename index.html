<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <div class="header-actions">
            <div class="profile-header-container">
                <img id="profile-pic" class="profile-pic" src="img/default-avatar.png" alt="Foto de Perfil">
                
                <p id="welcome-message" class="info-message center-text" style="font-size: 1.1em; margin-top: 10px;">Carregando...</p>
                <p id="user-role-status" class="status-badge center-text" style="margin-top: 5px; font-weight: bold;"></p>
            </div>
            
            <button class="btn-icon btn-danger btn-rounded" onclick="logout()" title="Sair">&#x2715;</button>
        </div>
        
        <hr style="border-color: #ddd;">

        <div id="saldo-card" class="tarefa-card" style="border-left-color: var(--success-color); margin-bottom: 25px;">
            <div class="tarefa-header-admin">
                <span class="tarefa-nome-admin">Seu Saldo Atual:</span>
                <span class="positive-text" id="current-saldo">R$ 0,00</span>
            </div>
            <p class="info-message">Atualizado em tempo real.</p>
        </div>

        <div class="action-grid action-grid-two-cols">
            <a href="minhas-tarefas.html" class="btn-rounded btn-info wide-button">
                Minhas Tarefas
            </a>
            <a href="tarefas-disponiveis.html" class="btn-rounded btn-success wide-button">
                Pegar Novas Tarefas
            </a>
            <a href="historico-pagamentos.html" class="btn-rounded btn-secondary wide-button">
                Histórico de Tarefas Pagas
            </a>
        </div>
        
        <a id="admin-link" href="gerenciar-tarefas.html" class="btn-rounded btn-danger wide-button hidden-start" style="margin-top: 25px;">
            Acessar Painel Admin
        </a>

        <div class="action-grid button-spacing-top">
             <button onclick="openProfileModal()" class="btn-rounded btn-secondary-text wide-button">
                 Configurações do Perfil
             </button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay hidden-start" onclick="closeProfileModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="modal-title">Configurações do Perfil</h2>
            
            <p class="info-message center-text" style="margin-bottom: 20px;">Selecione qual informação deseja atualizar.</p>
            
            <div class="action-grid action-grid-single-col">
                <button class="btn-rounded btn-info wide-button" onclick="alert('Funcionalidade de troca de foto em desenvolvimento.')">
                    Trocar Foto de Perfil
                </button>
                <button class="btn-rounded btn-primary wide-button" onclick="alert('Funcionalidade de troca de Nome e Sobrenome em desenvolvimento.')">
                    Trocar Nome/Sobrenome
                </button>
                <button class="btn-rounded btn-primary wide-button" onclick="alert('Funcionalidade de troca de Idade em desenvolvimento.')">
                    Trocar Idade
                </button>
                <button class="btn-rounded btn-danger wide-button" onclick="alert('Funcionalidade de troca de Senha em desenvolvimento.')">
                    Trocar Senha
                </button>
            </div>
            
            <div class="modal-actions centered-actions button-spacing-top">
                <button class="btn-rounded btn-secondary" onclick="closeProfileModal()">Fechar</button>
            </div>
        </div>
    </div>
    
    <script>
        // A variável 'db' é definida em js/firebase-init.js
        const firestore = db;
        const USERS_COLLECTION = 'users';

        // LÓGICA DO MODAL (Usando toggleModal do script.js)
        function openProfileModal() {
            toggleModal('profile-modal', true);
        }

        function closeProfileModal(event) {
            // Fecha apenas se o clique for no botão 'Fechar' ou no overlay
            if (!event || event.target.id === 'profile-modal' || event.target.tagName === 'BUTTON') {
                toggleModal('profile-modal', false);
            }
        }

        // LÓGICA DO DASHBOARD (Ajustada)
        async function loadDashboard() {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.uid) {
                // getUsuarioLogado() já redireciona se necessário.
                return;
            }

            const welcomeMessageElement = document.getElementById('welcome-message');
            const adminLink = document.getElementById('admin-link');
            const userRoleStatus = document.getElementById('user-role-status'); 
            const profilePicElement = document.getElementById('profile-pic');
            
            // Tenta buscar o documento usando o UID ou o nome/email, dependendo da sua estrutura
            // Como você usou 'userInfo.nome' no localStorage, vamos usá-lo:
            welcomeMessageElement.textContent = `Olá, ${userInfo.nome || userInfo.email}!`;


            // 3. Carrega Saldo e Foto do Firestore
            // Assumindo que a collection 'users' usa o 'nome' ou 'uid' como ID do documento
            // Recomendo usar o UID, mas mantendo a lógica com 'nome' que você enviou:
            const userDoc = await firestore.collection(USERS_COLLECTION).doc(userInfo.nome).get();

            if (userDoc.exists) {
                const userData = userDoc.data();
                
                // 1. STATUS ADMIN
                if (userData.isAdmin) {
                    userRoleStatus.textContent = 'Administrador';
                    userRoleStatus.style.color = 'var(--error-color)';
                    adminLink.classList.remove('hidden-start');
                } else {
                    userRoleStatus.textContent = 'Membro';
                    userRoleStatus.style.color = 'var(--info-color)';
                    adminLink.classList.add('hidden-start');
                }

                // 2. FOTO DE PERFIL (CRÍTICO)
                if (userData.fotoUrl) {
                    profilePicElement.src = userData.fotoUrl;
                } else {
                    // Mantém o avatar padrão, mas garante que não haja erro
                    profilePicElement.src = "img/default-avatar.png";
                }
                
                // 3. SALDO
                const saldo = userData.saldo || 0;
                const saldoElement = document.getElementById('current-saldo');
                saldoElement.textContent = formatarMoeda(saldo);
                
                // Aplica cor ao saldo
                saldoElement.classList.remove('positive-text', 'negative-text');
                saldoElement.classList.add(saldo >= 0 ? 'positive-text' : 'negative-text');

            } else {
                // Caso não encontre o documento no Firestore
                userRoleStatus.textContent = 'Membro';
                userRoleStatus.style.color = 'var(--info-color)';
                document.getElementById('current-saldo').textContent = formatarMoeda(0);
            }
            
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
