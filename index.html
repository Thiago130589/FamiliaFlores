<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" id="welcome-message">Carregando...</h1>
        <p style="text-align: center; margin-bottom: 20px;">Seu dashboard.</p>
        <hr class="divider">

        <div id="saldo-card" class="dashboard-card" style="border-left-color: var(--success-color); margin-bottom: 25px;">
            <div class="tarefa-card-content">
                <span class="tarefa-name">Seu Saldo Atual:</span>
                <span class="tarefa-info" id="current-saldo">R$ 0,00</span>
            </div>
            </div>

        <div class="admin-action-grid">
            <a href="minhas-tarefas.html" class="btn-rounded btn-info wide-button task-action-button">
                Minhas Tarefas (Em Andamento)
            </a>

            <a href="tarefas-disponiveis.html" class="btn-rounded btn-success wide-button task-action-button">
                Pegar Novas Tarefas
            </a>
            
            <a href="historico-pagamentos.html" class="btn-rounded btn-secondary wide-button task-action-button">
                Histórico de Tarefas Pagas
            </a>
            
            <a href="editar-perfil.html" class="btn-rounded btn-secondary-text wide-button task-action-button">
                Configurações do Perfil
            </a>
            
            <button onclick="logout()" class="btn-rounded btn-danger wide-button" style="margin-top: 20px;">
                Sair
            </button>
        </div>
        
        <a id="admin-link" href="admin.html" class="btn-rounded btn-warning wide-button hidden-start" style="margin-top: 15px;">
            Acessar Painel Admin
        </a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        // 1. Carrega informações e checa o login
        async function loadDashboard() {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                // Redireciona se não houver login
                window.location.href = 'login.html';
                return;
            }

            // Exibe o nome do usuário
            document.getElementById('welcome-message').textContent = `Olá, ${userInfo.nome}!`;

            // Verifica e exibe o link do Admin
            if (userInfo.isAdmin) {
                document.getElementById('admin-link').classList.remove('hidden-start');
            }

            // 2. Carrega o Saldo (necessário buscar do Firestore, pois o localStorage pode estar desatualizado)
            try {
                const userDoc = await firestore.collection('users').doc(userInfo.nome).get();
                
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const saldo = userData.saldo || 0;
                    
                    // Usa a função formatarMoeda do script.js
                    document.getElementById('current-saldo').textContent = formatarMoeda(saldo);
                } else {
                    document.getElementById('current-saldo').textContent = formatarMoeda(0);
                }

            } catch (error) {
                console.error("Erro ao carregar saldo:", error);
                document.getElementById('current-saldo').textContent = 'Erro ao carregar saldo';
            }
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
