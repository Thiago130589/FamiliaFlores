<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Plataforma</title>
    
    <link rel="stylesheet" href="style.css"> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-init.js"></script>
    
    <script src="script.js" defer></script> 
</head>
<body>
    <div class="center-box center-box-dashboard">
        
        <button id="logout-button" class="btn-logout-card">Sair</button>

        <header class="user-profile-header">
            <div class="user-details-text">
                <h1 id="user-name">Carregando...</h1>
                <span id="user-username">@loading</span>
                <span id="user-role" class="profile-badge admin-badge hidden-start">ADMIN</span>
            </div>
            
            <div class="user-photo-container">
                <img id="user-photo" class="user-photo-style" alt="Foto do Usuário" src="imagens/default-avatar.png">
            </div>
        </header>

        <hr class="divider">

        <div class="user-balance">
            <p>Saldo Atual</p>
            <div class="balance-line">
                <p id="user-saldo" class="saldo-positivo">R$ 0,00</p>
                <a href="minha-carteira.html" class="btn-carteira-saldo">
                    <i class="fas fa-wallet"></i> Carteira
                </a>
            </div>
        </div>

        <hr class="divider">

        <div class="action-grid-card">
            <div class="section-title">Ações</div>
            <div class="action-grid">
                <a href="tarefas-disponiveis.html" class="action-item">
                    <i class="fas fa-list-check action-icon icon-tarefas"></i>
                    Tarefas Disponíveis
                </a>
                
                <a href="resgatar-recompensas.html" class="action-item">
                    <i class="fas fa-gift action-icon icon-recompensa"></i>
                    Resgatar Recompensas
                </a>
                
                <a href="historico.html" class="action-item">
                    <i class="fas fa-history action-icon icon-historico"></i>
                    Histórico
                </a>

                <a href="painel-admin.html" id="admin-button" class="action-item hidden-start">
                    <i class="fas fa-user-gear action-icon icon-admin"></i>
                    Painel Admin
                </a>

            </div>
        </div>
        
    </div>
</body>
</html>
