<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Meu Perfil</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 id="page-title" class="main-title">Dashboard</h1>
        <hr class="divider">

        <div id="profile-container" class="profile-card" style="display: none; text-align: center;">
            <img id="profile-picture" src="assets/perfil-padrao.png" alt="Foto de Perfil" class="profile-img">
            <p id="time-display" class="time-text brasilia-clock"></p>
            <h2 id="user-name" class="user-name-text"></h2>
            <p id="user-role" class="user-role-text"></p>
        </div>

        <div id="loading-container" style="display: none; text-align: center;">
            <h2 class="section-title">Ações Rápidas</h2>
            <p id="loading-links">Carregando links...</p>
        </div>
        
        <nav id="nav-menu" class="nav-menu">
            </nav>
        
        <button id="logout-button" class="btn-rounded btn-danger wide-button" style="margin-top: 20px;">Sair / Logout</button>
    </div>

    <script src="js/script.js"></script>

    <script>
        // Tenta usar a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        let usuarioLogadoData = null; 

        function startBrasilClock(displayElementId) {
            const timeDisplay = document.getElementById(displayElementId);
            if (!timeDisplay) return;

            function updateTime() {
                const now = new Date();
                const options = {
                    timeZone: 'America/Sao_Paulo',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                };
                const brasilTime = now.toLocaleTimeString('pt-BR', options);
                timeDisplay.textContent = brasilTime.replace(',', ' (Brasília)');
            }
            updateTime();
            setInterval(updateTime, 1000);
        }

        async function loadProfileAndMenu() {
            const pageTitle = document.getElementById('page-title');
            const profileContainer = document.getElementById('profile-container');
            const navMenu = document.getElementById('nav-menu');
            const userNameEl = document.getElementById('user-name');
            const userRoleEl = document.getElementById('user-role');
            const logoutButton = document.getElementById('logout-button');
            const profilePictureEl = document.getElementById('profile-picture');
            
            const storedValue = localStorage.getItem('usuarioLogado');

            if (!storedValue) {
                window.location.href = 'login.html';
                return;
            }

            try {
                usuarioLogadoData = JSON.parse(storedValue);
                const nome = usuarioLogadoData.nome;
                
                // 1. Buscar isAdmin e foto diretamente do Firestore (Se faltou no login)
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(nome).get();
                if (!userDoc.exists) {
                     throw new Error("Perfil não encontrado no Firestore.");
                }

                const userData = userDoc.data();
                const isAdmin = userData.isAdmin || false; // Assume false se não existir
                const fotoURL = userData.foto || 'assets/perfil-padrao.png';

                // 2. Atualizar o localStorage para consistência
                usuarioLogadoData.isAdmin = isAdmin;
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogadoData));
                
                // 3. Exibir Dados
                userNameEl.textContent = nome;
                userRoleEl.textContent = isAdmin ? 'Administrador' : 'Membro da Família';
                profilePictureEl.src = fotoURL; // Define a foto

                profileContainer.style.display = 'flex'; // Exibe o container com o novo CSS
                
                startBrasilClock('time-display');

                // 4. Montar os Links
                const links = [
                    { href: 'tarefas-disponiveis.html', text: 'Tarefas Disponíveis' },
                    { href: 'minhas-tarefas.html', text: 'Minhas Tarefas' },
                    { href: 'tarefas-pendentes.html', text: 'Tarefas Pendentes' },
                    { href: 'tarefas-concluidas.html', text: 'Tarefas Concluídas' },
                    { href: 'carteira.html', text: 'Carteira' },
                    // Links de Admin/Gerenciamento
                    ...(isAdmin ? [
                        { href: 'gerenciar-tarefas.html', text: 'Gerenciar Tarefas' },
                        { href: 'gerenciar-perfis.html', text: 'Gerenciar Perfis' }, 
                        { href: 'multas.html', text: 'Multas' },
                        { href: 'gerenciar-carteira.html', text: 'Gerenciar Carteira' }
                    ] : [])
                ];

                // CORREÇÃO ESSENCIAL DO MENU: Uso de uma div interna para dar o espaçamento flexível (veja o CSS)
                navMenu.innerHTML = links.map(link => 
                    `<a href="${link.href}" class="menu-link">${link.text}</a>` 
                ).join('');


                logoutButton.onclick = function() {
                    localStorage.removeItem('usuarioLogado');
                    window.location.href = 'login.html';
                };
                
            } catch (e) {
                console.error("Erro ao carregar dados do perfil:", e);
                // Força o logout e redireciona se houver erro grave
                localStorage.removeItem('usuarioLogado');
                window.location.href = 'login.html';
            }
        }

        window.addEventListener('DOMContentLoaded', loadProfileAndMenu);
    </script>
</body>
</html>
