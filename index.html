<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css"> 

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    
    <div class="center-box">

        <h1 class="main-title">Dashboard</h1>
        <hr class="divider">

        <div id="profileCard" class="profile-card">
            
            <img id="profileImage" src="assets/default-profile.png" alt="Foto de Perfil" class="profile-img"> 
            
            <span id="usernameOverlay" style="color: #1976d2; font-weight: bold; font-size: 1.0rem; margin-top: -30px; margin-bottom: 5px;"></span> 
            
            <span id="brasiliaClock" class="brasilia-clock"></span>
            
            <h2 id="userName" class="user-name-text">Carregando...</h2>
            
            <span id="userRole" class="user-role-text">Carregando Perfil...</span>
            
            <hr class="divider"> 

            <nav id="navMenu" class="nav-menu">
                <p id="loadingLinks">Carregando links...</p>
            </nav>

            <button id="logoutButton" class="btn-rounded btn-danger wide-button">
                Sair / Logout
            </button>
        </div>
        
    </div>

    <script>
        // Mantenha esta estrutura JS aqui para garantir que o script seja executado após o HTML

        // Função do Botão de Logout (Se estiver no script.js, remova daqui)
        document.getElementById('logoutButton').onclick = function() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html';
        };

        // Inicia o processo de carregamento quando a página terminar de carregar
        window.addEventListener('DOMContentLoaded', () => {
            // Supondo que essas funções estejam no seu script.js
            if (typeof loadProfileAndMenu === 'function') {
                loadProfileAndMenu();
            }
            if (typeof startBrasiliaClock === 'function') {
                startBrasiliaClock();
            }
        });
    </script>
</body>
</html>
