<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>

    <style>
        /* Container principal do topo: Perfil + Botão Sair */
        .header-actions {
            display: flex;
            justify-content: space-between; /* Espaça os elementos (Extrema Esquerda e Extrema Direita) */
            align-items: flex-start; 
            margin-bottom: 15px;
        }

        /* Container que agrupa Foto, Nome e Status - ALINHADO À ESQUERDA */
        .profile-header-container {
            flex-grow: 1; 
            display: flex;
            align-items: center; 
            justify-content: flex-start; /* GARANTINDO O ALINHAMENTO TOTAL À ESQUERDA */
            text-align: left;
        }

        /* Container das Mensagens (Olá, Status) - REDUZINDO O ESPAÇAMENTO */
        .profile-text-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            margin-left: 10px; /* Reduzi o espaço entre a foto e o texto para 10px */
        }
        
        /* Foto de perfil no Dashboard: 90px */
        .profile-pic {
            width: 90px; 
            height: 90px; 
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            flex-shrink: 0; 
            order: 1; 
        }
        
        /* Ajuste do botão Sair (para ficar na extrema direita) */
        #logout-button-container {
             flex-shrink: 0; 
        }

        /* --- Estilos do Modal (Mantidos para garantir a funcionalidade) --- */
        .modal-content .profile-header-container {
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
            display: flex;
        }
        .modal-content .profile-text-info {
            margin-left: 0; 
            align-items: flex-start;
            order: 1;
        }
        .modal-content .profile-pic {
            width: 80px; 
            height: 80px;
            order: 3; 
        }

    </style>
</head>
<body>
    <div class="center-box large-box">
        
        <div class="header-actions">
            
            <div class="profile-header-container">
                <img id="profile-pic" class="profile-pic" src="img/default-avatar.png" alt="Foto de Perfil">
                <div class="profile-text-info">
                    <p id="welcome-message" class="info-message" style="font-size: 1.1em; margin-top: 10px;">Carregando...</p>
                    <p id="user-role-status" class="status-badge" style="margin-top: 5px; font-weight: bold;"></p>
                </div>
            </div>
            
            <div id="logout-button-container">
                <button class="btn-icon btn-danger btn-rounded" onclick="logout()" title="Sair">&#x2715;</button>
            </div>
        </div>
        
        <hr style="border-color: #ddd;">

        <div id="saldo-card" class="tarefa-card" style="border-left-color: var(--success-color); margin-bottom: 25px;">
            <div class="tarefa-header-admin">
                <span class="tarefa-nome-admin">Seu Saldo Atual:</span>
                <span class="positive-text" id="current-saldo">R$ 0,00</span>
            </div>
            <p class="info-message" style="margin-bottom: 10px;">Atualizado em tempo real.</p>
            <a href="minha-carteira.html" class="btn-rounded btn-success wide-button" style="padding: 8px 15px; width: auto; font-size: 0.85em; margin-top: 5px;">
                <span style="font-size: 1.1em; margin-right: 5px;">💰</span> Ver Carteira
            </a>
        </div>

        <div class="action-grid action-grid-two-cols">
            <a href="minhas-tarefas.html" class="btn-rounded btn-info wide-button">
                Minhas Tarefas
            </a>
            <a href="tarefas-disponiveis.html" class="btn-rounded btn-success wide-button">
                Pegar Novas Tarefas
            </a>
            <a href="historico-pagamentos.html" class="btn-rounded btn-secondary wide-button">
                Histórico de Tarefas Pagas
            </a>
        </div>
        
        <a id="admin-link" href="gerenciar-tarefas.html" class="btn-rounded btn-danger wide-button hidden-start" style="margin-top: 25px;">
            Acessar Painel Admin
        </a>

        <div class="action-grid button-spacing-top">
             <button onclick="openProfileModal()" class="btn-rounded btn-secondary-text wide-button">
                 Configurações do Perfil
             </button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay hidden-start" onclick="closeProfileModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="modal-title">Configurações do Perfil</h2>
            
            <div class="profile-header-container">
                <div class="profile-text-info">
                    <p id="modal-welcome-message" class="info-message" style="margin-top: 5px; text-align: left;">Carregando...</p>
                    <p id="modal-user-role-status" class="status-badge" style="margin-top: 5px; font-weight: bold;"></p>
                </div>
                <img id="modal-profile-pic" class="profile-pic" src="img/default-avatar.png" alt="Foto de Perfil">
            </div>

            <p class="info-message center-text" style="margin-bottom: 20px;">Selecione qual informação deseja atualizar.</p>
            
            <div class="action-grid action-grid-single-col">
                <button class="btn-rounded btn-info wide-button" onclick="alert('Funcionalidade de troca de foto em desenvolvimento.')">
                    Trocar Foto de Perfil
                </button>
                <button class="btn-rounded btn-primary wide-button" onclick="alert('Funcionalidade de troca de Nome e Sobrenome em desenvolvimento.')">
                    Trocar Nome/Sobrenome
                </button>
                <button class="btn-rounded btn-primary wide-button" onclick="alert('Funcionalidade de troca de Idade em desenvolvimento.')">
                    Trocar Idade
                </button>
                <button class="btn-rounded btn-danger wide-button" onclick="alert('Funcionalidade de troca de Senha em desenvolvimento.')">
                    Trocar Senha
                </button>
            </div>
            
            <div class="modal-actions centered-actions button-spacing-top">
                <button class="btn-rounded btn-secondary" onclick="closeProfileModal()">Fechar</button>
            </div>
        </div>
    </div>
    
    <script>
        const firestore = db;
        const USERS_COLLECTION = 'users';

        function openProfileModal() {
            const userInfo = getUsuarioLogado();
            
            if (userInfo && userInfo.nome) {
                // LÓGICA DA FOTO: Tenta fotoBase64, depois fotoUrl, ou usa o default
                const fotoSource = userInfo.fotoBase64 || userInfo.fotoUrl || 'img/default-avatar.png';
                
                document.getElementById('modal-welcome-message').textContent = `Olá, ${userInfo.nome}!`;
                document.getElementById('modal-profile-pic').src = fotoSource; 
                
                const statusElement = document.getElementById('modal-user-role-status');
                if (userInfo.isAdmin) {
                    statusElement.textContent = 'Administrador';
                    statusElement.style.color = 'var(--error-color)';
                } else {
                    statusElement.textContent = 'Membro';
                    statusElement.style.color = 'var(--info-color)';
                }
            } else {
                 document.getElementById('modal-welcome-message').textContent = 'Carregando...';
            }
            
            toggleModal('profile-modal', true);
        }

        function closeProfileModal(event) {
            if (!event || event.target.id === 'profile-modal' || event.target.tagName === 'BUTTON') {
                toggleModal('profile-modal', false);
            }
        }

        async function loadDashboard() {
            checkLoginStatus(); 

            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                return;
            }

            const welcomeMessageElement = document.getElementById('welcome-message');
            const adminLink = document.getElementById('admin-link');
            const userRoleStatus = document.getElementById('user-role-status'); 
            const profilePicElement = document.getElementById('profile-pic');
            const saldoElement = document.getElementById('current-saldo');
            
            // 1. CARREGA DADOS DO LOCALSTORAGE (Dashboard principal)
            welcomeMessageElement.textContent = `Olá, ${userInfo.nome}!`;
            
            // LÓGICA DA FOTO: Tenta fotoBase64, depois fotoUrl, ou usa o default
            const fotoSource = userInfo.fotoBase64 || userInfo.fotoUrl || 'img/default-avatar.png';
            profilePicElement.src = fotoSource; 
            
            // 2. STATUS ADMIN
            if (userInfo.isAdmin) {
                userRoleStatus.textContent = 'Administrador';
                userRoleStatus.style.color = 'var(--error-color)';
                adminLink.classList.remove('hidden-start');
            } else {
                userRoleStatus.textContent = 'Membro';
                userRoleStatus.style.color = 'var(--info-color)';
                adminLink.classList.add('hidden-start');
            }

            // 3. SALDO (Busca a versão mais recente no Firestore)
            let currentSaldo = userInfo.saldo || 0;
            
            try {
                const userDoc = await firestore.collection(USERS_COLLECTION).doc(userInfo.nome).get();
                if (userDoc.exists && typeof userDoc.data().saldo !== 'undefined') {
                    currentSaldo = userDoc.data().saldo;
                }
            } catch (error) {
                console.error("Erro ao buscar saldo atualizado:", error);
            }
            
            saldoElement.textContent = formatarMoeda(currentSaldo);
            saldoElement.classList.remove('positive-text', 'negative-text');
            saldoElement.classList.add(currentSaldo >= 0 ? 'positive-text' : 'negative-text');
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
