<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Meu Perfil</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box large-box">
        <h1 id="welcome-message" class="main-title-green">Carregando Perfil...</h1>
        <hr class="divider">

        <div id="saldo-area" class="saldo-card" style="display:none;">
            <h2>Seu Saldo Atual</h2>
            <p id="saldo-valor" class="saldo-amount">R$ 0,00</p>
        </div>
        
        <hr id="member-divider" class="divider" style="display:none;">

        <h2 style="color: #444; margin-top: 30px;">Ações Rápidas</h2>
        <div id="dashboard-links" class="dashboard-links-container">
            <p>Carregando links...</p>
        </div>

        <button onclick="logout()" class="btn-rounded btn-danger wide-button" style="margin-top: 30px;">Sair / Logout</button>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        // --- Funções de Utilitário ---

        // Função para obter o nome, status Admin e senha do usuário logado
        function getUsuarioInfo() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) return { nome: null, isAdmin: false, senha: null };
            try {
                const obj = JSON.parse(storedValue);
                const userName = String(obj.nome).trim();
                // Admin é 'thiago' OU tem a flag 'isAdmin: true'
                const isUserAdmin = (obj.isAdmin === true) || (userName.toLowerCase() === 'thiago');
                return { 
                    nome: userName, 
                    isAdmin: isUserAdmin,
                    senha: obj.senha
                };
            } catch (e) {
                return { nome: null, isAdmin: false, senha: null };
            }
        }

        // Função de Logout
        function logout() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html'; // Redireciona para a página de login
        }

        // --- Renderização do Dashboard ---
        
        async function loadProfile() {
            const userInfo = getUsuarioInfo();
            const welcomeEl = document.getElementById('welcome-message');
            const saldoAreaEl = document.getElementById('saldo-area');
            const saldoValorEl = document.getElementById('saldo-valor');
            const dashboardEl = document.getElementById('dashboard-links');
            const memberDividerEl = document.getElementById('member-divider');

            // 1. Verificar Autenticação - Redireciona imediatamente se não estiver logado
            if (!userInfo.nome) {
                window.location.href = 'login.html';
                return;
            }
            
            welcomeEl.textContent = Olá, !;
            if (userInfo.isAdmin) {
                welcomeEl.innerHTML += <span style="font-size: 0.7em; color: #f44336; margin-left: 10px;">(ADMIN)</span>;
            }

            // 2. Carregar Saldo e Área do Membro
            try {
                const userDoc = await firestore.collection('users').doc(userInfo.nome).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const saldo = parseFloat(userData.saldo || 0);
                    saldoValorEl.textContent = R$ ;
                    
                    if (!userInfo.isAdmin) {
                       saldoAreaEl.style.display = 'block';
                       memberDividerEl.style.display = 'block';
                    } else {
                        saldoAreaEl.style.display = 'none';
                        memberDividerEl.style.display = 'none';
                    }

                } else {
                    saldoValorEl.textContent = 'Erro: Usuário não cadastrado no Firestore.';
                    saldoAreaEl.style.display = 'block';
                }
            } catch (error) {
                console.error("Erro ao carregar saldo:", error);
                saldoValorEl.textContent = 'Erro ao carregar saldo.';
                saldoAreaEl.style.display = 'block';
            }


            // 3. Renderizar Links de Navegação
            dashboardEl.innerHTML = '';
            
            const links = userInfo.isAdmin 
                ? [
                    // Links do Administrador
                    { href: 'gerenciar-tarefas.html', text: 'Gerenciar Tarefas (Criar/Editar)', style: 'btn-admin-action' },
                    { href: 'tarefas-pendentes.html', text: 'Ver Tarefas Pendentes', style: 'btn-tertiary' },
                    { href: 'gerenciar-carteira.html', text: 'Gerenciar Carteiras (Adicionar/Multa)', style: 'btn-admin-action' },
                    { href: 'multas.html', text: 'Histórico de Multas (Remover/Add)', style: 'btn-danger' },
                    { href: 'tornar-admin.html', text: 'Gerenciar Permissões de Admin', style: 'btn-admin-action' },
                    { href: 'editar-perfis.html', text: 'Excluir Perfis de Usuário', style: 'btn-danger' },
                ]
                : [
                    // Links do Membro Comum
                    { href: 'tarefas-disponiveis.html', text: 'Tarefas Disponíveis (Para Pegar)', style: 'btn-primary' },
                    { href: 'minhas-tarefas.html', text: 'Minhas Tarefas (Para Concluir)', style: 'btn-tertiary' },
                    { href: 'carteira.html', text: 'Minha Carteira (Histórico de Ganhos/Multas)', style: 'btn-primary' },
                ];

            links.forEach(link => {
                const linkEl = document.createElement('a');
                linkEl.href = link.href;
                linkEl.className = tn-rounded  wide-button dashboard-link;
                linkEl.textContent = link.text;
                dashboardEl.appendChild(linkEl);
            });
        }
        
        window.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
