<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Meu Perfil</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box">
        <h1 id="page-title" class="main-title">Carregando Perfil...</h1>
        <div id="profile-container" style="display: none; text-align: center;">
            <img id="profile-picture" src="assets/perfil-padrao.png" alt="Foto de Perfil" class="profile-img">
            <p id="time-display" class="time-text"></p>
            <h2 id="user-name" class="user-name-text"></h2>
            <p id="user-role" class="user-role-text"></p>
        </div>

        <div id="loading-container" style="text-align: center;">
            <h2 class="section-title">Ações Rápidas</h2>
            <p id="loading-links">Carregando links...</p>
        </div>
        
        <nav id="nav-menu" class="nav-menu" style="display: none;">
            </nav>
        
        <button id="logout-button" class="btn-rounded btn-danger wide-button" style="margin-top: 20px;">Sair / Logout</button>
    </div>

    <script src="js/script.js"></script>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        // Variável global para armazenar os dados do usuário logado
        let usuarioLogadoData = null; 

        // 1. Função de Utilitário para formatar a hora (se você ainda usa a função no index)
        function startBrasilClock(displayElementId) {
            const timeDisplay = document.getElementById(displayElementId);
            if (!timeDisplay) return;

            function updateTime() {
                const now = new Date();
                const options = {
                    timeZone: 'America/Sao_Paulo',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                };
                const brasilTime = now.toLocaleTimeString('pt-BR', options);
                timeDisplay.textContent = brasilTime.replace(',', ' (Brasil)');
            }
            updateTime();
            setInterval(updateTime, 1000);
        }

        // 2. Função principal para carregar o perfil e o menu
        async function loadProfileAndMenu() {
            const pageTitle = document.getElementById('page-title');
            const profileContainer = document.getElementById('profile-container');
            const loadingContainer = document.getElementById('loading-container');
            const navMenu = document.getElementById('nav-menu');
            const userNameEl = document.getElementById('user-name');
            const userRoleEl = document.getElementById('user-role');
            const logoutButton = document.getElementById('logout-button');
            
            // Tenta obter o usuário do localStorage
            const storedValue = localStorage.getItem('usuarioLogado');

            if (!storedValue) {
                // Se não há ninguém logado, redireciona para o login
                window.location.href = 'login.html';
                return;
            }

            try {
                usuarioLogadoData = JSON.parse(storedValue);
                const nome = usuarioLogadoData.nome;
                const isAdmin = usuarioLogadoData.isAdmin || false;
                
                pageTitle.textContent = 'Dashboard'; // Título da página
                userNameEl.textContent = nome; // Nome do usuário
                userRoleEl.textContent = isAdmin ? 'Administrador' : 'Membro da Família';
                
                profileContainer.style.display = 'block'; // Mostra a foto e info
                loadingContainer.style.display = 'none'; // Esconde o "Carregando links"
                navMenu.style.display = 'block'; // Mostra o menu

                // Inicia o relógio
                startBrasilClock('time-display');

                // 3. Monta os Links do Menu
                const links = [
                    { href: 'tarefas-disponiveis.html', text: 'Tarefas Disponíveis' },
                    { href: 'minhas-tarefas.html', text: 'Minhas Tarefas' },
                    { href: 'tarefas-pendentes.html', text: 'Tarefas Pendentes' },
                    { href: 'tarefas-concluidas.html', text: 'Tarefas Concluídas' },
                    { href: 'carteira.html', text: 'Carteira' },
                    // Links de Admin/Gerenciamento (APENAS se for Admin)
                    ...(isAdmin ? [
                        { href: 'gerenciar-tarefas.html', text: 'Gerenciar Tarefas' },
                        { href: 'gerenciar-perfis.html', text: 'Gerenciar Perfis' }, // CORRIGIDO O LINK AQUI
                        { href: 'multas.html', text: 'Multas' },
                        { href: 'gerenciar-carteira.html', text: 'Gerenciar Carteira' }
                    ] : [])
                ];

                navMenu.innerHTML = links.map(link => 
                    <a href="" class="menu-link"></a> // LINHA CORRIGIDA AQUI
                ).join('');


                // 4. Configura o botão de Logout
                logoutButton.onclick = function() {
                    localStorage.removeItem('usuarioLogado');
                    window.location.href = 'login.html';
                };
                
            } catch (e) {
                console.error("Erro ao carregar dados do localStorage:", e);
                // Em caso de erro, força o logout para evitar travamentos
                localStorage.removeItem('usuarioLogado');
                window.location.href = 'login.html';
            }
        }

        // Inicia o processo de carregamento quando a página terminar de carregar
        window.addEventListener('DOMContentLoaded', loadProfileAndMenu);
        
        // Se a sua função startBrasilClock estiver dentro do script.js, remova esta função daqui.
        // Se a sua função de logout estiver no script.js, remova o onclick do botão.
    </script>
</body>
</html>
