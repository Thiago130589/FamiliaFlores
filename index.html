<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script> 
</head>
<body>
    <div class="center-box large-box" id="dashboard-container">
        <h1 class="main-title">Dashboard</h1>
        <hr class="divider">
        
        <div id="loading-message" style="text-align: center;">Carregando Perfil...</div>

        <div id="main-content" style="display: none;">
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="user-photo" src="img/default-avatar.png" alt="Foto do Usuário" 
                     style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid #ccc;">
                <h2 id="welcome-message" style="color: #333;"></h2>
            </div>
            
            <p id="datetime-display" style="text-align: center; font-weight: bold; color: red; margin-bottom: 25px;">
                </p>

            <div class="dashboard-links-grid">
                <a href="carteira.html" class="btn-rounded btn-primary" style="font-weight: bold; max-width: 250px;">
                    Minha Carteira
                </a>
                
                <a href="minhas-tarefas.html" class="btn-secondary-text btn-rounded">Minhas Tarefas</a>
                <a href="tarefas-disponiveis.html" class="btn-secondary-text btn-rounded">Tarefas Disponíveis</a>
                <a href="historico-tarefas.html" class="btn-secondary-text btn-rounded">Histórico de Tarefas</a>
                
                <a href="historico-pagamentos.html" class="btn-secondary-text btn-rounded">Histórico Financeiro</a>
                <a href="historico-multas.html" class="btn-secondary-text btn-rounded">Histórico de Multas</a>
            </div>

            <hr class="divider">
        </div>
        
        <div id="admin-button-container" style="display: none; text-align: center; margin-top: 30px;">
            <a href="area-administrador.html" class="btn-rounded btn-primary" style="width: 300px;">
                Área do Administrador
            </a>
        </div>

        <button class="btn-rounded btn-danger wide-button" style="margin-top: 20px;" onclick="logout()">Sair / Logout</button>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : null;
        
        // ----------------------------------------------------------------------
        // FUNÇÃO DE UTILIDADE: Data e Hora
        // ----------------------------------------------------------------------
        function updateDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            const dateStr = now.toLocaleDateString('pt-BR', dateOptions);
            const timeStr = now.toLocaleTimeString('pt-BR', timeOptions);
            
            document.getElementById('datetime-display').textContent = `${dateStr} | ${timeStr}`;
        }
        
        // ----------------------------------------------------------------------
        // FUNÇÕES DE LOGIN/LOGOUT (Mantidas)
        // ----------------------------------------------------------------------
        function getUsuarioLogado() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                return JSON.parse(storedValue);
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        function logout() {
            if (typeof auth !== 'undefined' && typeof auth.signOut === 'function') {
                auth.signOut();
            }
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html';
        }

        // ----------------------------------------------------------------------
        // FUNÇÃO PRINCIPAL DO DASHBOARD
        // ----------------------------------------------------------------------
        async function loadDashboard() {
            const userInfo = getUsuarioLogado();
            
            // 🚨 Importante: Removemos a checagem por 'formatarMoeda' pois ela não é mais usada neste arquivo
            if (!userInfo || !firestore) {
                document.getElementById('loading-message').textContent = 'Erro de carregamento (Firebase ou Usuário). Verifique o Console.';
                return;
            }

            // 1. Carregar informações do usuário e Foto
            document.getElementById('welcome-message').textContent = `Bem-vindo(a), ${userInfo.nome}!`;
            
            try {
                // Tenta buscar o documento completo do Firebase
                const userDoc = await firestore.collection('users').doc(userInfo.nome).get();
                const userData = userDoc.data();
                
                // 1.1. Lógica da Foto: Assume que o campo da foto é 'fotoUrl' ou 'photoURL'
                const photoUrl = userData.fotoUrl || userData.photoURL;
                if (photoUrl) {
                    document.getElementById('user-photo').src = photoUrl;
                }
                
                // O Saldo Atual não está mais sendo carregado/exibido.

            } catch (error) {
                console.error("Erro ao carregar dados do Firebase:", error);
            }
            
            // 2. Exibir o botão de Admin
            const isAdmin = userInfo.isAdmin === true; 
            if (isAdmin) {
                document.getElementById('admin-button-container').style.display = 'block'; 
            }

            // 3. Finalizar carregamento
            document.getElementById('loading-message').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
        
        // ----------------------------------------------------------------------
        // EXECUÇÃO
        // ----------------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            // Atualiza a data e hora a cada segundo (real-time)
            updateDateTime();
            setInterval(updateDateTime, 1000); 
        });
    </script>
</body>
</html>
