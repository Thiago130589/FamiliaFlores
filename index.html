<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <div class="header-actions">
            <div class="profile-header-container">
                <img id="profile-pic" class="profile-pic" src="img/default-avatar.png" alt="Foto de Perfil">
                
                <p id="welcome-message" class="info-message center-text" style="font-size: 1.1em; margin-top: 10px;">Carregando...</p>
            </div>
            
            <button class="btn-icon btn-danger btn-rounded" onclick="logout()" title="Sair">&#x2715;</button>
        </div>
        
        <hr style="border-color: #ddd;">

        <div id="saldo-card" class="tarefa-card" style="border-left-color: var(--success-color); margin-bottom: 25px;">
            <div class="tarefa-header-admin">
                <span class="tarefa-nome-admin">Seu Saldo Atual:</span>
                <span class="positive-text" id="current-saldo">R$ 0,00</span>
            </div>
            <p class="info-message">Atualizado em tempo real.</p>
        </div>

        <div class="action-grid action-grid-two-cols">
            <a href="minhas-tarefas.html" class="btn-rounded btn-info wide-button">
                Minhas Tarefas
            </a>
            <a href="tarefas-disponiveis.html" class="btn-rounded btn-success wide-button">
                Pegar Novas Tarefas
            </a>
            <a href="historico-pagamentos.html" class="btn-rounded btn-secondary wide-button">
                Histórico de Tarefas Pagas
            </a>
        </div>
        
        <a id="admin-link" href="area-administrador.html" class="btn-rounded btn-danger wide-button hidden-start" style="margin-top: 25px;">
            Acessar Painel Admin
        </a>

        <div class="action-grid button-spacing-top">
             <a href="gerenciar-perfil.html" class="btn-rounded btn-secondary-text wide-button">
                 Configurações do Perfil
             </a>
        </div>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        const USERS_COLLECTION = 'users';

        // 1. Carrega informações e checa o login
        async function loadDashboard() {
            const userInfo = getUsuarioLogado();
            
            if (!userInfo || !userInfo.nome) {
                window.location.href = 'login.html'; 
                return;
            }

            // 2. Busca dados (Nome, Foto e Saldo)
            const userDoc = await firestore.collection(USERS_COLLECTION).doc(userInfo.nome).get();

            // Configura a Mensagem de Boas-Vindas
            document.getElementById('welcome-message').textContent = `Olá, ${userInfo.nome}!`;

            if (userDoc.exists) {
                const userData = userDoc.data();
                
                // Carregar Foto
                if (userData.fotoUrl) {
                    document.getElementById('profile-pic').src = userData.fotoUrl;
                }
                
                // Carregar Saldo
                const saldo = userData.saldo || 0;
                const saldoElement = document.getElementById('current-saldo');
                saldoElement.textContent = formatarMoeda(saldo);
                
                saldoElement.classList.remove('positive-text', 'negative-text');
                saldoElement.classList.add(saldo >= 0 ? 'positive-text' : 'negative-text');
            } else {
                 document.getElementById('current-saldo').textContent = formatarMoeda(0);
            }
            
            // 3. Verifica e exibe o link do Admin
            const adminLink = document.getElementById('admin-link');
            if (userInfo.isAdmin) {
                adminLink.classList.remove('hidden-start');
            } else {
                adminLink.classList.add('hidden-start');
            }
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
