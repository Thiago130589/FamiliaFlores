<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carteira</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box">
        <h1 style="color: #4CAF50;">Minha Carteira</h1>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

        <div class="saldo-card">
            <h2>Saldo Atual</h2>
            <p id="saldo-valor" class="saldo-amount">R$ 0,00</p>
        </div>
        
        <hr style="width: 100%; border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">

        <h3>Histórico de Tarefas Pagas</h3>
        <div id="historico-list" style="width: 100%;">
            <p>Carregando histórico...</p>
        </div>

        <button onclick="voltarAoPerfil()" class="btn-rounded" style="margin-top: 25px;">Voltar ao perfil</button>
    </div>

    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }

        // Função para obter o nome do usuário logado
        function getNomeUsuario() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) return null;
            try {
                const obj = JSON.parse(storedValue);
                return String(obj.nome).trim();
            } catch (e) {
                return null;
            }
        }

        // Função principal para carregar o saldo e o histórico
        async function loadCarteira() {
            const userName = getNomeUsuario();
            const saldoEl = document.getElementById('saldo-valor');
            const historicoListEl = document.getElementById('historico-list');
            historicoListEl.innerHTML = '<p>Carregando histórico...</p>';

            if (!userName) {
                saldoEl.textContent = 'ERRO';
                historicoListEl.innerHTML = '<p style="color: red;">ERRO: Usuário não identificado. Faça login novamente.</p>';
                return;
            }

            // 1. CARREGAR O SALDO
            try {
                // O nome do usuário é o ID do documento na coleção 'users'
                const userDoc = await firestore.collection('users').doc(userName).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const saldo = parseFloat(userData.saldo || 0).toFixed(2).replace('.', ',');
                    saldoEl.textContent = `R$ ${saldo}`;
                } else {
                    saldoEl.textContent = 'R$ 0,00';
                    console.warn(`Documento do usuário ${userName} não encontrado na coleção 'users'.`);
                }
            } catch (error) {
                console.error("Erro ao carregar saldo:", error);
                saldoEl.textContent = 'ERRO';
            }


            // 2. CARREGAR O HISTÓRICO DE TAREFAS CONCLUÍDAS E PAGAS
            try {
                // Filtra as tarefas da coleção 'tarefasConcluidas' pelo nome do usuário
                const querySnapshot = await firestore.collection('tarefasConcluidas')
                    .where('atribuidaPara', '==', userName)
                    .get();

                historicoListEl.innerHTML = ''; // Limpa a mensagem de carregamento
                let valorTotalHistorico = 0;

                if (querySnapshot.empty) {
                    historicoListEl.innerHTML = '<p>Você não possui tarefas pagas em seu histórico.</p>';
                    return;
                }

                // Cria o cabeçalho da lista
                const ul = document.createElement('ul');
                ul.className = 'historico-list-ul';

                querySnapshot.forEach(doc => {
                    const tarefa = doc.data();
                    const valorTarefa = parseFloat(tarefa.valor || 0);
                    
                    valorTotalHistorico += valorTarefa; // Soma para o total
                    
                    const valorFormatado = valorTarefa.toFixed(2).replace('.', ',');
                    const dataPagamento = tarefa.dataPagamento 
                        ? new Date(tarefa.dataPagamento).toLocaleDateString('pt-BR') 
                        : 'N/A';

                    const li = document.createElement('li');
                    li.className = 'historico-item';
                    li.innerHTML = `
                        <span class="item-nome">${tarefa.nome}</span>
                        <span class="item-valor">R$ ${valorFormatado}</span>
                        <span class="item-data">Pago em: ${dataPagamento}</span>
                    `;
                    ul.appendChild(li);
                });

                historicoListEl.appendChild(ul);

                // Exibe a soma total do histórico (apenas das tarefas listadas)
                const totalEl = document.createElement('div');
                totalEl.className = 'historico-total';
                totalEl.innerHTML = `
                    <span>Valor Total Histórico:</span>
                    <span class="total-amount">R$ ${valorTotalHistorico.toFixed(2).replace('.', ',')}</span>
                `;
                historicoListEl.appendChild(totalEl);

            } catch (error) {
                console.error("Erro ao carregar histórico de tarefas:", error);
                historicoListEl.innerHTML = `<p style="color: red;">Erro ao carregar histórico de tarefas.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadCarteira);
    </script>
</body>
</html>
