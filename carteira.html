<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title-green">Minha Carteira</h1> 
        <hr class="divider">
        
        <div class="saldo-card">
            <h2>Saldo Atual</h2>
            <p id="saldo-valor" class="saldo-amount">R$ 0,00</p>
        </div>

        <hr class="divider">

        <h2 style="color: #444;">Histórico de Transações</h2>
        <p style="font-size: 0.9em; color: #888;">Ganhos (Verde) e Multas (Vermelho)</p>
        
        <div id="historico-lista" class="historico-lista">
            <p class="empty-message">Carregando histórico...</p>
        </div>
        
        <a href="index.html" class="btn-rounded btn-secondary-text wide-button">Voltar ao perfil</a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        // Obtém o nome do usuário logado
        function getUsuarioLogado() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                return JSON.parse(storedValue).nome;
            } catch (e) {
                window.location.href = 'login.html';
                return null;
            }
        }

        function formatBRL(value) {
            return parseFloat(value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function loadCarteira() {
            const userName = getUsuarioLogado();
            if (!userName) return;

            const saldoEl = document.getElementById('saldo-valor');
            const historicoEl = document.getElementById('historico-lista');
            historicoEl.innerHTML = '<p class="empty-message">Buscando transações...</p>';

            try {
                const userDoc = await firestore.collection('users').doc(userName).get();
                if (!userDoc.exists) {
                    saldoEl.textContent = formatBRL(0);
                    historicoEl.innerHTML = '<p class="error-message">Usuário não encontrado.</p>';
                    return;
                }
                
                const userData = userDoc.data();
                const saldo = parseFloat(userData.saldo || 0);
                // Exibe o saldo formatado
                saldoEl.textContent = formatBRL(saldo); 

                // 1. Buscar Ganhos (Tarefas Concluídas)
                const tarefasSnapshot = await firestore.collection('tarefasConcluidas')
                    .where('atribuidaPara', '==', userName)
                    .orderBy('dataConclusao', 'desc')
                    .get();

                let historico = [];

                // Mapear Ganhos
                tarefasSnapshot.forEach(doc => {
                    const tarefa = doc.data();
                    const valor = parseFloat(tarefa.valor || 0);
                    // Pega a data mais confiável (data de conclusão)
                    const dataConclusao = tarefa.dataConclusao ? new Date(tarefa.dataConclusao) : new Date();

                    historico.push({
                        tipo: 'ganho',
                        descricao: tarefa.nome || 'Tarefa Concluída',
                        valor: valor,
                        data: dataConclusao
                    });
                });

                // 2. Mapear Multas
                const multas = userData.multas || [];
                multas.forEach(multa => {
                    const valor = parseFloat(multa.valor || 0);
                    const data = new Date(multa.data);
                    
                    historico.push({
                        tipo: 'multa',
                        descricao: `Multa: ${multa.motivo || 'Motivo não especificado'}`,
                        // Armazena o valor como negativo para facilitar o cálculo do saldo, mas exibe o valor positivo
                        valor: -Math.abs(valor), 
                        data: data
                    });
                });

                // 3. Ordenar Histórico (Mais recente primeiro)
                historico.sort((a, b) => b.data.getTime() - a.data.getTime());

                // 4. Renderizar
                if (historico.length === 0) {
                    historicoEl.innerHTML = '<p class="empty-message">Nenhuma transação registrada.</p>';
                    return;
                }

                let html = '<ul class="transaction-list">';
                historico.forEach(item => {
                    const valorAbsoluto = formatBRL(Math.abs(item.valor));
                    const dataFormatada = item.data.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
                    const isPositive = item.tipo === 'ganho';
                    const icon = isPositive ? '&#x2714;' : '&#x2716;'; // Checkmark / X

                    html += `
                        <li class="transaction-item ${isPositive ? 'ganho' : 'multa'}">
                            <span class="transaction-icon">${icon}</span>
                            <div class="transaction-details">
                                <span class="transaction-description">${item.descricao}</span>
                                <span class="transaction-date">${dataFormatada}</span>
                            </div>
                            <span class="transaction-amount">${isPositive ? '+' : '-'} ${valorAbsoluto}</span>
                        </li>
                    `;
                });
                html += '</ul>';
                historicoEl.innerHTML = html;

            } catch (error) {
                console.error("Erro ao carregar carteira:", error);
                historicoEl.innerHTML = '<p class="error-message">Erro ao carregar dados da carteira. Verifique o Console (F12).</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadCarteira);
    </script>
</body>
</html>
