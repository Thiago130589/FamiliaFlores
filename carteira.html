<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="center-box large-box">
        <h1 class="main-title" style="color: var(--success-color);">Minha Carteira</h1>
        <hr class="divider">
        
        <div class="dashboard-card" id="saldo-card" style="border-left-color: var(--success-color); margin-bottom: 25px;">
            <div class="tarefa-card-content">
                <span class="tarefa-name">Saldo Disponível:</span>
                <span class="tarefa-info" id="current-saldo">R$ 0,00</span>
            </div>
            </div>

        <h2 style="font-size: 1.4em; margin-bottom: 15px; color: var(--primary-dark);">Histórico de Transações</h2>
        
        <div id="historico-lista" class="historico-lista">
            <p class="empty-message">Carregando histórico...</p>
        </div>

        <a href="index.html" class="btn-rounded btn-secondary-text wide-button" style="margin-top: 20px;">Voltar ao Dashboard</a>
    </div>

    <script>
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
        let usuarioAtual = null;

        // Função para carregar Saldo e Histórico
        async function loadCarteira() {
            const userInfo = getUsuarioLogado();
            const listaEl = document.getElementById('historico-lista');
            const saldoEl = document.getElementById('current-saldo');
            
            if (!userInfo || !userInfo.nome) {
                window.location.href = 'login.html';
                return;
            }
            usuarioAtual = userInfo.nome;
            saldoEl.textContent = 'Carregando...';
            listaEl.innerHTML = '<p class="empty-message">Buscando histórico...</p>';

            try {
                // 1. Carregar Saldo
                const userDoc = await firestore.collection('users').doc(usuarioAtual).get();
                if (userDoc.exists) {
                    const saldo = userDoc.data().saldo || 0;
                    saldoEl.textContent = formatarMoeda(saldo);
                } else {
                    saldoEl.textContent = formatarMoeda(0);
                }

                // 2. Carregar Histórico de Pagamentos (tarefas concluídas)
                const tarefasSnapshot = await firestore.collection('tarefasConcluidas')
                    .where('atribuidaPara', '==', usuarioAtual)
                    .orderBy('dataPagamento', 'desc')
                    .get();

                let htmlContent = '<ul class="transaction-list">';
                let temRegistros = false;

                tarefasSnapshot.forEach(doc => {
                    const t = doc.data();
                    const valor = parseFloat(t.valor || 0);
                    const data = t.dataPagamento || 'N/A';
                    
                    if (valor > 0) {
                        temRegistros = true;
                        
                        htmlContent += `
                            <li class="transaction-item">
                                <div class="transaction-details">
                                    <span class="transaction-description">${t.nome} (Pagamento)</span>
                                    <span class="transaction-date">${data}</span>
                                </div>
                                <span class="transaction-amount positive-text">${formatarMoeda(valor)}</span>
                            </li>
                        `;
                    }
                });
                
                // 3. Adicionar Multas ao Histórico
                const multasSnapshot = await firestore.collection('multas')
                    .where('usuario', '==', usuarioAtual)
                    .orderBy('dataMulta', 'desc')
                    .get();
                
                multasSnapshot.forEach(doc => {
                    const multa = doc.data();
                    const valor = parseFloat(multa.valor || 0);
                    const data = multa.dataMulta || 'N/A';
                    
                    temRegistros = true;
                    
                    htmlContent += `
                        <li class="transaction-item">
                            <div class="transaction-details">
                                <span class="transaction-description">${multa.motivo} (Multa)</span>
                                <span class="transaction-date">${data}</span>
                            </div>
                            <span class="transaction-amount negative-text">-${formatarMoeda(valor)}</span>
                        </li>
                    `;
                });


                htmlContent += '</ul>';

                if (temRegistros) {
                    listaEl.innerHTML = htmlContent;
                } else {
                    listaEl.innerHTML = '<p class="empty-message">Nenhuma transação registrada ainda.</p>';
                }

            } catch (error) {
                console.error("Erro ao carregar a carteira:", error);
                listaEl.innerHTML = '<p class="error-message">Erro ao carregar dados da carteira.</p>';
                saldoEl.textContent = 'Erro';
            }
        }

        window.addEventListener('DOMContentLoaded', loadCarteira);
    </script>
</body>
</html>
