<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Concluídas</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
</head>
<body>
    <div class="center-box">
        <h1 style="color: #4CAF50;">Tarefas Concluídas e Pagas</h1>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

        <div id="tarefas-concluidas-list" style="width: 100%;">
            <p id="loading-message">Carregando histórico...</p>
        </div>

        <button onclick="voltarAoPerfil()" class="btn-rounded" style="margin-top: 20px;">Voltar ao perfil</button>
    </div>
    
    <script>
        // Utiliza a variável global 'db' definida em firebase-init.js
        const firestore = typeof db !== 'undefined' ? db : firebase.firestore();

        function voltarAoPerfil() {
            window.location.href = 'index.html';
        }

        // Função para obter o nome do usuário E verificar se é Admin
        function getUsuarioInfo() {
            const storedValue = localStorage.getItem('usuarioLogado');
            if (!storedValue) {
                // Se não estiver logado, redireciona
                window.location.href = 'login.html'; 
                return { nome: null, isAdmin: false };
            }
            try {
                const obj = JSON.parse(storedValue);
                if (obj && obj.nome) {
                    // Admin é 'thiago' OU tem a flag 'isAdmin: true'
                    const isUserAdmin = (obj.isAdmin === true) || (String(obj.nome).toLowerCase() === 'thiago');
                    return { nome: String(obj.nome).trim(), isAdmin: isUserAdmin };
                }
            } catch (e) {
                // Redireciona em caso de erro de parsing
                window.location.href = 'login.html';
                return { nome: null, isAdmin: false };
            }
            return { nome: null, isAdmin: false };
        }

        async function loadTarefasConcluidas() {
            const lista = document.getElementById('tarefas-concluidas-list');
            lista.innerHTML = '<p id="loading-message">Carregando histórico...</p>';
            
            const userInfo = getUsuarioInfo();
            const userName = userInfo.nome;
            const isAdmin = userInfo.isAdmin;
            
            if (!userName) {
                lista.innerHTML = '<p style="color: red;">ERRO: Usuário não identificado. Faça login novamente.</p>';
                return;
            }

            try {
                let query = firestore.collection('tarefasConcluidas').orderBy('dataPagamento', 'desc'); // Adiciona ordenação

                // Filtra apenas as tarefas do usuário, se não for Admin
                if (!isAdmin) {
                    // O filtro só funciona se 'atribuidaPara' for uma string com o nome
                    query = query.where('atribuidaPara', '==', userName);
                }
                
                const snapshot = await query.get();
                
                lista.innerHTML = ''; // Limpa a mensagem de carregamento

                if (snapshot.empty) {
                    lista.innerHTML = `<p class="empty-message">Não há tarefas concluídas e pagas ${isAdmin ? 'no sistema' : 'no seu histórico'}.</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const tarefa = doc.data();
                    
                    // Checagem extra de segurança para membros (removida, pois o filtro do firestore é mais confiável)
                    // if (!isAdmin && tarefa.atribuidaPara !== userName) return; 
                    
                    const elemento = document.createElement('div');
                    elemento.className = 'tarefa-card-concluida'; // Classe para estilização
                    
                    // Formata a data de pagamento
                    const dataPagamento = tarefa.dataPagamento 
                        ? new Date(tarefa.dataPagamento).toLocaleDateString('pt-BR') 
                        : 'N/A';
                    
                    // Informação extra para o Admin
                    let infoAdmin = '';
                    if(isAdmin) {
                        infoAdmin = `<span style="font-weight: bold; color: #1976d2;">Usuário: ${tarefa.atribuidaPara}</span> | `;
                    }

                    elemento.innerHTML = `
                        <div class="tarefa-details-concluida">
                            <span class="tarefa-nome">${tarefa.nome}</span>
                            <span class="tarefa-info">${infoAdmin}R$ ${parseFloat(tarefa.valor || 0).toFixed(2).replace('.', ',')} | Paga em: ${dataPagamento}</span>
                        </div>
                        <span style="color: #4CAF50; font-weight: bold; font-size: 1.1rem;">PAGO</span>
                    `;
                    lista.appendChild(elemento);
                });

            } catch (error) {
                console.error("Erro ao carregar tarefas concluídas:", error);
                // Nota: O Admin pode precisar de um índice composto para este filtro no Firebase Console se for usar em produção.
                lista.innerHTML = `<p style="color: red;">Erro ao carregar o histórico de tarefas. ${!isAdmin ? 'Tente novamente.' : 'O administrador pode precisar criar um índice para o filtro.'}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadTarefasConcluidas);
    </script>
</body>
</html>
