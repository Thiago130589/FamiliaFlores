<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Tarefas Pagas</title>
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> 
    <script src="js/script.js"></script>
    <style>
        .tarefa-card-concluida {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f7fff7; /* Fundo mais claro/verdeado */
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 5px solid #4CAF50; /* Verde para "Paga" */
        }
        .tarefa-info-left {
            text-align: left;
            flex-grow: 1;
        }
        .status-pago {
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="center-box" style="max-width: 900px; min-width: 400px; align-items: center; position: relative;">
        <h1 style="margin: 0; color: #4CAF50; font-size: 2.2rem;">Histórico de Tarefas Pagas</h1>
        <p style="color: #888; text-align: center; margin-top: 5px;">Aqui estão as tarefas que foram concluídas e pagas.</p>
        <hr style="width: 100%; margin: 24px 0; border: none; border-top: 1px solid #eee;">
        
        <div id="tarefas-concluidas-lista" style="width: 100%; min-height: 120px;">
            <p style="color: #888; text-align: center;">Carregando histórico...</p>
        </div>

        <button class="btn-rounded btn-secondary-text wide-button" onclick="window.location.href='index.html'" style="margin: 32px auto 0 auto; display: block;">
            Voltar ao perfil
        </button>
    </div>

    <script>
    const firestore = typeof db !== 'undefined' ? db : firebase.firestore();
    const TAREFAS_CONCLUIDAS_COLLECTION = 'tarefasConcluidas';
    let usuarioAtual = null;
    let isAdmin = false;

    // Função para obter o nome do usuário E verificar se é Admin (assumindo que existe em script.js)
    function getUsuarioInfo() {
        // Assume que getUsuarioLogado() é robusto e retorna { nome, isAdmin }
        const userInfo = getUsuarioLogado(); 
        if (!userInfo) return { nome: null, isAdmin: false };
        return userInfo;
    }

    async function renderTarefasConcluidas() {
        const lista = document.getElementById('tarefas-concluidas-lista');
        const userInfo = getUsuarioInfo();
        usuarioAtual = userInfo.nome;
        isAdmin = userInfo.isAdmin;

        if (!usuarioAtual) {
            lista.innerHTML = '<p class="error-message">ERRO: Usuário não identificado.</p>';
            return;
        }
        
        lista.innerHTML = '<p class="empty-message">Carregando histórico...</p>';

        try {
            // Busca por status "Paga" na coleção de tarefas concluídas
            let query = firestore.collection(TAREFAS_CONCLUIDAS_COLLECTION)
                                 .where('status', '==', 'Paga')
                                 .orderBy('dataPagamento', 'desc'); // Ordena pela data mais recente de pagamento
            
            // Lógica de VISIBILIDADE: Se NÃO for Admin, filtra pelas suas tarefas
            if (!isAdmin) {
                query = query.where('atribuidaPara', '==', usuarioAtual);
            }
            
            const snapshot = await query.get();
            let tarefas = [];
            
            snapshot.forEach(doc => {
                tarefas.push({ id: doc.id, ...doc.data() });
            });

            if (tarefas.length === 0) {
                lista.innerHTML = `<p class="empty-message">Nenhuma tarefa paga registrada ${isAdmin ? 'no sistema.' : 'para você.'}</p>`;
                return;
            }
            
            lista.innerHTML = tarefas.map((t) => {
                const dataCriacao = t.dataCriacao || 'N/A';
                const dataConclusao = t.dataConclusao || 'N/A';
                const dataPagamento = t.dataPagamento || 'N/A';
                const valor = parseFloat(t.valor || 0);
                
                let infoAdicional = '';

                // Informação extra para o Admin
                if (isAdmin) {
                    infoAdicional = `<br><span style="color: #1976d2; font-size: 0.95rem; font-weight: bold;">Usuário: ${t.atribuidaPara || 'N/A'}</span>`;
                }

                // Detalhes da tarefa e pagamento
                infoAdicional += `<br><span style="color: #666; font-size: 0.85rem;">Concluída em: ${dataConclusao}</span>`;
                infoAdicional += `<br><span style="color: #4CAF50; font-size: 1.1rem; font-weight: bold;">Valor Pago: ${formatarMoeda(valor)}</span>`;

                return `
                    <div class="tarefa-card-concluida">
                        <div class="tarefa-info-left">
                            <span style="color: var(--primary-color); font-size: 1.1rem; font-weight: 500;">${t.nome}</span>
                            ${infoAdicional}
                            <br>
                            <span style="color: #888; font-size: 0.85rem;">Criada em: ${dataCriacao} | Pago em: <span class="status-pago">${dataPagamento}</span></span>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (error) {
            console.error("Erro ao carregar tarefas concluídas:", error);
            lista.innerHTML = '<p class="error-message">Erro ao carregar histórico. Verifique o console para detalhes.</p>';
        }
    }

    window.addEventListener('DOMContentLoaded', renderTarefasConcluidas);
    </script>
</body>
</html>
